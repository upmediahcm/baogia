<html lang="vi">
<head>

    <title>UP MEDIA - Hệ Thống Tính Giá Dịch Vụ Quay Dựng Video Chuyên Nghiệp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        h1, h2, h3, .font-montserrat {
            font-family: 'Montserrat', sans-serif;
        }
        /* Hiệu ứng chuyển cảnh mượt mà cho các Tab */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.25s ease-out forwards;
        }
        /* Hiệu ứng nhấp nháy nhẹ nhàng gây chú ý cho nút thêm vào báo giá */
        @keyframes gentle-pulse {
            0%, 100% {
                box-shadow: 0 4px 10px 0 rgba(255, 255, 255, 0.1), 0 0 0 0 rgba(255, 255, 255, 0);
                filter: brightness(1);
            }
            50% {
                box-shadow: 0 4px 20px 4px rgba(255, 255, 255, 0.25), 0 0 12px 2px rgba(255, 255, 255, 0.2);
                filter: brightness(1.12);
            }
        }
        .animate-gentle-pulse {
            animation: gentle-pulse 2s infinite ease-in-out;
        }
        /* Ẩn thanh cuộn tự động trên các vùng chứa */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Lớp phong cách tối ưu hóa độ sắc nét cực đại khi xuất file PDF/PNG - Triệt tiêu mờ nhòe răng cưa */
        .export-crisp {
            -webkit-font-smoothing: antialiased !important;
            -moz-osx-font-smoothing: grayscale !important;
            text-rendering: optimizeLegibility !important;
            image-rendering: -webkit-optimize-contrast !important;
            image-rendering: crisp-edges !important;
        }
        .export-crisp * {
            text-shadow: none !important;
            box-shadow: none !important;
            transition: none !important;

        /* Định dạng tối ưu riêng biệt cho khổ giấy A4 chuẩn khi in */
        @media print {
            body {
                background: white;
                color: black;

            .no-print {
                display: none !important;
            }
            .print-area {
                width: 100% !important;
                max-width: 100% !important;
                box-shadow: none !important;
                margin: 0 !important;
                padding: 0 !important;
                background: white !important;
                color: black !important;
                }
            .print-card {
                border: none !important;
                box-shadow: none !important;
            }
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;

<body class="bg-black text-zinc-100 min-h-screen flex flex-col antialiased">

    <div id="root" class="flex-grow flex flex-col"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            // Thông tin nhà cung cấp dịch vụ
            const [providerName, setProviderName] = useState("UP MEDIA");

            // Thông tin khách hàng và định danh báo giá - Mặc định để trống hoàn toàn theo yêu cầu
            const [clientName, setClientName] = useState("");
            const [clientContact, setClientContact] = useState("");
            const [projectName, setProjectName] = useState("");
            const [quoteId, setQuoteId] = useState(`BG-26-${Math.floor(1000 + Math.random() * 9000)}`);
            const [quoteDate, setQuoteDate] = useState(new Date().toLocaleDateString('vi-VN'));

            // Trạng thái của Tab sản phẩm hiện tại
            const [activeCategory, setActiveCategory] = useState('QUANG_CAO'); // QUANG_CAO, XAY_KENH, QUAY_BDS, EVENT, THOI_TRANG, DICH_VU_LE
            const [activeMenuId, setActiveMenuId] = useState(null); // Quản lý ID dòng đang được click để chọn menu ẩn

            // Trạng thái modal cảnh báo chuyển đổi Dòng Sản Phẩm Cấu Hình
            const [showConfirmModal, setShowConfirmModal] = useState(false);
            const [pendingCategory, setPendingCategory] = useState(null);

            // Trạng thái modal cảnh báo lỗi nhập liệu (Ví dụ: Trống tên dự án)
            const [showErrorModal, setShowErrorModal] = useState(false);
            const [errorMessage, setErrorMessage] = useState("");

            // Danh sách hóa đơn tích lũy được hợp nhất
            const [invoiceItems, setInvoiceItems] = useState([]);
            const [discountPercent, setDiscountPercent] = useState(0);
            const [vatPercent, setVatPercent] = useState(0); // Mặc định không có VAT (0%)
            const [note, setNote] = useState("Báo giá trên chưa bao gồm chi phí di chuyển ngoại thành hoặc đi tỉnh.");
            const [showTotal, setShowTotal] = useState(true); 
            
            // Trạng thái hiệu ứng xuất file
            const [isGeneratingPDF, setIsGeneratingPDF] = useState(false);
            const [isGeneratingPNG, setIsGeneratingPNG] = useState(false);

            // 1. STATE CHO GÓI QUẢNG CÁO - Thay thế các cấu hình cũ bằng hệ thống thông minh tự động hóa
            const [qcClipQty, setQcClipQty] = useState(0); 
            const [qcMauQty, setQcMauQty] = useState(0); 
            const [qcExtraMauQty, setQcExtraMauQty] = useState(0); // Diễn viên phụ 1tr/ngày

            // 2. STATE CHO GÓI XÂY KÊNH - Cập nhật mặc định các tùy chọn số lượng bằng 0
            const [xkPackage, setXkPackage] = useState('THUONG_20'); 
            const [xkModelNoVoiceDays, setXkModelNoVoiceDays] = useState(0);
            const [xkModelVoiceDays, setXkModelVoiceDays] = useState(0);

            // 3. STATE CHO GÓI QUAY BẤT ĐỘNG SẢN - Cập nhật mặc định các tùy chọn số lượng bằng 0
            const [bdsSubCategory, setBdsSubCategory] = useState('QC_BDS'); 
            const [bdsQcVideoQty, setBdsQcVideoQty] = useState(0); // Số lượng video quảng cáo tự động hóa
            const [bdsXkVideoQty, setBdsXkVideoQty] = useState(0); // Số lượng video xây kênh tự động hóa (Mới)
            const [bdsKichBanQty, setBdsKichBanQty] = useState(0);
            const [bdsDungQty, setBdsDungQty] = useState(0);
            const [bdsQuayDays, setBdsQuayDays] = useState(0);
            const [bdsFlycamDays, setBdsFlycamDays] = useState(0);
            const [bdsMauDays, setBdsMauDays] = useState(0);

            // 4. STATE CHO GÓI SỰ KIỆN (EVENT) - Cập nhật mặc định các tùy chọn số lượng bằng 0
            const [eventPackage, setEventPackage] = useState('GOI_1'); 
            const [eventDuration, setEventDuration] = useState('HALF_DAY'); 
            const [eventFlycamDays, setEventFlycamDays] = useState(0); 

            // 5. STATE CHO DÒNG THỜI TRANG (MỚI THÊM)
            const [ttProductQty, setTtProductQty] = useState(0);
            const [ttStudioQty, setTtStudioQty] = useState(0); // Thay đổi từ boolean sang số lượng

            // 6. STATE CHO DỊCH VỤ LẺ - Cập nhật mặc định các tùy chọn số lượng bằng 0
            const [dlQuayOption, setDlQuayOption] = useState('NONE'); 
            const [dlDungQty, setDlDungQty] = useState(0);
            const [dlKichBanQty, setDlKichBanQty] = useState(0);
            const [dlMauOption, setDlMauOption] = useState('HALF_DAY'); 
            const [dlMauQty, setDlMauQty] = useState(0);
            const [dlCustomName, setDlCustomName] = useState(""); // Tên dịch vụ ngoài hệ thống (Mới)
            const [dlCustomPrice, setDlCustomPrice] = useState(0); // Đơn giá dịch vụ ngoài hệ thống (Mới)
            const [dlCustomDesc, setDlCustomDesc] = useState("Dịch vụ phát sinh ngoài hệ thống cấu hình theo yêu cầu thực tế của đối tác."); // Mô tả dịch vụ tự tạo/AI tạo
            const [isGeneratingDesc, setIsGeneratingDesc] = useState(false); // Trạng thái AI đang tải mô tả
            const [aiError, setAiError] = useState(""); // Thông báo lỗi AI nếu có

            // --- TRẠNG THÁI MỚI CHO PROPOSAL ---
            const [showProposalConfig, setShowProposalConfig] = useState(false);
            const [proposalTone, setProposalTone] = useState('TRANG_DEN'); // TRANG_DEN, NAU_VANG, XANH_TRANG
            const [previewMode, setPreviewMode] = useState('QUOTE'); // 'QUOTE' or 'PROPOSAL'
            
            // Các trường thông tin của đề xuất dự án
            const [propObjective, setPropObjective] = useState("");
            const [propTarget, setPropTarget] = useState("");
            const [propMessage, setPropMessage] = useState("");
            const [propDirection, setPropDirection] = useState("");
            
            // State quản lý trạng thái ẩn/hiện danh sách đề xuất nhanh
            const [openSuggestions, setOpenSuggestions] = useState({
                objective: false,
                target: false,
                message: false,
                direction: false
            });

            // State quản lý điều khoản đề xuất và cờ theo dõi thay đổi thủ công
            const [propTerms, setPropTerms] = useState("");
            const [isTermsEdited, setIsTermsEdited] = useState(false);

            // Tự động phân tích các dịch vụ đang có thực tế trong báo giá (Để đồng bộ Quy trình & Timeline)
            const activeQuoteCategories = useMemo(() => {
                if (invoiceItems.length === 0) {
                    return [activeCategory]; // Trả về category đang chọn cấu hình nếu báo giá trống
                }
                const cats = new Set();
                invoiceItems.forEach(item => {
                    if (item.id.startsWith('qc_')) cats.add('QUANG_CAO');
                    else if (item.id.startsWith('xk_')) cats.add('XAY_KENH');
                    else if (item.id.startsWith('bds_')) cats.add('QUAY_BDS');
                    else if (item.id.startsWith('event_')) cats.add('EVENT');
                    else if (item.id.startsWith('tt_')) cats.add('THOI_TRANG');
                    else if (item.id.startsWith('dl_')) cats.add('DICH_VU_LE');
                });
                return Array.from(cats);
            }, [invoiceItems, activeCategory]);

            // Hàm tự động tạo đề xuất cho Listbox dựa trên Tên dự án & Phân loại dịch vụ đang chọn
            const generatedSuggestions = useMemo(() => {
                const proj = projectName.trim() || "Dự án";
                const catLabel = {
                    QUANG_CAO: "quảng cáo sản phẩm",
                    XAY_KENH: "xây dựng kênh video ngắn",
                    QUAY_BDS: "truyền thông bất động sản",
                    EVENT: "quay recap sự kiện",
                    THOI_TRANG: "lookbook thời trang",
                    DICH_VU_LE: "sản xuất video"
                }[activeCategory] || "sản xuất video";

                return {
                    objectives: [
                        `Tăng nhận diện thương hiệu cho ${proj} và tiếp cận mạnh mẽ tệp người xem mục tiêu trên các nền tảng mạng xã hội.`,
                        `Tối ưu hóa tỉ lệ chuyển đổi đơn hàng, nâng cao doanh số bán hàng trực tiếp của dự án ${proj}.`,
                        `Định hình phong cách truyền thông chuyên nghiệp, tạo dựng uy tín và định vị vị thế dẫn đầu của thương hiệu ${proj}.`
                    ],
                    targets: [
                        `Khách hàng trẻ tuổi, năng động, thường xuyên giải trí và có thói quen mua sắm thông qua video ngắn trên internet.`,
                        `Nhóm đối tác, nhà đầu tư trung và cao cấp đòi hỏi hình ảnh trực quan, sang trọng, trung thực và có chiều sâu từ ${proj}.`,
                        `Cộng đồng người tiêu dùng mục tiêu đang có nhu cầu trực tiếp tìm kiếm giải pháp và sản phẩm dịch vụ từ ${proj}.`
                    ],
                    messages: [
                        `"${proj} - Đột phá phong cách, kiến tạo giá trị thực chất và khẳng định vị thế dẫn đầu."`,
                        `"Chuyên nghiệp trong từng chuyển động, ${proj} luôn sát cánh cùng sự phát triển bền vững của bạn."`,
                        `"Trải nghiệm hoàn mỹ, dịch vụ đỉnh cao - Lựa chọn hoàn hảo chỉ có thể là ${proj}."`
                    ],
                    directions: [
                        `Áp dụng góc quay cinematic hiện đại, tập trung đặc tả visual và nhịp dựng nhanh cuốn hút ngay trong 3 giây đầu tiên của video.`,
                        `Xây dựng kịch bản có chiều sâu bám sát giá trị thực tế của ${proj}, lồng ghép khéo léo thông điệp truyền thông một cách tự nhiên.`,
                        `Sử dụng hệ thống ánh sáng cao cấp, màu sắc ấm áp chuyên nghiệp kết hợp nhạc nền bắt tai và phụ đề Kinetic motion sinh động.`
                    ]
                };
            }, [projectName, activeCategory]);

            // Thiết lập giá trị mặc định khi người dùng click chọn gợi ý nhanh
            useEffect(() => {
                if (!propObjective) setPropObjective("");
                if (!propTarget) setPropTarget("");
                if (!propMessage) setPropMessage("");
                if (!propDirection) setPropDirection("");
            }, [generatedSuggestions]);

            const computedDirection = useMemo(() => {
                if (propDirection.trim() !== "") return propDirection;
                return generatedSuggestions.directions[0];
            }, [generatedSuggestions, propDirection]);

            // Bảng phong cách màu sắc cho Proposal
            const toneStyles = {
                TRANG_DEN: {
                    bg: "bg-white",
                    textMain: "text-slate-900",
                    textMuted: "text-slate-500",
                    accentBg: "bg-slate-900",
                    accentText: "text-white",
                    border: "border-slate-200",
                    secBg: "bg-slate-50",
                    badgeBg: "bg-slate-100",
                    badgeText: "text-slate-800"
                },
                NAU_VANG: {
                    bg: "bg-[#FAF6F0]", 
                    textMain: "text-[#3E2723]", 
                    textMuted: "text-[#8D6E63]", 
                    accentBg: "bg-[#4E342E]", 
                    accentText: "text-[#FFD700]", 
                    border: "border-[#D7CCC8]", 
                    secBg: "bg-[#F5EBE0]", 
                    badgeBg: "bg-[#EFE3C3]", 
                    badgeText: "text-[#5D4037]"
                },
                XANH_TRANG: {
                    bg: "bg-white", 
                    textMain: "text-[#0F172A]", 
                    textMuted: "text-[#475569]", 
                    accentBg: "bg-[#1E3A8A]", 
                    accentText: "text-white", 
                    border: "border-[#E2E8F0]",
                    secBg: "bg-[#F1F5F9]", 
                    badgeBg: "bg-[#DBEAFE]", 
                    badgeText: "text-[#1E40AF]"
                }
            };

            // Hàm gọi AI (Gemini 2.5 Flash) để tự động sinh mô tả dịch vụ bằng tiếng Việt
            const generateDescriptionWithAI = async (serviceName) => {
                if (!serviceName.trim()) return;
                setIsGeneratingDesc(true);
                setAiError("");

                const apiKey = ""; // API key được gán tự động tại môi trường runtime
                const systemPrompt = "Bạn là trợ lý viết nội dung chuyên nghiệp cho UP MEDIA. Hãy soạn đúng 1 câu mô tả dịch vụ ngắn gọn, cô đọng, chuyên nghiệp và có tính thương mại cao (dịch dưới 25 từ) bằng tiếng Việt cho dịch vụ có tên: \"" + serviceName + "\". Chỉ trả về đúng câu mô tả, không thêm tiêu đề, dẫn dắt hay dấu ngoặc kép.";

                const payload = {
                    contents: [{ parts: [{ text: `Viết mô tả hấp dẫn cho dịch vụ: ${serviceName}` }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                };

                const fetchWithRetry = async (retries = 5, delay = 1000) => {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (!response.ok) {
                            throw new Error("HTTP error " + response.status);
                        }

                        const result = await response.json();
                        const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (text) {
                            const cleanedText = text.trim()
                                .replace(/^"|"$/g, '')
                                .replace(/^\*+|\*+$/g, '')
                                .trim();
                            setDlCustomDesc(cleanedText);
                        } else {
                            throw new Error("Invalid response format");
                        }
                    } catch (err) {
                        if (retries > 0) {
                            await new Promise(resolve => setTimeout(resolve, delay));
                            return fetchWithRetry(retries - 1, delay * 2);
                        } else {
                            setAiError("Không thể kết nối AI để tạo mô tả tự động. Bạn hãy nhập tay nhé.");
                        }
                    }
                };

                await fetchWithRetry();
                setIsGeneratingDesc(false);
            };

            // Hàm kết xuất đồ họa Timeline trực quan động bám sát các dịch vụ thực tế trong báo giá
            const renderTimeline = (tone) => {
                const singleCategoryTemplates = {
                    QUANG_CAO: [
                        { title: "Giai đoạn 1: Brief & Kịch Bản Quảng Cáo", desc: "Thống nhất thông điệp sản phẩm thương mại, viết kịch bản phân cảnh chi tiết và chuẩn bị lời thoại.", duration: "Ngày 1 - 3" },
                        { title: "Giai đoạn 2: Casting & Setup Tiền Kỳ", desc: "Lựa chọn bối cảnh quay, casting diễn viên/mẫu phù hợp, thiết lập thiết bị camera.", duration: "Ngày 4 - 5" },
                        { title: "Giai đoạn 3: Sản Xuất Quay Hình", desc: "Triển khai bấm máy tại hiện trường, ghi hình các góc máy đặc tả sản phẩm và bối cảnh.", duration: "Ngày 6 - 7" },
                        { title: "Giai đoạn 4: Hậu Kỳ & Bàn Giao Video", desc: "Dựng thô, chỉnh màu sắc thương mại, chèn nhạc nền bản quyền, hoàn thiện và bàn giao.", duration: "Ngày 8 - 10" }
                    ],
                    XAY_KENH: [
                        { title: "Giai đoạn 1: Lên Ý Tưởng & Kịch Bản Xây Kênh", desc: "Nghiên cứu thị trường và lên danh sách chủ đề kịch bản chi tiết tuần tự cho gói tháng.", duration: "Tuần 1" },
                        { title: "Giai đoạn 2: Bấm Máy Quay Cuốn Chiếu", desc: "Sản xuất ghi hình tập trung các kịch bản tại bối cảnh studio bám sát lịch phân vai.", duration: "Tuần 2" },
                        { title: "Giai đoạn 3: Biên Tập Hậu Kỳ Video Ngắn", desc: "Cắt dựng nhịp mượt, chèn hiệu ứng Kinetic chữ động, nhạc xu hướng giữ chân người xem.", duration: "Tuần 3" },
                        { title: "Giai đoạn 4: Nghiệm Thu & Tối Ưu Kênh", desc: "Chuẩn hóa định dạng xuất Ultra-HD, hỗ trợ tư vấn khung giờ vàng đăng tải nội dung.", duration: "Tuần 4" }
                    ],
                    QUAY_BDS: [
                        { title: "Giai đoạn 1: Khảo Sát Bối Cảnh BDS", desc: "Khảo sát thực địa bối cảnh dự án bất động sản, hướng nắng và lập sơ đồ bay máy.", duration: "Ngày 1 - 2" },
                        { title: "Giai đoạn 2: Quay Source & Flycam", desc: "Bấm máy quay góc mặt đất kết hợp điều phối Flycam lấy bao quát quy mô tầm cao của dự án.", duration: "Ngày 3 - 4" },
                        { title: "Giai đoạn 3: Hậu Kỳ Chuyên Sâu BDS", desc: "Áp dụng kỹ thuật căn màu sắc điện ảnh sang trọng, thu âm lồng tiếng MC giới thiệu tiện ích.", duration: "Ngày 5 - 7" },
                        { title: "Giai đoạn 4: Nghiệm Thu Bàn Giao", desc: "Duyệt clip thô, tối ưu các góc chỉnh theo yêu cầu thực tế và đóng gói bàn giao.", duration: "Ngày 8" }
                    ],
                    EVENT: [
                        { title: "Giai đoạn 1: Khớp Timeline Sự Kiện", desc: "Tiếp nhận sơ đồ, kịch bản chương trình từ ban tổ chức để chuẩn bị góc máy quay chụp sẵn sàng.", duration: "Trước 1 ngày" },
                        { title: "Giai đoạn 2: Tác Nghiệp Hiện Trường", desc: "Quay/chụp bám sát toàn bộ hoạt động chính, ghi nhận tự nhiên các khoảnh khắc cảm xúc chân thực.", duration: "Ngày diễn ra" },
                        { title: "Giai đoạn 3: Hậu Kỳ Recap & Lọc Ảnh", desc: "Lọc album ảnh chỉnh màu và dựng video recap cô đọng có cao trào, phối nhạc sôi động.", duration: "Ngày 1 - 2" },
                        { title: "Giai đoạn 4: Bàn Giao File Final", desc: "Đóng gói toàn bộ tài nguyên chất lượng cao lên drive lưu trữ and bàn giao cho ban tổ chức.", duration: "Ngày 3 - 4" }
                    ],
                    THOI_TRANG: [
                        { title: "Giai đoạn 1: Moodboard Ý Tưởng Lookbook", desc: "Thống nhất concept, chuẩn bị layout makeup, bối cảnh studio và phân phối trang phục.", duration: "Ngày 1 - 2" },
                        { title: "Giai đoạn 2: Tác Nghiệp Studio / On-Set", desc: "Thực hiện quay cuốn chi tiết sản phẩm thời trang cùng người mẫu chuyên nghiệp.", duration: "Ngày 3 - 4" },
                        { title: "Giai đoạn 3: Hậu Kỳ & Căn Màu Vải", desc: "Dựng nhịp mượt chuẩn phong cách high-fashion, căn chỉnh chính xác màu sắc thớ vải.", duration: "Ngày 5 - 6" },
                        { title: "Giai đoạn 4: Bàn Giao Nghiệm Thu", desc: "Xuất file chuẩn màu thương mại sắc nét Ultra-HD phục vụ chiến dịch ra mắt bộ sưu tập.", duration: "Ngày 7" }
                    ],
                    DICH_VU_LE: [
                        { title: "Giai đoạn 1: Khớp Yêu Cầu Riêng Biệt", desc: "Trao đổi sâu về mong muốn, định hướng bối cảnh và chuẩn bị đúng ekip chuyên môn.", duration: "Ngày 1" },
                        { title: "Giai đoạn 2: Thực Hiện Quay Lẻ", desc: "Bấm máy quay bám sát thời lượng cấu hình đã chọn (nửa ngày hoặc nguyên ngày).", duration: "Ngày 2" },
                        { title: "Giai đoạn 3: Hậu Kỳ Cắt Dựng Cơ Bản", desc: "Tiến hành cắt ghép thô, phối nhạc và tinh chỉnh hiệu ứng chuyển cảnh cơ bản.", duration: "Ngày 3 - 5" },
                        { title: "Giai đoạn 4: Bàn Giao Nghiệm Thu", desc: "Duyệt demo thô, hoàn thiện chỉnh sửa theo thỏa thuận và bàn giao file cuối cùng.", duration: "Ngày 6" }
                    ]
                };

                let stepsToRender = [];

                if (activeQuoteCategories.length > 1) {
                    const categoryNames = activeQuoteCategories.map(cat => {
                        if (cat === 'QUANG_CAO') return "Quảng cáo";
                        if (cat === 'XAY_KENH') return "Xây kênh";
                        if (cat === 'QUAY_BDS') return "Bất động sản";
                        if (cat === 'EVENT') return "Sự kiện";
                        if (cat === 'THOI_TRANG') return "Thời trang Lookbook";
                        return "Dịch vụ lẻ";
                    }).join(', ');

                    stepsToRender = [
                        { 
                            title: "Giai đoạn 1: Nghiên cứu & Tiền kỳ tổng hợp", 
                            desc: `Xây dựng ý tưởng kịch bản và kế hoạch triển khai đồng loạt cho các hạng mục: ${categoryNames}. Setup nhân sự, chuẩn bị bối cảnh nhất quán để tối ưu chi phí.`, 
                            duration: "Ngày 1 - 4" 
                        },
                        { 
                            title: "Giai đoạn 2: Tác nghiệp & Sản xuất quay hình", 
                            desc: "Triển khai ekip quay phim hiện trường, điều phối diễn viên/người mẫu, sử dụng các thiết bị ghi hình mặt đất chuyên dụng và bay Flycam theo cấu hình đã phê duyệt.", 
                            duration: "Ngày 5 - 7" 
                        },
                        { 
                            title: "Giai đoạn 3: Hậu kỳ & Biên tập kỹ thuật đồng bộ", 
                            desc: "Xử lý cắt dựng thô, căn chỉnh màu sắc hài hòa đúng tinh thần nhận diện. Lồng tiếng MC chuyên nghiệp, lồng nhạc bản quyền thương mại và bổ sung hiệu ứng visual.", 
                            duration: "Ngày 8 - 12" 
                        },
                        { 
                            title: "Giai đoạn 4: Nghiệm thu demo & Bàn giao toàn bộ", 
                            desc: "Tiến hành gửi bản duyệt demo tổng hợp, tiếp nhận các phản hồi điều chỉnh tối ưu và đóng gói bàn giao toàn bộ gói thành phẩm đạt chất lượng Ultra-HD sắc nét.", 
                            duration: "Ngày 13 - 15" 
                        }
                    ];
                } else {
                    const singleCat = activeQuoteCategories[0] || 'QUANG_CAO';
                    stepsToRender = singleCategoryTemplates[singleCat] || singleCategoryTemplates.QUANG_CAO;
                }

                return (
                    <div className="space-y-4 font-normal">
                        {stepsToRender.map((step, index) => (
                            <div key={index} className="flex gap-4 items-start text-xs">
                                <div className={`flex-shrink-0 w-6 h-6 rounded-full flex items-center justify-center font-bold text-xs ${tone.accentBg} ${tone.accentText}`}>
                                    {index + 1}
                                </div>
                                <div className="flex-grow animate-fadeIn">
                                    <div className="flex justify-between items-baseline mb-0.5">
                                        <h5 className={`font-bold uppercase tracking-wider ${tone.textMain}`}>{step.title}</h5>
                                        <span className={`text-[9px] font-semibold px-2 py-0.5 rounded-full ${tone.badgeBg} ${tone.badgeText}`}>{step.duration}</span>
                                    </div>
                                    <p className={`${tone.textMuted} leading-relaxed`}>{step.desc}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                );
            };

            // Hiệu ứng tự động xóa bảng báo giá và thu hồi menu ẩn khi thay đổi DÒNG SẢN PHẨM CẤU HÌNH
            useEffect(() => {
                setInvoiceItems([]);
                setActiveMenuId(null);
            }, [activeCategory]);

            // Hàm xử lý tương tác thông minh khi click đổi dòng sản phẩm
            const handleCategoryClick = (category) => {
                if (category === activeCategory) return;
                
                if (invoiceItems.length > 0) {
                    setPendingCategory(category);
                    setShowConfirmModal(true);
                } else {
                    setActiveCategory(category);
                }
            };

            const confirmCategoryChange = () => {
                if (pendingCategory) {
                    setActiveCategory(pendingCategory);
                }
                setShowConfirmModal(false);
                setPendingCategory(null);
            };

            const cancelCategoryChange = () => {
                setShowConfirmModal(false);
                setPendingCategory(null);
            };

            // --- HELPER BUILDERS TRÁNH LỖI BIÊN DỊCH JAVASCRIPT/BABEL ---
            const getTabClass = (category) => {
                const active = activeCategory === category;
                return "py-3 px-2 rounded-lg text-xs font-bold tracking-wider transition-all duration-75 uppercase " + 
                    (active 
                    ? "bg-gradient-to-b from-zinc-100 to-zinc-300 text-zinc-950 border-b-4 border-zinc-500 active:border-b-0 active:translate-y-[4px] hover:brightness-110 shadow-md shadow-black/40" 
                    : "bg-gradient-to-b from-zinc-800 to-zinc-900 text-zinc-400 border-b-4 border-zinc-950 active:border-b-0 active:translate-y-[4px] hover:text-white hover:brightness-110");
            };

            const getSubOptionClass = (isSelected) => {
                return "px-3 py-3 rounded-lg text-xs font-bold tracking-wider transition-all duration-75 border " + 
                    (isSelected 
                    ? "bg-gradient-to-b from-zinc-200 to-zinc-300 text-zinc-950 border-b-4 border-zinc-500 active:border-b-0 active:translate-y-[4px] hover:brightness-110 shadow-md" 
                    : "bg-gradient-to-b from-zinc-800 to-zinc-900 text-zinc-400 border border-zinc-800");
            };

            const getXkPackageClass = (pkg) => {
                const isSelected = xkPackage === pkg;
                return "p-3.5 rounded-xl border cursor-pointer transition flex flex-col justify-between " + 
                    (isSelected 
                    ? "bg-zinc-800 border-zinc-400 text-white shadow-md" 
                    : "bg-zinc-900 border-zinc-800 hover:border-zinc-700");
            };

            const getEventPackageClass = (pkg) => {
                const isSelected = eventPackage === pkg;
                return "p-3 rounded-lg text-xs font-semibold border transition text-left flex flex-col justify-between " + 
                    (isSelected 
                    ? "bg-zinc-800 border-zinc-400 text-white" 
                    : "bg-zinc-900 border-zinc-800 text-zinc-400 hover:border-zinc-700");
            };

            const getDlQuayOptionClass = (option) => {
                const isSelected = dlQuayOption === option;
                return "py-2 px-1 rounded-lg text-xs font-bold transition-all duration-75 border " + 
                    (isSelected 
                    ? "bg-gradient-to-b from-zinc-200 to-zinc-300 text-zinc-950 border-b-2 border-zinc-500 shadow-md" 
                    : "bg-zinc-900 text-zinc-400 border border-zinc-800");
            };

            const getDlMauOptionClass = (option) => {
                const isSelected = dlMauOption === option;
                return "py-2 px-1 rounded-lg text-xs font-bold transition-all duration-75 border " + 
                    (isSelected 
                    ? "bg-gradient-to-b from-zinc-200 to-zinc-300 text-zinc-950 border-b-2 border-zinc-500 shadow-md" 
                    : "bg-zinc-900 text-zinc-400 border border-zinc-800");
            };

            const getExportBtnClass = (isGenerating, isPdf) => {
                const base = "font-bold py-3 px-6 rounded-lg transition-all duration-75 text-xs flex items-center gap-2 shadow-lg active:translate-y-[4px] ";
                if (isGenerating) {
                    return base + "bg-zinc-850 text-zinc-500 cursor-not-allowed border-b-0";
                }
                if (isPdf) {
                    return base + "bg-gradient-to-b from-zinc-100 to-zinc-300 text-zinc-950 border-b-4 border-zinc-500 active:border-b-0 hover:from-white hover:to-zinc-200 shadow-zinc-400/10";
                } else {
                    return base + "bg-gradient-to-b from-zinc-200 to-zinc-300 text-zinc-950 border-b-4 border-zinc-500 active:border-b-0 hover:from-zinc-100 hover:to-zinc-200 shadow-zinc-500/10";
                }
            };

            // Công cụ định dạng tiền tệ Việt Nam (VND)
            const formatVND = (amount) => {
                return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
            };

            const activeCalculation = useMemo(() => {
                let items = [];
                let categoryName = "";

                if (activeCategory === 'QUANG_CAO') {
                    categoryName = "Dịch Vụ Video Quảng Cáo";
                    
                    if (qcClipQty > 0) {
                        // Tính số ngày quay: từ 11 clips trở lên mới tính 2 ngày quay, còn lại dưới 11 thì là 1 ngày.
                        const qcDays = qcClipQty >= 11 ? 2 : (qcClipQty > 0 ? 1 : 0);
                        const isSmall = qcClipQty <= 2;

                        items.push({
                            id: 'qc_option_title',
                            name: `Gói Quảng Cáo (${qcClipQty} Clips) - Tiến độ ${qcDays} ngày quay`,
                            desc: `Cơ cấu dịch vụ tự động điều chỉnh theo quy mô clips thực tế.`,
                            qty: 1,
                            unitPrice: 0,
                            subtotal: 0,
                            isHeader: true
                        });

                        // 1. Kịch bản quảng cáo (được bằng số clip)
                        items.push({
                            id: 'qc_kb',
                            name: "Biên soạn kịch bản chi tiết quảng cáo",
                            desc: "Biên kịch lên ý tưởng, lời thoại chuẩn tiếp thị.",
                            qty: qcClipQty,
                            unitPrice: 200000,
                            subtotal: qcClipQty * 200000
                        });

                        // 2. Chi phí quay phim (đầy đủ theo công thức)
                        const quayPrice = isSmall ? 1500000 : 3000000;
                        const quayQty = isSmall ? 1 : qcDays;
                        items.push({
                            id: 'qc_quay',
                            name: isSmall ? "Chi phí quay cố định (gồm quay phim & thiết bị)" : `Chi phí quay phim quảng cáo (${qcDays} ngày quay)`,
                            desc: isSmall ? "Trọn gói thiết bị, ánh sáng, nhân sự quay phim cơ bản cho 1-2 clips." : `Ekip quay chuyên nghiệp, camera Sony cao cấp & ánh sáng đầy đủ. Đơn giá: 3.000.000 đ/ngày.`,
                            qty: quayQty,
                            unitPrice: quayPrice,
                            subtotal: quayQty * quayPrice
                        });

                        // 3. Chi phí mẫu chính
                        if (qcMauQty > 0) {
                            const unitPrice = isSmall ? 1500000 : 2500000;
                            const totalQty = isSmall ? qcMauQty : (qcMauQty * qcDays);
                            items.push({
                                id: 'qc_mau',
                                name: `Diễn viên / Mẫu chính quay quảng cáo ${isSmall ? "" : `(${qcDays} ngày)`}`,
                                desc: isSmall ? "Mẫu diễn xuất hình thể, trải nghiệm sản phẩm. Đơn giá: 1.500.000 đ/người." : `Mẫu chính thương hiệu chuyên nghiệp. Đơn giá: 2.500.000 đ/người/ngày.`,
                                qty: totalQty,
                                unitPrice: unitPrice,
                                subtotal: totalQty * unitPrice
                            });
                        }

                        // 4. Chi phí mẫu phụ (mới)
                        if (qcExtraMauQty > 0) {
                            items.push({
                                id: 'qc_extra_mau',
                                name: `Diễn viên phụ quay quảng cáo (${qcDays} ngày)`,
                                desc: "Diễn viên phụ hỗ trợ diễn xuất, lấp đầy bối cảnh. Đơn giá: 1.000.000 đ/người/ngày.",
                                qty: qcExtraMauQty * qcDays,
                                unitPrice: 1000000,
                                subtotal: qcExtraMauQty * qcDays * 1000000
                            });
                        }

                        // 5. Dựng video hoàn thiện
                        items.push({
                            id: 'qc_dung',
                            name: "Dựng video quảng cáo hoàn thiện",
                            desc: "Hậu kỳ, cắt ghép, hiệu ứng chuyển cảnh, chèn nhạc bản quyền thương mại.",
                            qty: qcClipQty,
                            unitPrice: 300000,
                            subtotal: qcClipQty * 300000
                        });
                    }
                } 
                else if (activeCategory === 'XAY_KENH') {
                    categoryName = "Dịch Vụ Xây Kênh TikTok/Reels/Shorts";
                    let qty = 20;
                    let kbPrice = 200000;
                    let dungPrice = 300000;
                    let quayPrice = 5000000;
                    let pkgTitle = "";
                    let isCaoCap = false;

                    if (xkPackage === 'THUONG_20') {
                        qty = 20;
                        kbPrice = 200000;
                        dungPrice = 300000;
                        quayPrice = 5000000;
                        pkgTitle = "Gói Thường 20 Video";
                    } else if (xkPackage === 'THUONG_30') {
                        qty = 30;
                        kbPrice = 200000;
                        dungPrice = 300000;
                        quayPrice = 6000000;
                        pkgTitle = "Gói Thường 30 Video";
                    } else if (xkPackage === 'CAOCAP_20') {
                        qty = 20;
                        kbPrice = 250000;
                        dungPrice = 400000;
                        quayPrice = 4000000;
                        pkgTitle = "Gói Cao Cấp 20 Video";
                        isCaoCap = true;
                    } else if (xkPackage === 'CAOCAP_30') {
                        qty = 30;
                        kbPrice = 250000;
                        dungPrice = 400000;
                        quayPrice = 5000000;
                        pkgTitle = "Gói Cao Cấp 30 Video";
                        isCaoCap = true;
                    }

                    items.push({
                        id: 'xk_pkg_header',
                        name: "Hạng Mục Xây Kênh: " + pkgTitle + " / Tháng",
                        desc: "Dịch vụ sản xuất nội dung video ngắn trọn gói định kỳ.",
                        qty: 1,
                        unitPrice: 0,
                        subtotal: 0,
                        isHeader: true
                    });

                    items.push({
                        id: 'xk_kb',
                        name: "Biên soạn kịch bản video chi tiết (" + pkgTitle + ")",
                        desc: "Ý tưởng sáng tạo, lời thoại, bố cục phân cảnh và định hướng góc quay.",
                        qty: qty,
                        unitPrice: kbPrice,
                        subtotal: qty * kbPrice
                    });

                    items.push({
                        id: 'xk_quay',
                        name: "Quay phim & Thiết bị bối cảnh (" + pkgTitle + ")",
                        desc: "Nhân sự quay cùng hệ thống máy Sony chuyên dụng bối cảnh thực tế.",
                        qty: 1,
                        unitPrice: quayPrice,
                        subtotal: quayPrice
                    });

                    items.push({
                        id: 'xk_dung',
                        name: "Hậu kỳ dựng clip video hoàn thiện (" + pkgTitle + ")",
                        desc: "Cắt ghép, tinh chỉnh nhịp, chuyển cảnh, hiệu ứng âm thanh & nhạc thương mại.",
                        qty: qty,
                        unitPrice: dungPrice,
                        subtotal: qty * dungPrice
                    });

                    if (isCaoCap) {
                        items.push({
                            id: 'xk_quan_ly',

                            desc: "Hỗ trợ chuẩn hóa thông tin kênh, đăng tải nội dung chuẩn khung giờ vàng, seeding ban đầu định hướng và báo cáo phân tích hiệu suất.",
                            qty: 1,
                            unitPrice: 3000000,
                            subtotal: 3000000
                        });
                    }

                    if (xkModelNoVoiceDays > 0) {
                        items.push({
                            id: 'xk_add_model_novoice',
                            name: "Dịch vụ mẫu: Model không thoại",
                            desc: "Nhân sự mẫu diễn xuất hình thể, thực hiện liệu trình Spa, minh họa dịch vụ cận cảnh cơ thể/khuôn mặt.",
                            qty: xkModelNoVoiceDays,
                            unitPrice: 1500000,
                            subtotal: xkModelNoVoiceDays * 1500000
                        });
                    }
                    if (xkModelVoiceDays > 0) {
                        items.push({
                            id: 'xk_add_model_voice',
                            name: "Dịch vụ mẫu: Model MC thoại tốt",
                            desc: "Nhân sự mẫu dẫn kênh, giọng thoại chuẩn, lưu loát, ngoại hình sáng, truyền tải nội dung chuyên nghiệp.",
                            qty: xkModelVoiceDays,
                            unitPrice: 2500000,
                            subtotal: xkModelVoiceDays * 2500005
                        });
                    }
                } 
                else if (activeCategory === 'QUAY_BDS') {
                    categoryName = "Dịch Vụ Video Bất Động Sản";
                    const isQc = bdsSubCategory === 'QC_BDS';
                    
                    items.push({
                        id: 'bds_title',
                        name: isQc ? "Hạng Mục QUẢNG CÁO BẤT ĐỘNG SẢN" : "Hạng Mục XÂY KÊNH BẤT ĐỘNG SẢN",
                        desc: isQc ? "Hỗ trợ quảng bá dự án biệt thự, nhà phố sang trọng cần điểm nhấn visual lớn" : "Định hình kênh cá nhân môi giới, review nhà đất, cập nhật tiến độ liên tục",
                        qty: 1,
                        unitPrice: 0,
                        subtotal: 0,
                        isHeader: true
                    });

                    if (isQc) {
                        const kbPrice = 350000;
                        const dungPrice = 500000;
                        const quayPrice = 3000000;

                        const calculatedKbQty = bdsQcVideoQty;
                        const calculatedDungQty = bdsQcVideoQty;
                        const calculatedQuayDays = bdsQcVideoQty > 0 ? Math.ceil(bdsQcVideoQty / 6) : 0;

                        if (calculatedKbQty > 0) {
                            items.push({
                                id: 'bds_kb',
                                name: "Kịch bản BDS (Quảng Cáo)",
                                desc: "Ý tưởng giới thiệu tiện ích (Hệ thống tự động tính theo số lượng video). Đơn giá: " + formatVND(kbPrice) + "/kb.",
                                qty: calculatedKbQty,
                                unitPrice: kbPrice,
                                subtotal: calculatedKbQty * kbPrice
                            });
                        }
                        if (calculatedQuayDays > 0) {
                            items.push({
                                id: 'bds_quay',
                                name: "Quay lấy source không bao gồm flycam",
                                desc: `Quay phim bối cảnh dự án bất động sản bằng hệ thống Mirrorless chuyên dụng (Quy đổi tự động: tối đa 6 kịch bản/ngày). Đơn giá: 3.000.000 đ/ngày.`,

                    return;
                }

                const formattedItems = itemsToAdd.map(item => ({

            const handlePrint = () => {
                setActiveMenuId(null); // Đóng mọi menu trước khi xuất bản
                setIsGeneratingPDF(true);
                
                const element = document.getElementById('quote-paper-pdf');
                if (!element) {
                    setIsGeneratingPDF(false);
                    return;
                }

                if (typeof html2pdf === 'undefined') {
                    console.error("Thư viện html2pdf chưa được tải hoàn chỉnh. Đang thực thi in hệ thống...");
                    window.print();
                    setIsGeneratingPDF(false);
                    return;
                }

                if (window.getSelection) {
                    window.getSelection().removeAllRanges();
                }
                if (document.activeElement && document.activeElement.blur) {
                    document.activeElement.blur();
                }

                element.classList.add('export-crisp');

                const parentContainer = element.parentElement;
                const originalScrollTop = parentContainer ? parentContainer.scrollTop : 0;
                if (parentContainer) parentContainer.scrollTop = 0;
                
                const opt = {
                    margin:       10, 
                    filename:     (previewMode === 'QUOTE' ? "BaoGia_" : "Proposal_") + quoteId + "_UpMedia.pdf",
                    image:        { type: 'jpeg', quality: 1.0 }, 
                    html2canvas:  { 
                        scale: 3, 
                        useCORS: true, 
                        logging: false,
                        scrollY: 0,
                        scrollX: 0,
                        textRendering: 'geometricPrecision', 
                        devicePixelRatio: 3 
                    }, 
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' } 
                };
                
                html2pdf().set(opt).from(element).save().then(() => {
                    element.classList.remove('export-crisp');
                    setIsGeneratingPDF(false);
                    if (parentContainer) parentContainer.scrollTop = originalScrollTop; 
                }).catch(err => {
                    console.error("Lỗi xuất PDF: ", err);
                    element.classList.remove('export-crisp');
                    setIsGeneratingPDF(false);
                    if (parentContainer) parentContainer.scrollTop = originalScrollTop;
                });
            };

                    setIsGeneratingPNG(false);
                    return;
                }

                if (typeof html2canvas === 'undefined') {
                    console.error("Thư viện html2canvas chưa được tải hoàn chỉnh.");

                    return;
                }

                if (window.getSelection) {
                    window.getSelection().removeAllRanges();
                }

                    document.activeElement.blur();
                }

                element.classList.add('export-crisp');

                    backgroundColor: targetBg,

                    scrollX: 0,
                    textRendering: 'geometricPrecision',
                    devicePixelRatio: 3

                                            setOpenSuggestions(prev => ({ ...prev, [fieldKey]: false }));
                                        }}
                                        className={`w-full text-left text-xs p-2.5 rounded-lg transition-all duration-150 leading-relaxed flex items-start gap-2 border ${
                                            isSelected 
                                            ? "bg-amber-500/20 text-white border-amber-400 font-semibold shadow-md shadow-amber-500/5" 
                                            : "bg-zinc-950 text-zinc-300 border-zinc-800/80 hover:bg-amber-500/10 hover:text-white hover:border-amber-500/40"
                                        }`}
                                    >
                                        <span className="opacity-60 font-bold mt-0.5">{index + 1}.</span>
                                        <span>{suggestion}</span>
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex-grow flex flex-col md:flex-row min-h-screen relative overflow-x-hidden bg-black text-zinc-100">
                    
                    {/* CUSTOM ERROR MODAL (Cảnh báo khi bỏ trống trường bắt buộc như Tên Dự Án) */}
                    {showErrorModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-fadeIn no-print">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-2xl max-w-md w-full p-6 shadow-2xl relative">
                                <div className="text-center">
                                    <div className="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-amber-950/40 text-amber-400 mb-4 border border-amber-800">
                                        <svg className="h-6 w-6" fill="none" viewBox="0 0 24 24" strokeWidth="1.5" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
                                        </svg>
                                    </div>
                                    <h3 className="text-sm font-bold uppercase tracking-wider text-white mb-2">Thông báo</h3>
                                    <p className="text-xs text-zinc-300 leading-relaxed font-semibold uppercase">
                                        {errorMessage}
                                    </p>
                                </div>
                                <div className="mt-6">
                                    <button 
                                        onClick={() => {
                                            setShowErrorModal(false);
                                            setErrorMessage("");
                                        }}
                                        className="w-full bg-gradient-to-b from-amber-400 to-amber-500 hover:from-amber-500 hover:to-amber-600 text-zinc-950 font-bold py-2.5 px-4 rounded-lg text-xs uppercase transition-all duration-75 border-b-2 border-amber-700 active:border-b-0 active:translate-y-[2px]"
                                    >
                                        Đồng ý
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* CUSTOM MODAL CONFIRMATION (Xác nhận chuyển đổi dòng sản phẩm) */}
                    {showConfirmModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-fadeIn no-print">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-2xl max-w-md w-full p-6 shadow-2xl relative">
                                <div className="text-center">
                                    <div className="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-900/30 text-red-400 mb-4 border border-red-800">
                                        <svg className="h-6 w-6" fill="none" viewBox="0 0 24 24" strokeWidth="1.5" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
                                        </svg>
                                    </div>
                                    <h3 className="text-sm font-bold uppercase tracking-wider text-white mb-2">CẢNH BÁO THAY ĐỔI</h3>
                                    <p className="text-xs text-zinc-300 leading-relaxed uppercase">
                                        BÁO GIÁ TRƯỚC ĐÂY CỦA BẠN SẼ BỊ XÓA, BẠN CÓ MUỐN ĐỔI SẢN PHẨM?
                                    </p>
                                </div>
                                <div className="mt-6 flex flex-col sm:flex-row gap-3">
                                    <button 
                                        onClick={confirmCategoryChange}
                                        className="flex-1 bg-gradient-to-b from-red-500 to-red-600 hover:from-red-600 hover:to-red-700 text-white font-bold py-2.5 px-4 rounded-lg text-xs uppercase transition-all duration-75 border-b-2 border-red-800 active:border-b-0 active:translate-y-[2px]"
                                    >
                                        Đồng ý đổi
                                    </button>
                                    <button 
                                        onClick={cancelCategoryChange}
                                        className="flex-1 bg-zinc-850 hover:bg-zinc-800 text-zinc-300 font-medium py-2.5 px-4 rounded-lg text-xs uppercase transition-all duration-75 border border-zinc-800"
                                    >
                                        Hủy bỏ
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* LEFT PANEL: CONFIGURATOR (Hidden during print) */}
                    <div className="w-full md:w-[45%] bg-zinc-900 p-6 md:p-8 flex flex-col border-r border-zinc-800 no-print max-h-[calc(100vh-80px)] overflow-y-auto no-scrollbar pb-32">
                        
                        {/* Interactive Header */}
                        <div className="mb-8 border-b border-zinc-800 pb-6">
                            <div className="flex items-center gap-3 mb-2">
                                <span className="bg-gradient-to-b from-zinc-200 to-zinc-400 text-zinc-950 font-bold px-2.5 py-1 rounded text-xs tracking-wider border-b-2 border-zinc-500 shadow-sm">UP MEDIA</span>
                                <h1 className="text-xl font-bold font-montserrat tracking-tight text-white flex items-center gap-2">
                                    BÁO GIÁ DỊCH VỤ
                                </h1>
                            </div>
                            <p className="text-xs text-zinc-400">Thiết lập cấu hình quay dựng nhanh chóng và xuất báo giá chuyên nghiệp.</p>
                        </div>

                        {/* Customer Info Section */}
                        <div className="mb-6 bg-zinc-800 p-4 rounded-xl border border-zinc-800">
                            <h3 className="text-xs font-semibold tracking-wider text-zinc-200 uppercase mb-3 flex items-center gap-2 border-b border-zinc-700 pb-2">
                                Thông Tin Khách Hàng & Dự Án
                            </h3>
                            <div className="grid grid-cols-1 gap-3 text-sm">
                                <div>
                                    <label className="block text-xs text-zinc-400 mb-1">Tên Đơn vị / Đối tác / Khách hàng</label>
                                    <input 
                                        type="text" 
                                        value={clientName} 
                                        onChange={(e) => setClientName(e.target.value)}
                                        className="w-full bg-black border border-zinc-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-zinc-400 text-xs" 
                                        placeholder="Công ty, đối tác..."
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs text-zinc-400 mb-1">Người đại diện / SĐT</label>
                                    <input 
                                        type="text" 
                                        value={clientContact} 
                                        onChange={(e) => setClientContact(e.target.value)}
                                        className="w-full bg-black border border-zinc-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-zinc-400 text-xs" 
                                        placeholder="Tên, số điện thoại..."
                                    />
                                </div>
                                <div>
                                    <div className="flex justify-between items-center mb-1">
                                        <label className="block text-xs text-zinc-400">Tên Dự Án Truyền Thông <span className="text-red-500 font-bold">*</span></label>
                                        <span className="text-[10px] text-amber-500 font-semibold uppercase">Yêu cầu nhập</span>
                                    </div>
                                    <input 
                                        type="text" 
                                        value={projectName} 
                                        onChange={(e) => setProjectName(e.target.value)}
                                        className="w-full bg-black border border-zinc-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-zinc-400 text-xs font-medium" 
                                        placeholder="Tên dự án thực hiện..."
                                    />
                                </div>
                            </div>
                        </div>

                        {/* MENU CHỌN SẢN PHẨM CHÍNH */}
                        <div className="mb-6 bg-zinc-800 p-4 rounded-xl border border-zinc-800">
                            <label className="block text-xs font-bold uppercase tracking-wider text-zinc-200 mb-3 border-b border-zinc-700 pb-2">
                                Dòng Sản Phẩm Cấu Hình
                            </label>
                            <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                                <button onClick={() => handleCategoryClick('QUANG_CAO')} className={getTabClass('QUANG_CAO')}>QUẢNG CÁO</button>
                                <button onClick={() => handleCategoryClick('XAY_KENH')} className={getTabClass('XAY_KENH')}>XÂY KÊNH</button>
                                <button onClick={() => handleCategoryClick('QUAY_BDS')} className={getTabClass('QUAY_BDS')}>QUAY BDS</button>
                                <button onClick={() => handleCategoryClick('EVENT')} className={getTabClass('EVENT')}>EVENT</button>
                                <button onClick={() => handleCategoryClick('THOI_TRANG')} className={getTabClass('THOI_TRANG')}>THỜI TRANG</button>
                                <button onClick={() => handleCategoryClick('DICH_VU_LE')} className={getTabClass('DICH_VU_LE')}>DỊCH VỤ LẺ</button>
                            </div>
                        </div>

                        {/* SUB-CONFIGURATORS BASED ON ACTIVE CATEGORY */}
                        <div className="space-y-6">
                            
                            {/* ACTIVE TAB SUMMARY */}
                            <div className="flex items-center justify-between border-b border-zinc-800 pb-3">
                                <h2 className="text-sm font-bold font-montserrat text-white">
                                    Cấu Hình: {activeCategory === 'DICH_VU_LE' ? 'DỊCH VỤ LẺ' : activeCategory.replace('_', ' ')}
                                </h2>
                                <span className="text-xs bg-zinc-800 text-zinc-300 px-2.5 py-1 rounded font-medium border border-zinc-700">
                                    Giá tạm tính: <strong className="text-zinc-200">{formatVND(activeCalculation.total)}</strong>
                                </span>
                            </div>

                            {/* CATEGORY 1: QUẢNG CÁO */}
                            {activeCategory === 'QUANG_CAO' && (
                                <div className="space-y-4 animate-fadeIn">
                                    <div>
                                        <label className="block text-xs font-semibold text-zinc-300 mb-2 uppercase">Số lượng clip quảng cáo cần thực hiện</label>
                                        <p className="text-[10px] text-zinc-400 mb-2">
                                            Hệ thống tự động quy đổi số kịch bản, số bản dựng và ngày quay (Đạt từ 11 clips trở lên sẽ tự động nâng lên 2 ngày quay và 2 ngày mẫu).
                                        </p>
                                        <div className="flex items-center gap-2">
                                            <button onClick={() => setQcClipQty(Math.max(0, qcClipQty - 1))} className="bg-gradient-to-b from-zinc-600 to-zinc-700 text-white border-b-2 border-zinc-800 active:border-b-0 active:translate-y-[2px] w-8 h-8 rounded flex items-center justify-center text-sm font-bold">-</button>
                                            <input type="number" min="0" value={qcClipQty} onChange={(e) => setQcClipQty(parseInt(e.target.value) || 0)} className="w-16 bg-black border border-zinc-800 text-center rounded text-xs text-white p-2" />
                                            <button onClick={() => setQcClipQty(qcClipQty + 1)} className="bg-gradient-to-b from-zinc-600 to-zinc-700 text-white border-b-2 border-zinc-800 active:border-b-0 active:translate-y-[2px] w-8 h-8 rounded flex items-center justify-center text-sm font-bold">+</button>
                                        </div>
                                    </div>

                                    <div className="space-y-3 bg-zinc-800 p-4 rounded-xl border border-zinc-800">
                                        <div className="flex items-center justify-between py-2 border-b border-zinc-700">
                                            <div>
                                                <span className="block text-xs font-medium text-white">Số lượng Diễn Viên / Mẫu chính</span>
                                                <span className="text-[10px] text-zinc-400">
                                                    {qcClipQty <= 2 ? 'Đơn giá: 1.500.000 đ / người' : 'Đơn giá: 2.500.000 đ / người / ngày'}
                                                </span>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <button onClick={() => setQcMauQty(Math.max(0, qcMauQty - 1))} className="bg-gradient-to-b from-zinc-600 to-zinc-700 text-white border-b-2 border-zinc-800 active:border-b-0 active:translate-y-[4px] w-6 h-6 rounded flex items-center justify-center text-xs font-bold">-</button>
                                                <input type="number" min="0" value={qcMauQty} onChange={(e) => setQcMauQty(parseInt(e.target.value) || 0)} className="w-12 bg-black border border-zinc-800 text-center rounded text-xs text-white p-1" />
                                                <button onClick={() => setQcMauQty(qcMauQty + 1)} className="bg-gradient-to-b from-zinc-600 to-zinc-700 text-white border-b-2 border-zinc-800 active:border-b-0 active:translate-y-[4px] w-6 h-6 rounded flex items-center justify-center text-xs font-bold">+</button>
                                            </div>
                                        </div>

                                        <div className="flex items-center justify-between py-2">
                                            <div>
                                                <span className="block text-xs font-medium text-white">Số lượng Diễn viên phụ</span>
                                                <span className="text-[10px] text-zinc-400">Đơn giá: 1.000.000 đ / người / ngày</span>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <button onClick={() => setQcExtraMauQty(Math.max(0, qcExtraMauQty - 1))} className="bg-gradient-to-b from-zinc-600 to-zinc-700 text-white border-b-2 border-zinc-800 active:border-b-0 active:translate-y-[4px] w-6 h-6 rounded flex items-center justify-center text-xs font-bold">-</button>
                                                <input type="number" min="0" value={qcExtraMauQty} onChange={(e) => setQcExtraMauQty(parseInt(e.target.value) || 0)} className="w-12 bg-black border border-zinc-800 text-center rounded text-xs text-white p-1" />
                                                <button onClick={() => setQcExtraMauQty(qcExtraMauQty + 1)} className="bg-gradient-to-b from-zinc-600 to-zinc-700 text-white border-b-2 border-zinc-800 active:border-b-0 active:translate-y-[4px] w-6 h-6 rounded flex items-center justify-center text-xs font-bold">+</button>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Bảng tính toán ước lượng quảng cáo trực quan */}
                                    {qcClipQty > 0 && (
                                        <div className="bg-black/40 p-3 rounded-lg border border-zinc-850 text-[11px] text-zinc-300 space-y-1">
                                            <span className="block font-bold text-zinc-400 uppercase text-[10px] tracking-wider mb-1">Bảng Dự Toán Tự Động (Quảng Cáo):</span>
                                            <div>• Số lượng kịch bản (200k/kb): <strong className="text-white">{qcClipQty} kịch bản</strong></div>
                                            <div>• Số clip cần dựng hoàn thiện (300k/clip): <strong className="text-white">{qcClipQty} clip</strong></div>
                                            <div>• Số ngày quay cần thiết: <strong className="text-white">{qcClipQty >= 11 ? 2 : 1} ngày</strong></div>
                                            <div className="pt-1.5 border-t border-zinc-800 mt-1.5 space-y-0.5">
                                                <div>• Ngân sách kịch bản: <strong className="text-white">{formatVND(qcClipQty * 200000)}</strong></div>
                                                <div>• Ngân sách quay: <strong className="text-white">{formatVND(qcClipQty <= 2 ? 1500000 : (qcClipQty >= 11 ? 2 * 3000000 : 3000000))}</strong></div>
                                                <div>• Ngân sách mẫu chính: <strong className="text-white">{formatVND(qcClipQty <= 2 ? qcMauQty * 1500000 : qcMauQty * (qcClipQty >= 11 ? 2 : 1) * 2500000)}</strong></div>
                                                {qcExtraMauQty > 0 && (
                                                    <div>• Ngân sách diễn viên phụ: <strong className="text-white">{formatVND(qcExtraMauQty * (qcClipQty >= 11 ? 2 : 1) * 1000000)}</strong></div>
                                                )}
                                                <div>• Ngân sách dựng: <strong className="text-white">{formatVND(qcClipQty * 300000)}</strong></div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* CATEGORY 2: XÂY KÊNH */}
                            {activeCategory === 'XAY_KENH' && (
                                <div className="space-y-4 animate-fadeIn">
                                    <label className="block text-xs font-semibold text-zinc-300 uppercase">Lựa chọn gói dịch vụ xây kênh tháng</label>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                        <div onClick={() => setXkPackage('THUONG_20')} className={getXkPackageClass('THUONG_20')}>
                                            <div>
                                                <div className="flex justify-between items-start mb-1">
                                                    <span className="text-xs font-bold uppercase tracking-wider text-zinc-100">Gói Thường</span>
                                                    <span className="bg-zinc-900 text-zinc-300 text-[9px] px-1.5 py-0.5 rounded font-semibold border border-zinc-800">20 Video</span>
                                                </div>
                                                <p className="text-[10px] text-zinc-400 line-clamp-2 mb-2">Sony | Chuẩn 4K / 30 FPS (8 bit). Đã bao gồm kịch bản, quay và dựng.</p>
                                            </div>
                                            <div className="text-xs font-bold text-zinc-300 mt-2 border-t border-slate-800 pt-2 flex justify-between">
                                                <span>Chi phí trọn gói:</span><span>15.000.000 đ</span>
                                            </div>
                                        </div>

                                        <div onClick={() => setXkPackage('THUONG_30')} className={getXkPackageClass('THUONG_30')}>
                                            <div>
                                                <div className="flex justify-between items-start mb-1">
                                                    <span className="text-xs font-bold uppercase tracking-wider text-zinc-100">Gói Thường</span>
                                                    <span className="bg-zinc-900 text-zinc-300 text-[9px] px-1.5 py-0.5 rounded font-semibold border border-zinc-800">30 Video</span>
                                                </div>
                                                <p className="text-[10px] text-zinc-400 line-clamp-2 mb-2">Sony | Chuẩn 4K / 30 FPS (8 bit). Tối ưu hóa tần suất phủ sóng liên tục.</p>
                                            </div>
                                            <div className="text-xs font-bold text-zinc-300 mt-2 border-t border-slate-800 pt-2 flex justify-between">
                                                <span>Chi phí trọn gói:</span><span>21.000.000 đ</span>
                                            </div>
                                        </div>

                                        <div onClick={() => setXkPackage('CAOCAP_20')} className={getXkPackageClass('CAOCAP_20')}>
                                            <div>
                                                <div className="flex justify-between items-start mb-1">
                                                    <span className="text-xs font-bold uppercase tracking-wider text-zinc-100">Gói Cao Cấp</span>
                                                    <span className="bg-zinc-900 text-zinc-300 text-[9px] px-1.5 py-0.5 rounded font-semibold border border-zinc-800">20 Video</span>
                                                </div>
                                                <p className="text-[10px] text-zinc-400 line-clamp-2 mb-2">Sony Đời Mới | 4K / 60 FPS (10 bit 4:2:2). Gồm kịch bản (250k/v), dựng (400k/v) & Quản lý kênh (3tr).</p>
                                            </div>
                                            <div className="text-xs font-bold text-zinc-300 mt-2 border-t border-slate-800 pt-2 flex justify-between">
                                                <span>Chi phí trọn gói:</span><span>20.000.000 đ</span>
                                            </div>
                                        </div>

                                        <div onClick={() => setXkPackage('CAOCAP_30')} className={getXkPackageClass('CAOCAP_30')}>
                                            <div>
                                                <div className="flex justify-between items-start mb-1">
                                                    <span className="text-xs font-bold uppercase tracking-wider text-zinc-100">Gói Cao Cấp</span>
                                                    <span className="bg-zinc-900 text-zinc-300 text-[9px] px-1.5 py-0.5 rounded font-semibold border border-zinc-800">30 Video</span>
                                                </div>
                                                <p className="text-[10px] text-zinc-400 line-clamp-2 mb-2">Đảm bảo tần suất dày đặc lẫn chất lượng hình ảnh thẩm mỹ đỉnh cao. Gồm kịch bản (250k/v), dựng (400k/v) & Quản lý kênh (3tr).</p>
                                            </div>
                                            <div className="text-xs font-bold text-zinc-300 mt-2 border-t border-slate-800 pt-2 flex justify-between">
                                                <span>Chi phí trọn gói:</span><span>27.500.000 đ</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-zinc-800 p-4 rounded-xl border border-zinc-800 space-y-3.5 mt-2">
                                        <h4 className="text-xs font-semibold text-zinc-300 tracking-wider uppercase">Dịch vụ Nhân sự mẫu đi kèm (Tùy Chọn)</h4>
                                        <div className="flex items-center justify-between py-1.5 border-b border-zinc-700">
                                            <div>
                                                <span className="block text-xs font-medium text-white">Model Không Thoại</span>
                                                <span className="text-[10px] text-zinc-400">Diễn xuất body, spa, minh họa... | 1.5tr/ngày</span>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <button onClick={() => setXkModelNoVoiceDays(Math.max(0, xkModelNoVoiceDays - 1))} className="bg-gradient-to-b from-zinc-600 to-zinc-700 text-white border-b-2 border-zinc-800 active:border-b-0 active:translate-y-[2px] w-6 h-6 rounded flex items-center justify-center text-xs font-bold">-</button>
                                                <input type="number" min="0" value={xkModelNoVoiceDays} onChange={(e) => setXkModelNoVoiceDays(parseInt(e.target.value) || 0)} className="w-10 bg-black border border-zinc-800 text-center rounded text-xs text-white p-0.5" />
                                                <button onClick={() => setXkModelNoVoiceDays(xkModelNoVoiceDays + 1)} className="bg-gradient-to-b from-zinc-600 to-zinc-700 text-white border-b-2 border-zinc-800 active:border-b-0 active:translate-y-[2px] w-6 h-6 rounded flex items-center justify-center text-xs font-bold">+</button>
                                            </div>
                                        </div>

                                        <div className="flex items-center justify-between py-1.5">
                                            <div>
                                                <span className="block text-xs font-medium text-white">Model MC Thoại Tốt</span>
                                                <span className="text-[10px] text-zinc-400">Dẫn kênh, lưu loát, ngoại hình sáng | 2.5tr/ngày</span>
                                            </div>
