        body {

        }

        /* Định dạng tối ưu riêng biệt cho khổ giấy A4 chuẩn khi in */

<body class="bg-black text-zinc-100 min-h-screen flex flex-col antialiased">

    <div id="root" class="flex-grow flex flex-col"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            // Thông tin nhà cung cấp dịch vụ
            const [providerName, setProviderName] = useState("UP MEDIA");

            // Thông tin khách hàng và định danh báo giá - Mặc định để trống hoàn toàn theo yêu cầu
            const [clientName, setClientName] = useState("");
            const [clientContact, setClientContact] = useState("");
            const [projectName, setProjectName] = useState("");
            const [quoteId, setQuoteId] = useState(`BG-26-${Math.floor(1000 + Math.random() * 9000)}`);
            const [quoteDate, setQuoteDate] = useState(new Date().toLocaleDateString('vi-VN'));

            // Trạng thái của Tab sản phẩm hiện tại
            const [activeCategory, setActiveCategory] = useState('QUANG_CAO'); // QUANG_CAO, XAY_KENH, QUAY_BDS, EVENT, THOI_TRANG, DICH_VU_LE
            const [activeMenuId, setActiveMenuId] = useState(null); // Quản lý ID dòng đang được click để chọn menu ẩn

            // Trạng thái modal cảnh báo chuyển đổi Dòng Sản Phẩm Cấu Hình
            const [showConfirmModal, setShowConfirmModal] = useState(false);
            const [pendingCategory, setPendingCategory] = useState(null);

            // Danh sách hóa đơn tích lũy được hợp nhất
            const [invoiceItems, setInvoiceItems] = useState([]);
            const [discountPercent, setDiscountPercent] = useState(0);
            const [vatPercent, setVatPercent] = useState(0); // Mặc định không có VAT (0%)
            const [note, setNote] = useState("Báo giá trên chưa bao gồm chi phí di chuyển ngoại thành hoặc đi tỉnh.");
            const [showTotal, setShowTotal] = useState(true); 
            
            // Trạng thái hiệu ứng xuất file
            const [isGeneratingPDF, setIsGeneratingPDF] = useState(false);
            const [isGeneratingPNG, setIsGeneratingPNG] = useState(false);

            // 1. STATE CHO GÓI QUẢNG CÁO - Cập nhật mặc định các tùy chọn số lượng bằng 0
            const [qcOption, setQcOption] = useState('1_2_CLIPS'); 
            const [qcMauQty, setQcMauQty] = useState(0); 
            const [qcIncludeQuay, setQcIncludeQuay] = useState(false);
            const [qcDungQty, setQcDungQty] = useState(0);
            const [qcKichBanQty, setQcKichBanQty] = useState(0);

            // 2. STATE CHO GÓI XÂY KÊNH - Cập nhật mặc định các tùy chọn số lượng bằng 0
            const [xkPackage, setXkPackage] = useState('THUONG_20'); 
            const [xkModelNoVoiceDays, setXkModelNoVoiceDays] = useState(0);
            const [xkModelVoiceDays, setXkModelVoiceDays] = useState(0);

            // 3. STATE CHO GÓI QUAY BẤT ĐỘNG SẢN - Cập nhật mặc định các tùy chọn số lượng bằng 0
            const [bdsSubCategory, setBdsSubCategory] = useState('QC_BDS'); 
            const [bdsQcVideoQty, setBdsQcVideoQty] = useState(0); // Số lượng video quảng cáo tự động hóa
            const [bdsXkVideoQty, setBdsXkVideoQty] = useState(0); // Số lượng video xây kênh tự động hóa (Mới)
            const [bdsKichBanQty, setBdsKichBanQty] = useState(0);
            const [bdsDungQty, setBdsDungQty] = useState(0);
            const [bdsQuayDays, setBdsQuayDays] = useState(0);
            const [bdsFlycamDays, setBdsFlycamDays] = useState(0);
            const [bdsMauDays, setBdsMauDays] = useState(0);

            // 4. STATE CHO GÓI SỰ KIỆN (EVENT) - Cập nhật mặc định các tùy chọn số lượng bằng 0
            const [eventPackage, setEventPackage] = useState('GOI_1'); 
            const [eventDuration, setEventDuration] = useState('HALF_DAY'); 
            const [eventFlycamDays, setEventFlycamDays] = useState(0); 

            // 5. STATE CHO DÒNG THỜI TRANG (MỚI THÊM)
            const [ttProductQty, setTtProductQty] = useState(0);
            const [ttStudioQty, setTtStudioQty] = useState(0); // Thay đổi từ boolean sang số lượng

            // 6. STATE CHO DỊCH VỤ LẺ - Cập nhật mặc định các tùy chọn số lượng bằng 0
            const [dlQuayOption, setDlQuayOption] = useState('NONE'); 
            const [dlDungQty, setDlDungQty] = useState(0);
            const [dlKichBanQty, setDlKichBanQty] = useState(0);
            const [dlMauOption, setDlMauOption] = useState('HALF_DAY'); 
            const [dlMauQty, setDlMauQty] = useState(0);
            const [dlCustomName, setDlCustomName] = useState(""); // Tên dịch vụ ngoài hệ thống (Mới)
            const [dlCustomPrice, setDlCustomPrice] = useState(0); // Đơn giá dịch vụ ngoài hệ thống (Mới)
            const [dlCustomDesc, setDlCustomDesc] = useState("Dịch vụ phát sinh ngoài hệ thống cấu hình theo yêu cầu thực tế của đối tác."); // Mô tả dịch vụ tự tạo/AI tạo
            const [isGeneratingDesc, setIsGeneratingDesc] = useState(false); // Trạng thái AI đang tải mô tả
            const [aiError, setAiError] = useState(""); // Thông báo lỗi AI nếu có

            // --- TRẠNG THÁI MỚI CHO PROPOSAL ---
            const [showProposalConfig, setShowProposalConfig] = useState(false);
            const [proposalTone, setProposalTone] = useState('TRANG_DEN'); // TRANG_DEN, NAU_VANG, XANH_TRANG
            const [previewMode, setPreviewMode] = useState('QUOTE'); // 'QUOTE' or 'PROPOSAL'
            
            // Các trường thông tin của đề xuất dự án
            const [propObjective, setPropObjective] = useState("");
            const [propTarget, setPropTarget] = useState("");
            const [propMessage, setPropMessage] = useState("");
            const [propDirection, setPropDirection] = useState("");
            const [propTerms, setPropTerms] = useState(
                "1. Thanh toán: Tạm ứng 50% chi phí sau khi thống nhất kịch bản. Thanh toán 50% còn lại sau khi nghiệm thu bàn giao.\n" +
                "2. Chỉnh sửa: Đã bao gồm tối đa 02 lần chỉnh sửa dựa trên kịch bản ban đầu. Các yêu cầu thay đổi cốt kịch bản sau khi đã quay sẽ tính phí phát sinh.\n" +
                "3. Bản quyền: UP MEDIA cam kết sử dụng nhạc nền bản quyền thương mại. Khách hàng sở hữu hoàn bộ bản quyền sử dụng thành phẩm sau khi thanh toán đầy đủ."
            );

            // Tự động gợi ý định hướng sản xuất mặc định dựa trên tab dòng sản phẩm
            const defaultDirections = {
                QUANG_CAO: "Tập trung xây dựng visual bắt mắt ngay 3 giây đầu tiên để giữ chân người xem. Sử dụng góc quay đặc tả sản phẩm kết hợp bối cảnh năng động, nhịp hậu kỳ mượt mà kết hợp hiệu ứng chữ hiện đại nhằm kích thích hành vi chuyển đổi.",
                XAY_KENH: "Thiết lập tính nhất quán từ MC dẫn dắt, bối cảnh studio tối giản và ánh sáng ấm áp. Kịch bản tối ưu hóa định dạng 9:16 trên nền tảng di động, bổ sung phụ đề hiệu ứng động (kinetic typography) và nhạc xu hướng để giữ chân người xem trọn vẹn.",
                QUAY_BDS: "Khai thác tối đa vẻ đẹp kiến trúc và quy mô dự án. Ứng dụng công nghệ quay steadycam chống rung mượt mà ở mặt đất kết hợp các góc bay flycam bao quát từ trên cao. Căn màu sắc điện ảnh ấm áp sang trọng làm nổi bật vị thế bất động sản.",
                EVENT: "Tác nghiệp đa dạng các góc máy bám sát toàn bộ hoạt động chính của sự kiện. Ghi lại tự nhiên các khoảnh khắc cảm xúc chân thực của khách mời và ban tổ chức. Phần dựng recap cô đọng có cao trào, lồng nhạc nền không khí sôi động bùng nổ.",
                THOI_TRANG: "Tập trung khai thác phom dáng, chất liệu và chuyển động tinh tế của trang phục. Áp dụng kỹ thuật ánh sáng studio high-fashion cao cấp, phối hợp các góc quay lookbook chuyển động nhịp nhàng cùng model. Biên tập hậu kỳ cuốn hút, màu sắc thời thượng bắt kịp xu thế thương mại thời trang hiện đại.",
                DICH_VU_LE: "Cấu hình sản xuất và hậu kỳ chuyên biệt được thiết kế may đo tỉ mỉ bám sát mọi yêu cầu phát sinh từ khách hàng, cam kết tiến độ bàn giao nhanh chóng và chất lượng hiển thị chuẩn sắc nét thương mại."
            };

            const computedDirection = useMemo(() => {
                if (propDirection.trim() !== "") return propDirection;
                return defaultDirections[activeCategory] || defaultDirections.DICH_VU_LE;
            }, [activeCategory, propDirection]);

            // Bảng phong cách màu sắc cho Proposal
            const toneStyles = {
                TRANG_DEN: {
                    bg: "bg-white",
                    textMain: "text-slate-900",
                    textMuted: "text-slate-500",
                    accentBg: "bg-slate-900",
                    accentText: "text-white",
                    border: "border-slate-200",
                    secBg: "bg-slate-50",
                    badgeBg: "bg-slate-100",
                    badgeText: "text-slate-800"
                },
                NAU_VANG: {
                    bg: "bg-[#FAF6F0]", 
                    textMain: "text-[#3E2723]", 
                    textMuted: "text-[#8D6E63]", 
                    accentBg: "bg-[#4E342E]", 
                    accentText: "text-[#FFD700]", 
                    border: "border-[#D7CCC8]", 
                    secBg: "bg-[#F5EBE0]", 
                    badgeBg: "bg-[#EFE3C3]", 
                    badgeText: "text-[#5D4037]"
                },
                XANH_TRANG: {
                    bg: "bg-white", 
                    textMain: "text-[#0F172A]", 
                    textMuted: "text-[#475569]", 
                    accentBg: "bg-[#1E3A8A]", 
                    accentText: "text-white", 
                    border: "border-[#E2E8F0]",
                    secBg: "bg-[#F1F5F9]", 
                    badgeBg: "bg-[#DBEAFE]", 
                    badgeText: "text-[#1E40AF]"
                }
            };

            // Hàm gọi AI (Gemini 2.5 Flash) để tự động sinh mô tả dịch vụ bằng tiếng Việt
            const generateDescriptionWithAI = async (serviceName) => {
                if (!serviceName.trim()) return;
                setIsGeneratingDesc(true);
                setAiError("");

                const apiKey = ""; // API key được gán tự động tại môi trường runtime
                const systemPrompt = "Bạn là trợ lý viết nội dung chuyên nghiệp cho UP MEDIA. Hãy soạn đúng 1 câu mô tả dịch vụ ngắn gọn, cô đọng, chuyên nghiệp và có tính thương mại cao (dưới 25 từ) bằng tiếng Việt cho dịch vụ có tên: \"" + serviceName + "\". Chỉ trả về đúng câu mô tả, không thêm tiêu đề, dẫn dắt hay dấu ngoặc kép.";

                const payload = {
                    contents: [{ parts: [{ text: `Viết mô tả hấp dẫn cho dịch vụ: ${serviceName}` }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                };

                const fetchWithRetry = async (retries = 5, delay = 1000) => {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (!response.ok) {
                            throw new Error("HTTP error " + response.status);
                        }

                        const result = await response.json();
                        const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (text) {
                            // Làm sạch văn bản (loại bỏ ngoặc kép hoặc các ký tự markdown thừa)
                            const cleanedText = text.trim()
                                .replace(/^"|"$/g, '')
                                .replace(/^\*+|\*+$/g, '')
                                .trim();
                            setDlCustomDesc(cleanedText);
                        } else {
                            throw new Error("Invalid response format");
                        }
                    } catch (err) {
                        if (retries > 0) {
                            await new Promise(resolve => setTimeout(resolve, delay));
                            return fetchWithRetry(retries - 1, delay * 2);
                        } else {
                            setAiError("Không thể kết nối AI để tạo mô tả tự động. Bạn hãy nhập tay nhé.");
                        }
                    }
                };

                await fetchWithRetry();
                setIsGeneratingDesc(false);
            };

            // Hàm kết xuất đồ họa Timeline trực quan
            const renderTimeline = (tone) => {
                const steps = {
                    QUANG_CAO: [
                        { title: "Giai đoạn 1: Brief & Kịch Bản", desc: "Thống nhất ý tưởng chủ đạo, kịch bản chi tiết và phân cảnh góc quay.", duration: "Ngày 1 - 3" },
                        { title: "Giai đoạn 2: Casting & Tiền Kỳ", desc: "Chuẩn bị mẫu diễn xuất, lựa chọn bối cảnh phù hợp và setup thiết bị.", duration: "Ngày 4 - 5" },
                        { title: "Giai đoạn 3: Sản Xuất Quay Hình", desc: "Triển khai ekip quay phim mặt đất chuyên nghiệp tại hiện trường.", duration: "Ngày 6 - 7" },
                        { title: "Giai đoạn 4: Hậu Kỳ & Bàn Giao", desc: "Dựng thô, chỉnh màu sắc, chèn âm thanh bản quyền và bàn giao final.", duration: "Ngày 8 - 10" }
                    ],
                    XAY_KENH: [
                        { title: "Giai đoạn 1: Lên Ý Tưởng & Kịch Bản", desc: "Nghiên cứu thị trường kịch bản tuần tự theo cam kết của gói dịch vụ tháng.", duration: "Tuần 1" },
                        { title: "Giai đoạn 2: Quay Cuốn Chiếu", desc: "Bấm máy quay tập trung toàn bộ kịch bản tại studio bối cảnh dựng sẵn.", duration: "Tuần 2" },
                        { title: "Giai đoạn 3: Biên Tập Hậu Kỳ", desc: "Cắt dựng nhịp mượt, chèn nhạc, phụ đề chuyển động kích thích người xem.", duration: "Tuần 3" },
                        { title: "Giai đoạn 4: Đăng Tải & Nghiệm Thu", desc: "Hướng dẫn tối ưu kênh đăng tải, nghiệm thu bàn giao và đánh giá chỉ số.", duration: "Tuần 4" }
                    ],
                    QUAY_BDS: [
                        { title: "Giai đoạn 1: Định Hướng & Khảo Sát", desc: "Khảo sát thực tế hướng sáng, định hình các góc di chuyển máy tối ưu bối cảnh.", duration: "Ngày 1 - 2" },
                        { title: "Giai đoạn 2: Quay Source Hình Ảnh", desc: "Quay phim mặt đất kết hợp cất cánh flycam lấy toàn cảnh dự án quy mô.", duration: "Ngày 3 - 4" },
                        { title: "Giai đoạn 3: Hậu Kỳ Chuyên Sâu", desc: "Căn màu sang trọng, chèn kịch bản MC lồng tiếng, bổ sung thông số dự án.", duration: "Ngày 5 - 7" },
                        { title: "Giai đoạn 4: Bàn Giao Thành Phẩm", desc: "Khách hàng duyệt phân bản thô, tối ưu hoàn chỉnh và giao video gốc.", duration: "Ngày 8" }
                    ],
                    EVENT: [
                        { title: "Giai đoạn 1: Thống Nhất Timeline", desc: "Tiếp nhận timeline sự kiện chi tiết từ ban tổ chức để báo trí góc máy sẵn.", duration: "Trước 1 ngày" },
                        { title: "Giai đoạn 2: Tác Nghiệp Sự Kiện", desc: "Ghi nhận đầy đủ chuỗi hoạt động chính, bắt trọn khoảnh khắc vàng.", duration: "Ngày diễn ra" },
                        { title: "Giai đoạn 3: Hậu Kỳ Recap & Ảnh", desc: "Bàn giao file ảnh thô đã căn chỉnh màu sắc và dựng video recap cô đọng.", duration: "Ngày 1 - 2" },
                        { title: "Giai đoạn 4: Đóng File Hoàn Thiện", desc: "Gửi toàn bộ album ảnh nét chất lượng cao và file video recap final.", duration: "Ngày 3 - 4" }
                    ],
                    THOI_TRANG: [
                        { title: "Giai đoạn 1: Lên Ý Tưởng & Phối Đồ", desc: "Thống nhất layout makeup, định hình moodboard ánh sáng và bối cảnh phù hợp bộ sưu tập.", duration: "Ngày 1 - 2" },
                        { title: "Giai đoạn 2: Tác Nghiệp Studio/On-set", desc: "Tiến hành quay cuốn chiếu chi tiết các sản phẩm thời trang cùng mẫu và ekip.", duration: "Ngày 3 - 4" },

                else if (activeCategory === 'EVENT') {
                    categoryName = "Dịch Vụ Quay Chụp Sự Kiện (Event)";
                    const isGoi1 = eventPackage === 'GOI_1';
                    const isHalf = eventDuration === 'HALF_DAY';
                    let durationTitle = isHalf ? "Nửa ngày" : "Nguyên ngày";
                    
                    let pkgTitle = isGoi1 ? "Gói Cơ Bản (1 quay 1 chụp)" : "Gói Cao Cấp (2 quay 1 chụp)";
                    
                    let quayPrice = 0;
                    let chupPrice = 0;
                    let dungPrice = 0;

                    if (isGoi1) {
                        if (isHalf) {
                            quayPrice = 3000000;
                            chupPrice = 1500000;
                            dungPrice = 500000;
                        } else {
                            quayPrice = 5000000;
                            chupPrice = 2500005;
                            dungPrice = 500000;
                        }
                    } else {
                        if (isHalf) {
                            quayPrice = 5000000;
                            chupPrice = 2000000;
                            dungPrice = 1000000;
                        } else {
                            quayPrice = 8000000;
                            chupPrice = 2500005;
                            dungPrice = 1500005;
                        }
                    }

                    items.push({
                        id: 'event_pkg_header',
                        name: "Hạng Mục Sự Kiện: " + pkgTitle + " - " + durationTitle,
                        desc: "Ghi hình và chụp ảnh tư liệu sự kiện chuyên nghiệp. Cả 2 gói đều không bao gồm Flycam.",
                        qty: 1,
                        unitPrice: 0,
                        subtotal: 0,
                        isHeader: true
                    });

                    items.push({
                        id: 'event_quay',
                        name: isGoi1 ? "Nhân sự quay phim sự kiện (01 Máy - " + durationTitle + ")" : "Nhân sự quay phim sự kiện (02 Máy - " + durationTitle + ")",
                        desc: isGoi1 
                            ? "01 Thợ quay chính, thiết bị tiêu chuẩn cao, bám sát chương trình. Không bao gồm flycam."
                            : "02 Thợ quay chính (2 góc máy độc lập), thiết bị cao cấp, bám sát chương trình. Không bao gồm flycam.",
                        qty: 1,
                        unitPrice: quayPrice,
                        subtotal: quayPrice
                    });

                    items.push({
                        id: 'event_chup',
                        name: isGoi1 ? "Nhân sự chụp hình sự kiện (" + durationTitle + ")" : "Nhân sự chụp hình sự kiện (01 Máy - " + durationTitle + ")",
                        desc: "01 Thợ chụp chính bám sát hiện trường, ghi nhận toàn bộ khoảnh khắc chính và bàn giao file ảnh đã chỉnh màu.",
                        qty: 1,
                        unitPrice: chupPrice,
                        subtotal: chupPrice
                    });

                    items.push({
                        id: 'event_dung',
                        name: "Hậu kỳ dựng video Recap hoàn thiện",
                        desc: "Cắt ghép, tinh chỉnh màu sắc, ghép nhạc không khí sôi động thương mại (Thời lượng 1-3 phút).",
                        qty: 1,
                        unitPrice: dungPrice,
                        subtotal: dungPrice
                    });

                    if (eventFlycamDays > 0) {
                        items.push({
                            id: 'event_flycam',
                            name: "Thiết bị & Nhân sự Flycam sự kiện bổ sung",
                            desc: "Góc quay không trung bao quát toàn cảnh sự kiện tầm cao bằng Flycam chuyên dụng. Đơn giá cố định: 2.000.000 đ / ngày (Chưa gồm giấy phép).",
                            qty: eventFlycamDays,
                            unitPrice: 2000000,
                            subtotal: eventFlycamDays * 2000000
                        });
                    }
                }
                else if (activeCategory === 'THOI_TRANG') {
                    categoryName = "Dịch Vụ Quay Dựng Thời Trang (Lookbook)";
                    
                    items.push({
                        id: 'tt_title',
                        name: "Hạng Mục SẢN XUẤT VIDEO THỜI TRANG",
                        desc: "May đo chiến lược sản xuất tối ưu visual cho bộ sưu tập thời trang thương hiệu.",
                        qty: 1,
                        unitPrice: 0,
                        subtotal: 0,
                        isHeader: true
                    });

                    if (ttProductQty > 0) {
                        // Tính toán lũy tiến số ngày sản xuất: 1 ngày chỉ quay tối đa 15 sản phẩm, hơn 15 tự động nhảy ngày
                        const calculatedDays = Math.ceil(ttProductQty / 15);
                        
                        // 1. Giá quay (3.000.000 đ / ngày) - Sửa từ 3.500.000đ thành 3.000.000đ theo yêu cầu
                        items.push({
                            id: 'tt_quay',
                            name: `Chi phí quay phim thời trang (${calculatedDays} ngày)`,
                            desc: `Hệ thống trang thiết bị cao cấp bám sát bối cảnh studio, nhân sự vận hành máy chuyên nghiệp (Hạn mức tối đa 15 sản phẩm/ngày).`,
                            qty: calculatedDays,
                            unitPrice: 3000000,
                            subtotal: calculatedDays * 3000000
                        });

                        // 2. Chi phí mẫu (3.000.000 đ / ngày)
                        items.push({
                            id: 'tt_mau',
                            name: `Chi phí mẫu / Diễn viên thời trang (${calculatedDays} ngày)`,
                            desc: `Người mẫu lookbook chuyên nghiệp, tạo hình đa dạng, linh động biểu cảm phom dáng trang phục theo ngày quay quy đổi.`,
                            qty: calculatedDays,
                            unitPrice: 3000000,
                            subtotal: calculatedDays * 3000000
                        });

                        // 3. Giá dựng clip (300.000 đ / sản phẩm)
                        items.push({
                            id: 'tt_dung',
                            name: `Hậu kỳ dựng clip hoàn thiện sản phẩm thời trang`,
                            desc: `Biên biên cắt ghép nhịp điệu high-fashion thời thượng, căn chỉnh chuẩn màu sắc chất liệu vải cao cấp thương mại.`,
                            qty: ttProductQty,
                            unitPrice: 300000,
                            subtotal: ttProductQty * 300000
                        });

                        // 4. Chi phí book studio riêng (1.000.000 đ / 3 tiếng quay - Tùy chọn theo số lượng)
                        if (ttStudioQty > 0) {
                            items.push({
                                id: 'tt_studio',
                                name: `Thuê không gian Studio bối cảnh riêng biệt bổ sung`,
                                desc: `Studio chuyên dụng lookbook bối cảnh trang bị sẵn hệ thống phông nền đa màu, dàn đèn flash công suất lớn và phụ kiện On-set.`,
                                qty: ttStudioQty,
                                unitPrice: 1000000,
                                subtotal: ttStudioQty * 1000000
                            });
                        }
                    }
                }
                else if (activeCategory === 'DICH_VU_LE') {
                    categoryName = "Dịch Vụ Quay Dựng Lẻ Tự Chọn";
                    items.push({
                        id: 'dl_title',
                        name: "Hạng Mục DỊCH VỤ LẺ CẤU HÌNH TỰ DO",
                        desc: "Lựa chọn linh động các gói dịch vụ riêng biệt để tối ưu chiến lược chi phí.",
                        qty: 1,
                        unitPrice: 0,
                        subtotal: 0,
                        isHeader: true
                    });

                    if (dlQuayOption === 'HALF_DAY') {
                        items.push({
                            id: 'dl_quay_phim',
                            name: "Quay Phim & Thiết Bị Lẻ (Nửa ngày)",
                            desc: "Nhân sự kỹ thuật cùng trang thiết bị quay phim tiêu chuẩn trong vòng 4 tiếng.",
                            qty: 1,
                            unitPrice: 2000000,
                            subtotal: 2000000
                        });
                    } else if (dlQuayOption === 'FULL_DAY') {
                        items.push({
                            id: 'dl_quay_phim',
                            name: "Quay Phim & Thiết Bị Lẻ (Nguyên ngày)",
                            desc: "Nhân sự kỹ thuật cùng trang thiết bị quay phim tiêu chuẩn trong vòng 8 tiếng.",
                            qty: 1,
                            unitPrice: 3000000,
                            subtotal: 3000000
                        });
                    }

                    if (dlDungQty > 0) {
                        items.push({
                            id: 'dl_dung_clip',
                            name: "Dựng clip video hoàn thiện lẻ",
                            desc: "Hậu kỳ, cắt ghép, chỉnh màu sắc, hiệu ứng hình ảnh và âm thanh thương mại.",
                            qty: dlDungQty,
                            unitPrice: 300000,
                            subtotal: dlDungQty * 300000
                        });
                    }

                    if (dlKichBanQty > 0) {
                        items.push({
                            id: 'dl_kich_ban',
                            name: "Biên soạn kịch bản lẻ phân cảnh",
                            desc: "Lên ý tưởng sáng tạo, nội dung hội thoại, góc quay chi tiết chuẩn tiếp thị.",
                            qty: dlKichBanQty,
                            unitPrice: 200000,
                            subtotal: dlKichBanQty * 200000
                        });
                    }

                    if (dlMauQty > 0) {
                        const rate = dlMauOption === 'HALF_DAY' ? 1500000 : 2500000;
                        const durationName = dlMauOption === 'HALF_DAY' ? "Nửa ngày" : "Nguyên ngày";
                        items.push({
                            id: 'dl_thue_mau',
                            name: "Thuê Diễn Viên / Mẫu Lẻ (" + durationName + ")",
                            desc: "Nhân sự mẫu diễn xuất thực hiện nội dung quảng cáo hoặc xây kênh thương hiệu.",
                            qty: dlMauQty,
                            unitPrice: rate,
                            subtotal: dlMauQty * rate
                        });
                    }

                    // TỰ ĐỘNG THÊM DÒNG DỊCH VỤ NGOÀI HỆ THỐNG KHI ĐƯỢC NHẬP HỢP LỆ (Sử dụng dlCustomDesc thay vì mô tả cứng)
                    if (dlCustomName.trim() !== "" && dlCustomPrice > 0) {
                        items.push({
                            id: 'dl_custom_item',
                            name: dlCustomName.trim(),
                            desc: dlCustomDesc.trim() || "Dịch vụ phát sinh ngoài hệ thống cấu hình theo yêu cầu thực tế của đối tác.",
                            qty: 1,
                            unitPrice: dlCustomPrice,
                            subtotal: dlCustomPrice
                        });
                    }
                }

                const total = items.reduce((acc, item) => acc + item.subtotal, 0);

                return {
                    categoryName,
                    items,
                    total
                };
            }, [activeCategory, qcOption, qcMauQty, qcIncludeQuay, qcDungQty, qcKichBanQty, xkPackage, xkModelNoVoiceDays, xkModelVoiceDays, bdsSubCategory, bdsKichBanQty, bdsDungQty, bdsQuayDays, bdsFlycamDays, bdsMauDays, eventPackage, eventDuration, eventFlycamDays, ttProductQty, ttStudioQty, dlQuayOption, dlDungQty, dlKichBanQty, dlMauOption, dlMauQty, bdsQcVideoQty, bdsXkVideoQty, dlCustomName, dlCustomPrice, dlCustomDesc]);

            // Quản lý danh sách phần tử cuối cùng trên báo giá
            const finalQuoteItems = useMemo(() => {
                return invoiceItems;
            }, [invoiceItems]);

            const subtotal = useMemo(() => {
                return finalQuoteItems.reduce((acc, item) => acc + item.subtotal, 0);
            }, [finalQuoteItems]);

            const discountAmount = useMemo(() => {
                return (subtotal * discountPercent) / 100;
            }, [subtotal, discountPercent]);

            const vatAmount = useMemo(() => {
                return ((subtotal - discountAmount) * vatPercent) / 100;
            }, [subtotal, discountAmount, vatPercent]);

            const grandTotal = useMemo(() => {
                return subtotal - discountAmount + vatAmount;
            }, [subtotal, discountAmount, vatAmount]);

            // Thêm hạng mục vào danh sách tích lũy chính thức
            const handleAddToQuote = () => {
                const itemsToAdd = activeCalculation.items.filter(item => !item.isHeader && item.subtotal > 0);
                
                if (itemsToAdd.length === 0) {
                    return;
                }

                const formattedItems = itemsToAdd.map(item => ({
                    ...item,
                    id: item.id + "_" + Date.now() + "_" + Math.random().toString(36).substr(2, 4)
                }));

                setInvoiceItems(prev => [...prev, ...formattedItems]);
            };

            const handleClearQuote = () => {
                setInvoiceItems([]);
                setActiveMenuId(null);
            };

            const handleRemoveItem = (id) => {
                setInvoiceItems(prev => prev.filter(item => item.id !== id));
                if (activeMenuId === id) {
                    setActiveMenuId(null);
                }
            };

            // Xuất báo giá sang PDF chất lượng cao - Tối ưu hóa tối đa độ nét, loại bỏ bóng nhòe và hiện tượng Ctrl+A
            const handlePrint = () => {
                setActiveMenuId(null); // Đóng mọi menu trước khi xuất bản
                setIsGeneratingPDF(true);
                
                const element = document.getElementById('quote-paper-pdf');
                if (!element) {
                    setIsGeneratingPDF(false);
                    return;
                }

                if (typeof html2pdf === 'undefined') {
                    console.error("Thư viện html2pdf chưa được tải hoàn chỉnh. Đang thực thi in hệ thống...");
                    window.print();
                    setIsGeneratingPDF(false);
                    return;
                }

                if (window.getSelection) {
                    window.getSelection().removeAllRanges();
                }
                if (document.activeElement && document.activeElement.blur) {
                    document.activeElement.blur();
                }

                element.classList.add('export-crisp');

                const parentContainer = element.parentElement;
                const originalScrollTop = parentContainer ? parentContainer.scrollTop : 0;
                if (parentContainer) parentContainer.scrollTop = 0;
                
                const opt = {
                    margin:       10, 
                    filename:     (previewMode === 'QUOTE' ? "BaoGia_" : "Proposal_") + quoteId + "_UpMedia.pdf",
                    image:        { type: 'jpeg', quality: 1.0 }, 
                    html2canvas:  { 
                        scale: 3, 
                        useCORS: true, 
                        logging: false,
                        scrollY: 0,
                        scrollX: 0,
                        textRendering: 'geometricPrecision', 
                        devicePixelRatio: 3 
                    }, 
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' } 
                };
                
                html2pdf().set(opt).from(element).save().then(() => {
                    element.classList.remove('export-crisp');
                    setIsGeneratingPDF(false);
                    if (parentContainer) parentContainer.scrollTop = originalScrollTop; 
                }).catch(err => {
                    console.error("Lỗi xuất PDF: ", err);
                    element.classList.remove('export-crisp');
                    setIsGeneratingPDF(false);
                    if (parentContainer) parentContainer.scrollTop = originalScrollTop;
                });
            };

            // Xuất báo giá sang ảnh định dạng PNG chất lượng cao
            const handleExportPNG = () => {
                setActiveMenuId(null); 
                setIsGeneratingPNG(true);
                
                const element = document.getElementById('quote-paper-pdf');
                if (!element) {
                    setIsGeneratingPNG(false);
                    return;
                }

                if (typeof html2canvas === 'undefined') {
                    console.error("Thư viện html2canvas chưa được tải hoàn chỉnh.");
                    setIsGeneratingPNG(false);
                    return;
                }

                if (window.getSelection) {
                    window.getSelection().removeAllRanges();
                }
                if (document.activeElement && document.activeElement.blur) {
                    document.activeElement.blur();
                }

                element.classList.add('export-crisp');

                const parentContainer = element.parentElement;
                const originalScrollTop = parentContainer ? parentContainer.scrollTop : 0;
                if (parentContainer) parentContainer.scrollTop = 0;

                let targetBg = "#ffffff";
                if (previewMode === 'PROPOSAL') {
                    if (proposalTone === 'NAU_VANG') targetBg = "#FAF6F0";
                    else if (proposalTone === 'XANH_TRANG') targetBg = "#ffffff";
                    else targetBg = "#ffffff";
                }
                
                html2canvas(element, {
                    scale: 3, 
                    useCORS: true, 
                    logging: false,
                    backgroundColor: targetBg,
                    scrollY: 0,
                    scrollX: 0,
                    textRendering: 'geometricPrecision',
                    devicePixelRatio: 3
                }).then(canvas => {
                    element.classList.remove('export-crisp');
                    const dataUrl = canvas.toDataURL('image/png', 1.0); 
                    const link = document.createElement('a');
                    link.href = dataUrl;
                    link.download = (previewMode === 'QUOTE' ? "BaoGia_" : "Proposal_") + quoteId + "_UpMedia.png";
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    setIsGeneratingPNG(false);
                    if (parentContainer) parentContainer.scrollTop = originalScrollTop; 
                }).catch(err => {
                    console.error("Lỗi xuất ảnh PNG: ", err);
                    element.classList.remove('export-crisp');
                    setIsGeneratingPNG(false);
                    if (parentContainer) parentContainer.scrollTop = originalScrollTop;
                });
            };

            return (
                <div className="flex-grow flex flex-col md:flex-row min-h-screen relative overflow-x-hidden bg-black text-zinc-100">
                    
                    {/* CUSTOM MODAL CONFIRMATION (Xác nhận chuyển đổi dòng sản phẩm) */}
                    {showConfirmModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-fadeIn no-print">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-2xl max-w-md w-full p-6 shadow-2xl relative">
                                <div className="text-center">
                                    <div className="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-900/30 text-red-400 mb-4 border border-red-800">
                                        <svg className="h-6 w-6" fill="none" viewBox="0 0 24 24" strokeWidth="1.5" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
                                        </svg>
                                    </div>
                                    <h3 className="text-sm font-bold uppercase tracking-wider text-white mb-2">CẢNH BÁO THAY ĐỔI</h3>
                                    <p className="text-xs text-zinc-300 leading-relaxed uppercase">
                                        BÁO GIÁ TRƯỚC ĐÂY CỦA BẠN SẼ BỊ XÓA, BẠN CÓ MUỐN ĐỔI SẢN PHẨM?
                                    </p>
                                </div>
                                <div className="mt-6 flex flex-col sm:flex-row gap-3">
                                    <button 
                                        onClick={confirmCategoryChange}
                                        className="flex-1 bg-gradient-to-b from-red-500 to-red-600 hover:from-red-600 hover:to-red-700 text-white font-bold py-2.5 px-4 rounded-lg text-xs uppercase transition-all duration-75 border-b-2 border-red-800 active:border-b-0 active:translate-y-[2px]"
                                    >
                                        Đồng ý đổi
                                    </button>
                                    <button 
                                        onClick={cancelCategoryChange}
                                        className="flex-1 bg-zinc-850 hover:bg-zinc-800 text-zinc-300 font-medium py-2.5 px-4 rounded-lg text-xs uppercase transition-all duration-75 border border-zinc-800"
                                    >
                                        Hủy bỏ
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* LEFT PANEL: CONFIGURATOR (Hidden during print) */}
                    <div className="w-full md:w-[45%] bg-zinc-900 p-6 md:p-8 flex flex-col border-r border-zinc-800 no-print max-h-[calc(100vh-80px)] overflow-y-auto no-scrollbar pb-32">
                        
                        {/* Interactive Header */}
                        <div className="mb-8 border-b border-zinc-800 pb-6">
                            <div className="flex items-center gap-3 mb-2">
                                <span className="bg-gradient-to-b from-zinc-200 to-zinc-400 text-zinc-950 font-bold px-2.5 py-1 rounded text-xs tracking-wider border-b-2 border-zinc-500 shadow-sm">UP MEDIA</span>
                                <h1 className="text-xl font-bold font-montserrat tracking-tight text-white flex items-center gap-2">
                                    BÁO GIÁ DỊCH VỤ
                                </h1>
                            </div>
                            <p className="text-xs text-zinc-400">Thiết lập cấu hình quay dựng nhanh chóng và xuất báo giá chuyên nghiệp.</p>
                        </div>

                        {/* Customer Info Section */}
                        <div className="mb-6 bg-zinc-800 p-4 rounded-xl border border-zinc-800">
                            <h3 className="text-xs font-semibold tracking-wider text-zinc-200 uppercase mb-3 flex items-center gap-2 border-b border-zinc-700 pb-2">
                                Thông Tin Khách Hàng & Dự Án
                            </h3>
                            <div className="grid grid-cols-1 gap-3 text-sm">
                                <div>
                                    <label className="block text-xs text-zinc-400 mb-1">Tên Đơn vị / Đối tác / Khách hàng</label>
                                    <input 
                                        type="text" 
                                        value={clientName} 
                                        onChange={(e) => setClientName(e.target.value)}
                                        className="w-full bg-black border border-zinc-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-zinc-400 text-xs" 
                                        placeholder="Công ty, đối tác..."
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs text-zinc-400 mb-1">Người đại diện / SĐT</label>
                                    <input 
                                        type="text" 
                                        value={clientContact} 
                                        onChange={(e) => setClientContact(e.target.value)}
                                        className="w-full bg-black border border-zinc-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-zinc-400 text-xs" 
                                        placeholder="Tên, số điện thoại..."
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs text-zinc-400 mb-1">Tên Dự Án Truyền Thông</label>
                                    <input 
                                        type="text" 
                                        value={projectName} 
                                        onChange={(e) => setProjectName(e.target.value)}
                                        className="w-full bg-black border border-zinc-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-zinc-400 text-xs font-medium" 
                                        placeholder="Tên dự án thực hiện..."
                                    />
                                </div>
                            </div>
                        </div>

                        {/* MENU CHỌN SẢN PHẨM CHÍNH - Thêm dịch vụ THỜI TRANG ở trước DỊCH VỤ LẺ */}
                        <div className="mb-6 bg-zinc-800 p-4 rounded-xl border border-zinc-800">
                            <label className="block text-xs font-bold uppercase tracking-wider text-zinc-200 mb-3 border-b border-zinc-700 pb-2">
                                Dòng Sản Phẩm Cấu Hình
                            </label>
                            <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
