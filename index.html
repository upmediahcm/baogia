    <style>

        .contract-style p,

        /* ĐỊNH DẠNG HỢP ĐỒNG TIMES NEW ROMAN CỠ 11.5 - MÀU ĐEN TOÀN BỘ */
        .contract-style {

        }
        .contract-style table {
            border-collapse: collapse !important;
            width: 100% !important;
            border: 1px solid #000000 !important;
        }
        .contract-style th, .contract-style td {
            border: 1px solid #000000 !important;
            padding: 5px 7px !important;

            font-size: 10.5pt !important;
        }
        .contract-style th {
            background-color: #f2f2f2 !important;
            font-weight: bold !important;

        /* Định dạng tối ưu riêng biệt cho khổ giấy A4 chuẩn khi in */

<body class="bg-black text-zinc-100 min-h-screen flex flex-col antialiased">

    <div id="root" class="flex-grow flex flex-col"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            // Thông tin nhà cung cấp dịch vụ - BÊN A
            const [providerName, setProviderName] = useState("UP MEDIA");
            const partyAInfo = {
                company: "CÔNG TY TNHH QUẢNG CÁO TRUYỀTHÔNG VÀ SỰ KIỆN UP MEDIA",
                address: "172 Tô Hiến Thành, Phường Hòa Hưng, Thành phố Hồ Chí Minh, Việt Nam",
                taxCode: "0319536733",
                rep: "PHAN NHẬT VY",
                position: "Giám đốc",
                phone: "0888484050",
                bank: "NGÂN HÀNG QUÂN ĐỘI MB BANK - STK: 55567778"
            };

            // Thông tin khách hàng BÊN B
            const [clientType, setClientType] = useState('DOANH_NGHIEP'); // DOANH_NGHIEP, CA_NHAN
            const [partyBCompany, setPartyBCompany] = useState("");
            const [partyBAddress, setPartyBAddress] = useState("");
            const [partyBTaxCode, setPartyBTaxCode] = useState("");
            const [partyBRep, setPartyBRep] = useState("");
            const [partyBPosition, setPartyBPosition] = useState("Đại diện pháp luật");
            const [partyBRepCCCD, setPartyBRepCCCD] = useState(""); // CCCD người đại diện cho Doanh Nghiệp
            const [partyBPhone, setPartyBPhone] = useState("");
            const [partyBBank, setPartyBBank] = useState("");

            // Thông tin khách hàng và định danh báo giá
            const [clientName, setClientName] = useState("");
            const [clientContact, setClientContact] = useState("");
            const [projectName, setProjectName] = useState("");
            const [quoteId, setQuoteId] = useState(`BG-26-${Math.floor(1000 + Math.random() * 9000)}`);
            const [quoteDate, setQuoteDate] = useState(new Date().toLocaleDateString('vi-VN'));

            // Trạng thái của Tab sản phẩm hiện tại
            const [activeCategory, setActiveCategory] = useState('QUANG_CAO'); // QUANG_CAO, XAY_KENH, QUAY_BDS, EVENT, THOI_TRANG, DICH_VU_LE, PHIM_TVC
            const [activeMenuId, setActiveMenuId] = useState(null); 

            // Trạng thái modal cảnh báo chuyển đổi Dòng Sản Phẩm Cấu Hình
            const [showConfirmModal, setShowConfirmModal] = useState(false);
            const [pendingCategory, setPendingCategory] = useState(null);

            // Trạng thái modal cảnh báo lỗi nhập liệu
            const [showErrorModal, setShowErrorModal] = useState(false);
            const [errorMessage, setErrorMessage] = useState("");

            // Danh sách hóa đơn tích lũy được hợp nhất
            const [invoiceItems, setInvoiceItems] = useState([]);
            const [discountPercent, setDiscountPercent] = useState(0);
            const [vatPercent, setVatPercent] = useState(0); 
            const [note, setNote] = useState("Báo giá trên chưa bao gồm chi phí di chuyển ngoại thành hoặc đi tỉnh.");
            const [showTotal, setShowTotal] = useState(true); 
            
            // Trạng thái hiệu ứng xuất file
            const [isGeneratingPDF, setIsGeneratingPDF] = useState(false);
            const [isGeneratingPNG, setIsGeneratingPNG] = useState(false);

            // 1. STATE CHO GÓI QUẢNG CÁO
            const [qcClipQty, setQcClipQty] = useState(0); 
            const [qcMauQty, setQcMauQty] = useState(0); 
            const [qcExtraMauQty, setQcExtraMauQty] = useState(0); 

            // 2. STATE CHO GÓI XÂY KÊNH
            const [xkPackage, setXkPackage] = useState('THUONG_20'); 
            const [xkModelNoVoiceDays, setXkModelNoVoiceDays] = useState(0);
            const [xkModelVoiceDays, setXkModelVoiceDays] = useState(0);

            // 3. STATE CHO GÓI QUAY BẤT ĐỘNG SẢN
            const [bdsSubCategory, setBdsSubCategory] = useState('QC_BDS'); 
            const [bdsQcVideoQty, setBdsQcVideoQty] = useState(0); 
            const [bdsXkVideoQty, setBdsXkVideoQty] = useState(0); 
            const [bdsKichBanQty, setBdsKichBanQty] = useState(0);
            const [bdsDungQty, setBdsDungQty] = useState(0);
            const [bdsQuayDays, setBdsQuayDays] = useState(0);
            const [bdsFlycamDays, setBdsFlycamDays] = useState(0);
            const [bdsMauDays, setBdsMauDays] = useState(0);

            // 4. STATE CHO GÓI SỰ KIỆN (EVENT)
            const [eventPackage, setEventPackage] = useState('GOI_1'); 
            const [eventDuration, setEventDuration] = useState('HALF_DAY'); 
            const [eventFlycamDays, setEventFlycamDays] = useState(0); 

            // 5. STATE CHO DÒNG THỜI TRANG
            const [ttProductQty, setTtProductQty] = useState(0);
            const [ttStudioQty, setTtStudioQty] = useState(0); 

            // 6. STATE CHO DỊCH VỤ LẺ
            const [dlQuayOption, setDlQuayOption] = useState('NONE'); 
            const [dlDungQty, setDlDungQty] = useState(0);
            const [dlKichBanQty, setDlKichBanQty] = useState(0);
            const [dlMauOption, setDlMauOption] = useState('HALF_DAY'); 
            const [dlMauQty, setDlMauQty] = useState(0);
            const [dlCustomName, setDlCustomName] = useState(""); 
            const [dlCustomPrice, setDlCustomPrice] = useState(0); 
            const [dlCustomDesc, setDlCustomDesc] = useState("Dịch vụ phát sinh ngoài hệ thống cấu hình theo yêu cầu thực tế của đối tác."); 
            const [isGeneratingDesc, setIsGeneratingDesc] = useState(false); 
            const [aiError, setAiError] = useState(""); 

            // 7. STATE PHIM TVC
            const [tvcBudget, setTvcBudget] = useState(50000000); 

            // --- TRẠNG THÁI CHO PROPOSAL ---
            const [showProposalConfig, setShowProposalConfig] = useState(false);
            const [proposalTone, setProposalTone] = useState('TRANG_DEN'); 
            const [previewMode, setPreviewMode] = useState('QUOTE'); 
            
            // Các trường thông tin của đề xuất dự án
            const [propObjective, setPropObjective] = useState("");
            const [propTarget, setPropTarget] = useState("");
            const [propMessage, setPropMessage] = useState("");
            const [propDirection, setPropDirection] = useState("");

            // Trợ lý AI thiết lập Proposal theo yêu cầu khách hàng
            const [proposalAIInput, setProposalAIInput] = useState("");
            const [isGeneratingProposalAI, setIsGeneratingProposalAI] = useState(false);
            
            // State quản lý trạng thái ẩn/hiện danh sách đề xuất nhanh
            const [openSuggestions, setOpenSuggestions] = useState({
                objective: false,
                target: false,
                message: false,
                direction: false
            });

            // State quản lý điều khoản đề xuất và cờ theo dõi thay đổi thủ công
            const [propTerms, setPropTerms] = useState("");
            const [isTermsEdited, setIsTermsEdited] = useState(false);

            // --- TRẠNG THÁI CHO HỢP ĐỒNG ---
            const [showContractConfig, setShowContractConfig] = useState(false);
            const [contractDrafts, setContractDrafts] = useState([]); 
            const [contractAIInstruction, setContractAIInstruction] = useState(""); 
            const [isGeneratingContractAI, setIsGeneratingContractAI] = useState(false); 
            const [contractCustomText, setContractCustomText] = useState(""); 

            // Tự động gán thông tin tên và đại diện Bên B từ thông tin khách hàng chung
            useEffect(() => {
                if (clientName && !partyBCompany) setPartyBCompany(clientName);
                if (clientContact && !partyBRep) setPartyBRep(clientContact);
            }, [clientName, clientContact]);

            // Tự động phân tích các dịch vụ đang có thực tế trong báo giá (Để đồng bộ Quy trình & Timeline)
            const activeQuoteCategories = useMemo(() => {
                if (invoiceItems.length === 0) {
                    return [activeCategory]; 
                }
                const cats = new Set();
                invoiceItems.forEach(item => {
                    if (item.id.startsWith('qc_')) cats.add('QUANG_CAO');
                    else if (item.id.startsWith('xk_')) cats.add('XAY_KENH');
                    else if (item.id.startsWith('bds_')) cats.add('QUAY_BDS');
                    else if (item.id.startsWith('event_')) cats.add('EVENT');
                    else if (item.id.startsWith('tt_')) cats.add('THOI_TRANG');
                    else if (item.id.startsWith('dl_')) cats.add('DICH_VU_LE');
                    else if (item.id.startsWith('tvc_')) cats.add('PHIM_TVC');
                });
                return Array.from(cats);
            }, [invoiceItems, activeCategory]);

            // Hàm tự động tạo đề xuất cho Listbox dựa trên Tên dự án & Phân loại dịch vụ đang chọn
            const generatedSuggestions = useMemo(() => {
                const proj = projectName.trim() || "Dự án";

                const categoryDatabase = {
                    QUANG_CAO: {
                        objectives: [
                            `Tăng tỷ lệ chuyển đổi trực tiếp cho sản phẩm của dự án ${proj} bằng hình ảnh thực tế bắt mắt.`,
                            `Giới thiệu chi tiết các tính năng ưu việt, giải quyết nỗi đau của khách hàng sử dụng ${proj}.`,
                            `Xây dựng kho tài nguyên video quảng cáo (Ad Creative) phục vụ tối ưu hóa các chiến dịch chuyển đổi số của ${proj}.`
                        ],
                        targets: [
                            `Người tiêu dùng trực tiếp có nhu cầu thiết thực, thường xuyên mua sắm online trên Facebook/TikTok.`,
                            `Tệp khách hàng trung lưu quan tâm tới giải pháp tiện ích, thông minh của sản phẩm ${proj}.`,
                            `Khán giả trẻ tuổi tiếp cận xu hướng tiêu dùng nhanh và có hành vi mua sắm thông qua cảm xúc.`
                        ],
                        messages: [
                            `"Sở hữu ${proj} - Trải nghiệm cuộc sống thông thái, giải quyết nỗi lo tức thì."`,
                            `"Khám phá sự khác biệt đột phá từ ${proj} - Lựa chọn tối ưu hàng đầu của mọi nhà."`,
                            `"${proj} - Đơn giản hóa mọi quy trình, khẳng định giá trị chất lượng đỉnh cao."`
                        ],
                        directions: [
                            `Đặc tả góc quay cận cảnh (extreme close-up) bề mặt chất liệu, cơ chế hoạt động thực tế của sản phẩm. Kết hợp hiệu ứng so sánh trực quan Trước/Sau sử dụng.`,
                            `Xây dựng kịch bản tình huống đời thường gần gũi (User Generated Content) lồng ghép feedback trải nghiệm thực của diễn viên/mẫu chính.`,
                            `Ánh sáng studio tươi sáng, rực rỡ, nhấn mạnh khối sản phẩm. Tiết tấu dựng nhanh gọn dưới 45 giây, chèn text motion chú thích tính năng nổi bật.`
                        ]
                    },
                    XAY_KENH: {
                        objectives: [
                            `Xây dựng kênh phân phối nội dung video ngắn thương hiệu ${proj} đạt mốc 10.000 followers trong tháng đầu tiên.`,
                            `Tạo thói quen theo dõi hàng ngày của tệp khách hàng tiềm năng thông qua chuỗi nội dung hữu ích từ ${proj}.`,
                            `Đột phá lượng tiếp cận tự nhiên (organic reach) giúp định vị ${proj} là chuyên gia uy tín hàng đầu trong lĩnh vực.`
                        ],
                        targets: [
                            `Cộng đồng người dùng năng động trên TikTok, Reels, Shorts đam mê kiến thức thực tế và giải trí nhanh.`,
                            `Tệp khách hàng tiềm năng cần lời khuyên chuyên môn đáng tin cậy về thị trường của dự án ${proj}.`,
                            `Thế hệ Gen Z & Millennials có thói quen tìm kiếm thông tin bằng định dạng video ngắn.`
                        ],
                        messages: [
                            `"Đồng hành cùng ${proj} - Chia sẻ bí quyết thông thái, giải pháp vượt trội mỗi ngày."`,
                            `"Không chỉ là kiến thức, ${proj} là người bạn dẫn lối thành công cho thương hiệu của bạn."`,
                            `"Giải mã mọi thắc mắc trong 60 giây cùng chuyên gia của dự án ${proj}."`
                        ],
                        directions: [
                            `Định dạng khung dọc 9:16 chuẩn thiết bị di động. Thiết lập cú giật tít thu hút (hook) cực kỳ ấn tượng trong 3 giây đầu tiên của video.`,
                            `Sử dụng MC/Model thoại tự nhiên, biểu cảm sinh động, góc máy ngang tầm mắt tạo cảm giác trò chuyện thân mật trực tiếp với khán giả.`,
                            `Thiết kế nhịp dựng nhanh, chèn hiệu ứng Kinetic Typography sinh động, phối âm thanh pop-culture thịnh hành kết hợp sound effect kích thích xúc cảm.`
                        ]
                    },
                    QUAY_BDS: {
                        objectives: [
                            `Đặc tả quy mô tầm cỡ, vị thế đắc địa và không gian sống thượng lưu của dự án bất động sản ${proj}.`,
                            `Tạo lòng tin tuyệt đối cho nhà đầu tư về tiến độ thi công hạ tầng thực tế và tiện ích đi kèm của ${proj}.`,
                            `Xây dựng thước phim giới thiệu dự án hoàn hảo hỗ trợ đội ngũ sales chốt giao dịch nhanh chóng.`
                        ],
                        targets: [
                            `Nhà đầu tư bất động sản trung và cao cấp tìm kiếm cơ hội sinh lời an toàn, bền vững.`,
                            `Khách hàng thượng lưu tìm kiếm không gian sống đẳng cấp, biệt lập và sang trọng làm tổ ấm gia đình.`,
                            `Hệ thống đối tác phân phối và các sàn giao dịch bất động sản liên kết.`
                        ],
                        messages: [
                            `"${proj} - Tinh hoa hội tụ, khẳng định vị thế chủ nhân, kiến tạo di sản thịnh vượng."`,
                            `"Đón đầu làn sóng đầu tư, khẳng định đẳng cấp sống thượng lưu đích thực tại ${proj}."`,
                            `"${proj} - Không gian sống hoàn mỹ, tiện ích xứng tầm, nâng tầm trải nghiệm."`
                        ],
                        directions: [
                            `Sử dụng thiết bị Flycam chuyên dụng bay góc tầm cao toàn cảnh (wide-shots) bám sát quy hoạch, giao thông kết nối thực tế dự án.`,
                            `Góc máy mặt đất dùng lens Anamorphic cinematic di chuyển chậm dọc hành lang, đặc tả không gian nội thất sang trọng chuẩn 5 sao.`,
                            `Phối tông màu Amber & Teal ấm áp, quý phái. Âm nhạc giao hưởng hoành tráng kết hợp giọng thu âm MC trầm ấm lồng tiếng giới thiệu chi tiết.`
                        ]
                    },

            // Thiết lập giá trị mặc định khi người dùng click chọn gợi ý nhanh
            useEffect(() => {
                if (!propObjective) setPropObjective("");
                if (!propTarget) setPropTarget("");
                if (!propMessage) setPropMessage("");
                if (!propDirection) setPropDirection("");
            }, [generatedSuggestions]);

            const computedDirection = useMemo(() => {
                if (propDirection.trim() !== "") return propDirection;
                return generatedSuggestions.directions[0];
            }, [generatedSuggestions, propDirection]);

            // --- KHỞI TẠO BIẾN TRƯỚC KHI TÍNH TOÁN (Khắc phục lỗi thứ tự biến) ---
            const finalQuoteItems = useMemo(() => {
                return invoiceItems;
            }, [invoiceItems]);

            const subtotal = useMemo(() => {
                return finalQuoteItems.reduce((acc, item) => acc + item.subtotal, 0);
            }, [finalQuoteItems]);

            const discountAmount = useMemo(() => {
                return (subtotal * discountPercent) / 100;
            }, [subtotal, discountPercent]);

            const vatAmount = useMemo(() => {
                return ((subtotal - discountAmount) * vatPercent) / 100;
            }, [subtotal, discountAmount, vatPercent]);

            const grandTotal = useMemo(() => {
                return subtotal - discountAmount + vatAmount;
            }, [subtotal, discountAmount, vatAmount]);

            // Tự động cập nhật điều khoản thanh toán động bám sát đề xuất mới của hợp đồng (50-30-20)
            useEffect(() => {
                if (!isTermsEdited) {
                    const commonTerms = "2. Chỉnh sửa: Đã bao gồm tối đa 02 lần chỉnh sửa dựa trên kịch bản ban đầu. Các yêu cầu thay đổi cốt kịch bản sau khi đã quay sẽ tính phí phát sinh.\n" +
                                        "3. Bản quyền: UP MEDIA cam kết sử dụng nhạc nền bản quyền thương mại. Khách hàng sở hữu hoàn bộ bản quyền sử dụng thành phẩm sau khi thanh toán đầy đủ.";
                    
                    const termStandard = "1. Thanh toán: Đề xuất thanh toán chia làm 03 đợt (50% - 30% - 20%). Đợt 1 tạm ứng 50% ngay sau khi ký hợp đồng. Đợt 2 thanh toán 30% sau khi có video demo thứ nhất. Đợt 3 thanh toán 20% còn lại sau khi bàn giao và nghiệm thu xong video.\n";
                    setPropTerms(termStandard + commonTerms);
                }
            }, [grandTotal, isTermsEdited]);

            // Xử lý tương tác thông minh khi click đổi dòng sản phẩm
            const handleCategoryClick = (category) => {
                if (category === activeCategory) return;
                
                if (invoiceItems.length > 0) {
                    setPendingCategory(category);
                    setShowConfirmModal(true);
                } else {
                    setActiveCategory(category);
                }
            };

            const confirmCategoryChange = () => {
                if (pendingCategory) {
                    setActiveCategory(pendingCategory);

                setPendingCategory(null);

            const cancelCategoryChange = () => {
                setShowConfirmModal(false);
                setPendingCategory(null);
            };

            // Hàm xử lý gọi AI để tạo Proposal tự động bám sát yêu cầu khách hàng
            const handleGenerateProposalWithAI = async () => {
                if (!proposalAIInput.trim()) return;
                setIsGeneratingProposalAI(true);
                
                const apiKey = "";
                const systemPrompt = `Bạn là Giám đốc chiến lược truyền thông cao cấp của UP MEDIA. 
Hãy thiết lập Proposal (Đề xuất ý tưởng) chi tiết bằng TIẾNG VIỆT cho dự án dựa trên yêu cầu cụ thể của khách hàng.
Yêu cầu bắt buộc:
1. Trả về định dạng JSON chính xác để phân tích cấu trúc trực tiếp vào ứng dụng.
2. Trả về đúng đối tượng JSON có cấu trúc sau:
{
  "objective": "Mục tiêu chiến dịch (1 câu rõ ràng, chuyên nghiệp, súc tích)",
  "target": "Khách hàng mục tiêu (1 câu phân tích sâu hành vi và phân khúc phù hợp)",
  "message": "Thông điệp cốt lõi (1 câu slogan/quote đặt trong dấu ngoặc kép)",
  "direction": "Định hướng sản xuất & Visual ý tưởng (Mô tả nghệ thuật sâu sắc về bối cảnh, góc máy, ánh sáng, nhịp dựng, âm nhạc phù hợp với sản phẩm này)"
}
3. Tuyệt đối không trả về bất kỳ từ dẫn dắt nào ngoài mã JSON.`;

                const payload = {
                    contents: [{ parts: [
                        { text: `Tên dự án: ${projectName || "Dự án truyền thông"}\nDòng sản phẩm cấu hình: ${activeCategory}\nYêu cầu đặc thù của khách hàng: ${proposalAIInput}` }
                    ] }],
                    generationConfig: { 
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {
                                objective: { type: "STRING" },
                                target: { type: "STRING" },
                                message: { type: "STRING" },
                                direction: { type: "STRING" }
                            },
                            required: ["objective", "target", "message", "direction"]
                        }
                    },
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                };

                const fetchWithRetry = async (retries = 5, delay = 1000) => {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (!response.ok) throw new Error("HTTP error " + response.status);

                        const result = await response.json();
                        const jsonText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (jsonText) {
                            const parsed = JSON.parse(jsonText);
                            setPropObjective(parsed.objective || "");
                            setPropTarget(parsed.target || "");
                            setPropMessage(parsed.message || "");
                            setPropDirection(parsed.direction || "");
                        } else {
                            throw new Error("Invalid format");
                        }
                    } catch (err) {
                        if (retries > 0) {
                            await new Promise(resolve => setTimeout(resolve, delay));
                            return fetchWithRetry(retries - 1, delay * 2);
                        } else {
                            setErrorMessage("Không thể kết nối Trợ lý AI Proposal. Vui lòng nhập dữ liệu thủ công.");
                            setShowErrorModal(true);
                        }
                    }

                await fetchWithRetry();
                setIsGeneratingProposalAI(false);
                setProposalAIInput("");

            // Hàm xử lý tương thích xuất file và cấu hình
            const handlePrint = () => {

                const element = document.getElementById('quote-paper-pdf');
                if (!element) {
                    setIsGeneratingPDF(false);
                    return;

                if (typeof html2pdf === 'undefined') {
                    window.print();
                    setIsGeneratingPDF(false);
                    return;
                }

                if (window.getSelection) window.getSelection().removeAllRanges();
                element.classList.add('export-crisp');

                const parentContainer = element.parentElement;
                const originalScrollTop = parentContainer ? parentContainer.scrollTop : 0;
                if (parentContainer) parentContainer.scrollTop = 0;
                
                let docType = "BaoGia_";
                if (previewMode === 'PROPOSAL') docType = "Proposal_";
                else if (previewMode === 'CONTRACT') docType = "HopDong_";

                const opt = {
                    margin:       [10, 10, 10, 10], // Đặt lề đều chống vỡ/cắt chữ sát mép
                    filename:     docType + quoteId + "_UpMedia.pdf",
                    image:        { type: 'jpeg', quality: 1.0 }, 
                    html2canvas:  { 
                        scale: 2.2, 
                        useCORS: true, 
                        logging: false,
                        scrollY: 0,
                        scrollX: 0,
                        textRendering: 'geometricPrecision'
                    }, 
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                    pagebreak:    { mode: ['css', 'legacy'] } // Ngắt trang thông minh theo CSS chống cắt chữ
                };
                
                html2pdf().set(opt).from(element).save().then(() => {
                    element.classList.remove('export-crisp');
                    setIsGeneratingPDF(false);
                    if (parentContainer) parentContainer.scrollTop = originalScrollTop; 
                }).catch(err => {
                    element.classList.remove('export-crisp');
                    setIsGeneratingPDF(false);
                    if (parentContainer) parentContainer.scrollTop = originalScrollTop;
                });
            };

            const handleExportPNG = () => {
                setActiveMenuId(null); 
                setIsGeneratingPNG(true);
                
                const element = document.getElementById('quote-paper-pdf');
                if (!element) {
                    setIsGeneratingPNG(false);
                    return;
                }

                if (typeof html2canvas === 'undefined') {
                    setIsGeneratingPNG(false);
                    return;
                }

                if (window.getSelection) window.getSelection().removeAllRanges();
                element.classList.add('export-crisp');

                const parentContainer = element.parentElement;
                const originalScrollTop = parentContainer ? parentContainer.scrollTop : 0;
                if (parentContainer) parentContainer.scrollTop = 0;

                let targetBg = "#ffffff";
                if (previewMode === 'PROPOSAL') {
                    if (proposalTone === 'NAU_VANG') targetBg = "#FAF6F0";
                    else targetBg = "#ffffff";
                }
                
                let docType = "BaoGia_";

                else if (previewMode === 'CONTRACT') docType = "HopDong_";

                html2canvas(element, {
                    scale: 2.2, 
                    useCORS: true, 
                    logging: false,
                    backgroundColor: targetBg,
                    scrollY: 0,
                    scrollX: 0,
                    textRendering: 'geometricPrecision'
                }).then(canvas => {
                    element.classList.remove('export-crisp');

                    document.body.removeChild(link);
                    setIsGeneratingPNG(false);
                    if (parentContainer) parentContainer.scrollTop = originalScrollTop;

                    element.classList.remove('export-crisp');
                    setIsGeneratingPNG(false);
                    if (parentContainer) parentContainer.scrollTop = originalScrollTop;
                });
            };

                const postHtml = "</body></html>";
                
                const htmlContent = preHtml + element.innerHTML + postHtml;
                const blob = new Blob(['\ufeff' + htmlContent], { type: 'application/msword' });

                    DICH_VU_LE: [
                        { title: "Giai đoạn 1: Khớp Yêu Cầu Riêng Biệt", desc: "Trao đổi sâu về mong muốn, định hướng bối cảnh và chuẩn bị đúng ekip chuyên môn.", duration: "Ngày 1" },
                        { title: "Giai đoạn 2: Thực Hiện Quay Lẻ", desc: "Bấm máy quay bám sát thời lượng cấu hình đã chọn (nửa ngày hoặc nguyên ngày).", duration: "Ngày 2" },
                        { title: "Giai đoạn 3: Hậu Kỳ Cắt Dựng Cơ Bản", desc: "Tiền hành cắt ghép thô, phối nhạc và tinh chỉnh hiệu ứng chuyển cảnh cơ bản.", duration: "Ngày 3 - 5" },
                        { title: "Giai đoạn 4: Bàn Giao Nghiệm Thu", desc: "Duyệt demo thô, hoàn thiện chỉnh sửa theo thỏa thuận và bàn giao file cuối cùng.", duration: "Ngày 6" }
                    ],
                    PHIM_TVC: [
                        { title: "Giai đoạn 1: Nghiên cứu, Concept & Storyboard", desc: "Nghiên cứu sâu định vị thương hiệu, biên soạn 3 hướng concept ý tưởng, hoàn thiện kịch bản văn học & kịch bản phân cảnh kỹ thuật, phác thảo Storyboard trực quan.", duration: "Ngày 1 - 5" },
                        { title: "Giai đoạn 2: Tiền kỳ tổng lực & Casting & PPM", desc: "Tuyển chọn diễn viên chính/phụ, tìm kiếm và khảo sát bối cảnh thực tế, chuẩn bị đạo cụ, thiết kế makeup layout & chuẩn bị phục trang. Tổ chức họp PPM (Pre-Production Meeting) thống nhất triệt để trước khi bấm máy.", duration: "Ngày 6 - 10" },
                        { title: "Giai đoạn 3: Bấm máy sản xuất (Production Days)", desc: "Tiến hành ghi hình TVC thực tế tại hiện trường với đạo diễn, DOP, dàn Cast chuyên nghiệp cùng hệ thống máy quay điện ảnh, ống kính và dàn ánh sáng chuyên dụng công suất lớn.", duration: "Ngày 11 - 13" },
                        { title: "Giai đoạn 4: Hậu kỳ chuyên sâu, VFX, grading & Bàn giao", desc: "Dựng thô nhịp phim (Offline), tiến hành thiết kế kỹ xảo điện ảnh (VFX/Online), chỉnh màu Color Grading chuẩn phim rạp, thiết kế âm thanh Sound Design chuyên sâu và thu âm giọng lồng tiếng MC thương mại.", duration: "Ngày 14 - 18" }
                    ]
                };

                let stepsToRender = [];

                if (activeQuoteCategories.length > 1) {
                    const categoryNames = activeQuoteCategories.map(cat => {
                        if (cat === 'QUANG_CAO') return "Quảng cáo";
                        if (cat === 'XAY_KENH') return "Xây kênh";
                        if (cat === 'QUAY_BDS') return "Bất động sản";
                        if (cat === 'EVENT') return "Sự kiện";
                        if (cat === 'THOI_TRANG') return "Thời trang Lookbook";
                        if (cat === 'PHIM_TVC') return "Phim TVC";
                        return "Dịch vụ lẻ";
                    }).join(', ');

                    stepsToRender = [
                        { 
                            title: "Giai đoạn 1: Nghiên cứu & Tiền kỳ tổng hợp", 
                            desc: `Xây dựng ý tưởng kịch bản và kế hoạch triển khai đồng loạt cho các hạng mục: ${categoryNames}. Setup nhân sự, chuẩn bị bối cảnh nhất quán để tối ưu chi phí.`, 
                            duration: "Ngày 1 - 4" 
                        },
                        { 
                            title: "Giai đoạn 2: Tác nghiệp & Sản xuất quay hình", 
                            desc: "Triển khai ekip quay phim hiện trường, điều phối diễn viên/người mẫu, sử dụng các thiết bị ghi hình mặt đất chuyên dụng và bay Flycam theo cấu hình đã phê duyệt.", 
                            duration: "Ngày 5 - 7" 
                        },
                        { 
                            title: "Giai đoạn 3: Hậu kỳ & Biên tập kỹ thuật đồng bộ", 
                            desc: "Xử lý cắt dựng thô, căn chỉnh màu sắc hài hòa đúng tinh thần nhận diện. Lồng tiếng MC chuyên nghiệp, lồng nhạc bản quyền thương mại và bổ sung hiệu ứng visual.", 
                            duration: "Ngày 8 - 12" 
                        },
                        { 
                            title: "Giai đoạn 4: Nghiệm thu demo & Bàn giao toàn bộ", 
                            desc: "Tiến hành gửi bản duyệt demo tổng hợp, tiếp nhận các phản hồi điều chỉnh tối ưu và đóng gói bàn giao toàn bộ gói thành phẩm đạt chất lượng Ultra-HD sắc nét.", 
                            duration: "Ngày 13 - 15" 
                        }
                    ];
                } else {
                    const singleCat = activeQuoteCategories[0] || 'QUANG_CAO';
                    stepsToRender = singleCategoryTemplates[singleCat] || singleCategoryTemplates.QUANG_CAO;
                }

                return (
                    <div className="space-y-4 font-normal">
                        {stepsToRender.map((step, index) => (
                            <div key={index} className="flex gap-4 items-start text-xs avoid-break">
                                <div className={`flex-shrink-0 w-6 h-6 rounded-full flex items-center justify-center font-bold text-xs ${tone.accentBg} ${tone.accentText}`}>
                                    {index + 1}
                                </div>
                                <div className="flex-grow animate-fadeIn">
                                    <div className="flex justify-between items-baseline mb-0.5">
                                        <h5 className={`font-bold uppercase tracking-wider ${tone.textMain}`}>{step.title}</h5>
                                        <span className={`text-[9px] font-semibold px-2 py-0.5 rounded-full ${tone.badgeBg} ${tone.badgeText}`}>{step.duration}</span>
                                    </div>
                                    <p className={`${tone.textMuted} leading-relaxed`}>{step.desc}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                );
            };

            // Khung kết xuất UI phụ trợ chứa các lựa chọn đề xuất nhanh
            const renderSuggestionBox = (fieldKey, suggestionsArray, currentValue, setter) => {
                const isOpen = openSuggestions[fieldKey];

                if (!isOpen) return null;

                return (
                    <div className="mt-1 bg-zinc-900 border border-amber-500/30 rounded-lg p-2 space-y-1 animate-fadeIn shadow-lg relative z-20">
                        <div className="space-y-1 max-h-[160px] overflow-y-auto no-scrollbar">
                            {suggestionsArray.map((suggestion, index) => {
                                const isSelected = currentValue === suggestion;
                                return (
                                    <button
                                        key={index}
                                        type="button"
                                        onMouseDown={(e) => {
                                            e.preventDefault();
                                            setter(suggestion);
                                            setOpenSuggestions(prev => ({ ...prev, [fieldKey]: false }));
                                        }}
                                        className={`w-full text-left text-xs p-2.5 rounded-lg transition-all duration-150 leading-relaxed flex items-start gap-2 border ${
                                            isSelected 
                                            ? "bg-amber-500/20 text-white border-amber-400 font-semibold shadow-md shadow-amber-500/5" 
                                            : "bg-zinc-950 text-zinc-300 border-zinc-800/80 hover:bg-amber-500/10 hover:text-white hover:border-amber-500/40"
                                        }`}
                                    >
                                        <span className="opacity-60 font-bold mt-0.5">{index + 1}.</span>
                                        <span>{suggestion}</span>
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            const toneStyles = {
                TRANG_DEN: {
                    bg: "bg-white",
                    textMain: "text-slate-900",
                    textMuted: "text-slate-500",
                    accentBg: "bg-slate-900",
                    accentText: "text-white",
                    border: "border-slate-200",
                    secBg: "bg-slate-50",
                    badgeBg: "bg-slate-100",
                    badgeText: "text-slate-800"
                },
                NAU_VANG: {
                    bg: "bg-[#FAF6F0]", 
                    textMain: "text-[#3E2723]", 
                    textMuted: "text-[#8D6E63]", 
                    accentBg: "bg-[#4E342E]", 
                    accentText: "text-[#FFD700]", 
                    border: "border-[#D7CCC8]", 
                    secBg: "bg-[#F5EBE0]", 
                    badgeBg: "bg-[#EFE3C3]", 
                    badgeText: "text-[#5D4037]"
                },
                XANH_TRANG: {
                    bg: "bg-white", 
                    textMain: "text-[#0F172A]", 
                    textMuted: "text-[#475569]", 
                    accentBg: "bg-[#1E3A8A]", 
                    accentText: "text-white", 
                    border: "border-[#E2E8F0]",
                    secBg: "bg-[#F1F5F9]", 
                    badgeBg: "bg-[#DBEAFE]", 
                    badgeText: "text-[#1E40AF]"
                }
            };

            return (
                <div className="flex-grow flex flex-col md:flex-row min-h-screen relative overflow-x-hidden bg-black text-zinc-100">
                    
                    {/* CUSTOM ERROR MODAL */}
                    {showErrorModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-fadeIn no-print">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-2xl max-w-md w-full p-6 shadow-2xl relative">
                                <div className="text-center">
                                    <div className="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-amber-950/40 text-amber-400 mb-4 border border-amber-800">
                                        <svg className="h-6 w-6" fill="none" viewBox="0 0 24 24" strokeWidth="1.5" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
                                        </svg>
                                    </div>
                                    <h3 className="text-sm font-bold uppercase tracking-wider text-white mb-2">Thông báo</h3>
                                    <p className="text-xs text-zinc-300 leading-relaxed font-semibold uppercase">
                                        {errorMessage}
                                    </p>
                                </div>
                                <div className="mt-6">
                                    <button 
                                        onClick={() => {
                                            setShowErrorModal(false);
                                            setErrorMessage("");
                                        }}
                                        className="w-full bg-gradient-to-b from-amber-400 to-amber-500 hover:from-amber-500 hover:to-amber-600 text-zinc-950 font-bold py-2.5 px-4 rounded-lg text-xs uppercase transition-all duration-75 border-b-2 border-amber-700 active:border-b-0 active:translate-y-[2px]"
                                    >
                                        Xác nhận
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* CUSTOM CONFIRM MODAL */}
                    {showConfirmModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-fadeIn no-print">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-2xl max-w-md w-full p-6 shadow-2xl relative">
                                <div className="text-center">
                                    <div className="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-900/30 text-red-400 mb-4 border border-red-800">
                                        <svg className="h-6 w-6" fill="none" viewBox="0 0 24 24" strokeWidth="1.5" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
                                        </svg>
                                    </div>
                                    <h3 className="text-sm font-bold uppercase tracking-wider text-white mb-2">CẢNH BÁO THAY ĐỔI</h3>
                                    <p className="text-xs text-zinc-300 leading-relaxed uppercase">
                                        BÁO GIÁ TRƯỚC ĐÂY CỦA BẠN SẼ BỊ XÓA, BẠN CÓ MUỐN ĐỔI SẢN PHẨM?
                                    </p>
                                </div>
                                <div className="mt-6 flex flex-col sm:flex-row gap-3">
                                    <button 
                                        onClick={confirmCategoryChange}
                                        className="flex-1 bg-gradient-to-b from-red-500 to-red-600 hover:from-red-600 hover:to-red-700 text-white font-bold py-2.5 px-4 rounded-lg text-xs uppercase transition-all duration-75 border-b-2 border-red-800 active-translate-y-[2px]"
                                    >
                                        Đồng ý đổi
                                    </button>
                                    <button 
                                        onClick={cancelCategoryChange}
                                        className="flex-1 bg-zinc-850 hover:bg-zinc-800 text-zinc-300 font-medium py-2.5 px-4 rounded-lg text-xs uppercase transition-all duration-75 border border-zinc-800"
                                    >
                                        Hủy bỏ
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* LEFT PANEL: CONFIGURATOR */}
                    <div className="w-full md:w-[45%] bg-zinc-900 p-6 md:p-8 flex flex-col border-r border-zinc-800 no-print max-h-[calc(100vh-80px)] overflow-y-auto no-scrollbar pb-32">
                        
                        <div className="mb-8 border-b border-zinc-800 pb-6">
                            <div className="flex items-center gap-3 mb-2">
                                <span className="bg-gradient-to-b from-zinc-200 to-zinc-400 text-zinc-950 font-bold px-2.5 py-1 rounded text-xs tracking-wider border-b-2 border-zinc-500 shadow-sm">UP MEDIA</span>
                                <h1 className="text-xl font-bold font-montserrat tracking-tight text-white flex items-center gap-2">
                                    BÁO GIÁ DỊCH VỤ
                                </h1>
                            </div>
                            <p className="text-xs text-zinc-400">Thiết lập cấu hình quay dựng nhanh chóng và xuất báo giá chuyên nghiệp.</p>
                        </div>

                        {/* Customer Info Section */}
                        <div className="mb-6 bg-zinc-800 p-4 rounded-xl border border-zinc-800">
                            <h3 className="text-xs font-semibold tracking-wider text-zinc-200 uppercase mb-3 flex items-center gap-2 border-b border-zinc-700 pb-2">
                                Thông Tin Khách Hàng & Dự Án
                            </h3>
                            <div className="grid grid-cols-1 gap-3 text-sm">
                                <div>
                                    <label className="block text-xs text-zinc-400 mb-1">Tên Đơn vị / Đối tác / Khách hàng</label>
                                    <input 
                                        type="text" 
                                        value={clientName} 
                                        onChange={(e) => setClientName(e.target.value)}
                                        className="w-full bg-black border border-zinc-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-zinc-400 text-xs" 
                                        placeholder="Công ty, đối tác..."
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs text-zinc-400 mb-1">Người đại diện / SĐT</label>
                                    <input 
                                        type="text" 
                                        value={clientContact} 
                                        onChange={(e) => setClientContact(e.target.value)}
                                        className="w-full bg-black border border-zinc-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-zinc-400 text-xs" 
                                        placeholder="Tên, số điện thoại..."
                                    />
                                </div>
                                <div>
                                    <div className="flex justify-between items-center mb-1">
                                        <label className="block text-xs text-zinc-400">Tên Dự Án Truyền Thông <span className="text-red-500 font-bold">*</span></label>
                                        <span className="text-[10px] text-amber-500 font-semibold uppercase">Yêu cầu nhập</span>
                                    </div>
                                    <input 
                                        type="text" 
                                        value={projectName} 
                                        onChange={(e) => setProjectName(e.target.value)}
                                        className="w-full bg-black border border-zinc-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-zinc-400 text-xs font-medium" 
                                        placeholder="Tên dự án thực hiện..."
                                    />
                                </div>
                            </div>
                        </div>

                        {/* MENU CHỌN SẢN PHẨM CHÍNH */}
                        <div className="mb-6 bg-zinc-800 p-4 rounded-xl border border-zinc-800">
                            <label className="block text-xs font-bold uppercase tracking-wider text-zinc-200 mb-3 border-b border-zinc-700 pb-2">
                                Dòng Sản Phẩm Cấu Hình
                            </label>
                            <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
                                <button onClick={() => handleCategoryClick('QUANG_CAO')} className={getTabClass('QUANG_CAO')}>QUẢNG CÁO</button>
                                <button onClick={() => handleCategoryClick('XAY_KENH')} className={getTabClass('XAY_KENH')}>XÂY KÊNH</button>
                                <button onClick={() => handleCategoryClick('QUAY_BDS')} className={getTabClass('QUAY_BDS')}>QUAY BDS</button>
                                <button onClick={() => handleCategoryClick('EVENT')} className={getTabClass('EVENT')}>EVENT</button>
                                <button onClick={() => handleCategoryClick('THOI_TRANG')} className={getTabClass('THOI_TRANG')}>THỜI TRANG</button>
                                <button onClick={() => handleCategoryClick('PHIM_TVC')} className={getTabClass('PHIM_TVC')}>PHIM TVC</button>
                                <button onClick={() => handleCategoryClick('DICH_VU_LE')} className={getTabClass('DICH_VU_LE')}>DỊCH VỤ LẺ</button>
                            </div>
                        </div>

                        {/* SUB-CONFIGURATORS BASED ON ACTIVE CATEGORY */}
                        <div className="space-y-6">
                            
                            <div className="flex items-center justify-between border-b border-zinc-800 pb-3">
                                <h2 className="text-sm font-bold font-montserrat text-white">
                                    Cấu Hình: {activeCategory === 'DICH_VU_LE' ? 'DỊCH VỤ LẺ' : activeCategory === 'PHIM_TVC' ? 'PHIM TVC' : activeCategory.replace('_', ' ')}
                                </h2>
                                <span className="text-xs bg-zinc-800 text-zinc-300 px-2.5 py-1 rounded font-medium border border-zinc-700">
                                    Giá tạm tính: <strong className="text-zinc-200">{formatVND(activeCalculation.total)}</strong>
                                </span>
                            </div>

                            {/* CATEGORY: PHIM TVC */}
                            {activeCategory === 'PHIM_TVC' && (
                                <div className="space-y-4 animate-fadeIn">
                                    <div className="bg-zinc-800 p-4 rounded-xl border border-zinc-800 space-y-4">
                                        <div>
                                            <label className="block text-xs font-bold text-zinc-300 mb-2 uppercase tracking-wider">Tổng Ngân Sách Phim TVC (VND)</label>
                                            <p className="text-[10px] text-zinc-400 mb-3 leading-normal">
                                                Nhập tổng ngân sách TVC thương hiệu để hệ thống tự động bóc tách các hạng mục tiêu chuẩn điện ảnh (Kịch bản cố định 2,000,000đ; Đạo diễn, Quay phim, Thiết bị, Hậu kỳ...).
                                            </p>
                                            <div className="relative">
                                                <input 
                                                    type="number" 
                                                    min="5000000" 
                                                    value={tvcBudget} 
                                                    onChange={(e) => setTvcBudget(Math.max(0, parseInt(e.target.value) || 0))} 
                                                    className="w-full bg-black border border-zinc-800 rounded-lg px-3 py-2.5 text-sm font-bold text-amber-400 focus:outline-none focus:border-amber-500 font-mono tracking-wide" 
                                                    placeholder="Nhập tổng ngân sách TVC..."
                                                />
                                                <span className="absolute right-3 top-3 text-[10px] text-zinc-500 font-bold">VND</span>
                                            </div>
                                        </div>

                                        <div className="space-y-2 pt-2 border-t border-zinc-700 text-[11px] text-zinc-400">
                                            <span className="block text-[10px] font-bold text-zinc-300 uppercase tracking-wider mb-1">Cơ cấu dự án bóc tách tự động:</span>
                                            <div className="flex justify-between border-b border-zinc-850 py-1">
                                                <span>Kịch bản & Storyboard (Cố định):</span>
                                                <span className="font-bold text-zinc-300">{formatVND(Math.min(2000000, tvcBudget))}</span>
                                            </div>
                                            {tvcBudget > 2000000 && (
                                                <React.Fragment>
                                                    <div className="flex justify-between border-b border-zinc-850 py-1">
                                                        <span>Đạo diễn & AD chỉ đạo (15%):</span>
                                                        <span className="font-bold text-zinc-300">{formatVND(Math.round((tvcBudget - 2000000) * 0.15))}</span>
                                                    </div>
                                                    <div className="flex justify-between border-b border-zinc-850 py-1">
                                                        <span>Quay phim & Ê-kíp sản xuất (20%):</span>
                                                        <span className="font-bold text-zinc-300">{formatVND(Math.round((tvcBudget - 2000000) * 0.20))}</span>
                                                    </div>
                                                    <div className="flex justify-between border-b border-zinc-850 py-1">
                                                        <span>Máy quay Cinema & Ánh sáng (15%):</span>
                                                        <span className="font-bold text-zinc-300">{formatVND(Math.round((tvcBudget - 2000000) * 0.15))}</span>
                                                    </div>
                                                    <div className="flex justify-between border-b border-zinc-850 py-1">
                                                        <span>Diễn viên & Phục trang & Makeup (25%):</span>
                                                        <span className="font-bold text-zinc-300">{formatVND(Math.round((tvcBudget - 2000000) * 0.25))}</span>
                                                    </div>
                                                    <div className="flex justify-between border-b border-zinc-850 py-1">
                                                        <span>Hậu kỳ chuyên sâu, VFX & Grading (20%):</span>
                                                        <span className="font-bold text-zinc-300">{formatVND(Math.round((tvcBudget - 2000000) * 0.20))}</span>
                                                    </div>
                                                    <div className="flex justify-between py-1">
                                                        <span>Chi phí dự phòng & Logistic (5%):</span>
                                                        <span className="font-bold text-zinc-300">
                                                            {formatVND((tvcBudget - 2000000) - (
                                                                Math.round((tvcBudget - 2000000) * 0.15) +
                                                                Math.round((tvcBudget - 2000000) * 0.20) +
                                                                Math.round((tvcBudget - 2000000) * 0.15) +
                                                                Math.round((tvcBudget - 2000000) * 0.25) +
                                                                Math.round((tvcBudget - 2000000) * 0.20)
                                                            ))}
                                                        </span>
                                                    </div>
