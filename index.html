                                                <button onClick={() => setDlMauQty(Math.max(0, dlMauQty - 1))} className="bg-gradient-to-b from-zinc-600 to-zinc-700 text-white border-b-2 border-zinc-800 active:border-b-0 active:translate-y-[2px] w-6 h-6 rounded flex items-center justify-center text-xs font-bold">-</button>
                                                <input type="number" min="0" value={dlMauQty} onChange={(e) => setDlMauQty(parseInt(e.target.value) || 0)} className="w-12 bg-black border border-zinc-800 text-center rounded text-xs text-white p-1" />
                                                <button onClick={() => setDlMauQty(dlMauQty + 1)} className="bg-gradient-to-b from-zinc-600 to-zinc-700 text-white border-b-2 border-zinc-800 active:border-b-0 active:translate-y-[2px] w-6 h-6 rounded flex items-center justify-center text-xs font-bold">+</button>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-zinc-800 p-4 rounded-xl border border-zinc-700 space-y-3">
                                        <div className="flex items-center justify-between border-b border-zinc-700 pb-2">
                                            <label className="block text-xs font-semibold text-zinc-300 uppercase">Dịch vụ tùy chỉnh ngoài hệ thống</label>
                                            <span className="text-[9px] bg-gradient-to-r from-amber-500 to-yellow-400 text-black px-1.5 py-0.5 rounded font-bold uppercase tracking-wide">Trợ Lý AI ✨</span>
                                        </div>
                                        <div className="space-y-2.5">
                                            <div>
                                                <label className="block text-[10px] text-zinc-400 mb-1">Tên dịch vụ tự nhập</label>
                                                <div className="flex gap-2">
                                                    <input 
                                                        type="text" 
                                                        value={dlCustomName} 
                                                        onChange={(e) => setDlCustomName(e.target.value)}
                                                        onBlur={() => {
                                                            if (dlCustomName.trim() && (!dlCustomDesc || dlCustomDesc.startsWith("Dịch vụ phát sinh ngoài hệ thống"))) {
                                                                generateDescriptionWithAI(dlCustomName);
                                                            }
                                                        }}
                                                        className="flex-grow bg-black border border-zinc-850 rounded px-2.5 py-1.5 text-xs text-white focus:outline-none focus:border-zinc-400" 
                                                        placeholder="Ví dụ: Thiết kế bộ nhận diện POSM, Livestream Tiktok..."
                                                    />
                                                    <button
                                                        type="button"
                                                        onClick={() => generateDescriptionWithAI(dlCustomName)}
                                                        disabled={isGeneratingDesc || !dlCustomName.trim()}
                                                        className="bg-zinc-850 hover:bg-zinc-800 border border-zinc-750 text-amber-400 hover:text-amber-300 text-[10px] font-bold px-3 py-1.5 rounded transition disabled:opacity-45 disabled:cursor-not-allowed whitespace-nowrap flex items-center gap-1"
                                                    >
                                                        {isGeneratingDesc ? (
                                                            <span className="w-3.5 h-3.5 border-2 border-amber-400 border-t-transparent rounded-full animate-spin"></span>
                                                        ) : (
                                                            "Tạo mô tả AI"
                                                        )}
                                                    </button>
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-[10px] text-zinc-400 mb-1">Mô tả dịch vụ (AI sinh tự động hoặc tự nhập)</label>
                                                <textarea 
                                                    value={dlCustomDesc} 
                                                    onChange={(e) => setDlCustomDesc(e.target.value)}
                                                    rows="2"
                                                    className="w-full bg-black border border-zinc-850 rounded px-2.5 py-1.5 text-xs text-white focus:outline-none focus:border-zinc-400 leading-relaxed" 
                                                    placeholder="AI sẽ phân tích tên dịch vụ ở trên để tự động viết mô tả thu hút tại đây..."
                                                />
                                                {aiError && <p className="text-[9px] text-red-400 mt-1">{aiError}</p>}
                                                {isGeneratingDesc && <p className="text-[9px] text-amber-400 animate-pulse mt-1">AI đang soạn thảo phương án...</p>}
                                            </div>
                                            <div>
                                                <label className="block text-[10px] text-zinc-400 mb-1">Đơn giá dịch vụ tự nhập (VNĐ)</label>
                                                <input 
                                                    type="number" 
                                                    min="0" 
                                                    value={dlCustomPrice || ""} 
                                                    onChange={(e) => setDlCustomPrice(parseInt(e.target.value) || 0)}
                                                    className="w-full bg-black border border-zinc-850 rounded px-2.5 py-1.5 text-xs text-white focus:outline-none focus:border-zinc-400" 
                                                    placeholder="Nhập số tiền..."
                                                />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>

                        {/* ADD & RESET INTERACTIVE ACTIONS */}
                        <div className="mt-8 pt-6 border-t border-zinc-800 flex flex-col sm:flex-row gap-3">
                            <button onClick={handleAddToQuote} className="flex-1 bg-gradient-to-b from-zinc-100 to-zinc-300 text-zinc-950 border-b-4 border-zinc-500 active:border-b-0 active:translate-y-[4px] hover:brightness-110 text-xs font-bold py-3.5 px-4 rounded-lg transition-all duration-75 flex items-center justify-center gap-2 shadow-md shadow-black/40 uppercase tracking-wider animate-gentle-pulse">THÊM VÀO BÁO GIÁ PHÍA DƯỚI</button>
                            {invoiceItems.length > 0 && (
                                <button onClick={handleClearQuote} className="bg-gradient-to-b from-zinc-700 to-zinc-800 text-zinc-200 border-b-4 border-zinc-900 active:border-b-0 active:translate-y-[4px] hover:brightness-110 text-xs font-bold py-3.5 px-4 rounded-lg transition-all duration-75 flex items-center justify-center gap-2 shadow-md shadow-black/40 uppercase tracking-wider">XÓA TẤT CẢ</button>
                            )}
                        </div>

                        {/* NÚT LÀM PROPOSAL PHÁT TRIỂN MỚI */}
                        <div className="mt-4">
                            <button 
                                onClick={() => {
                                    setShowProposalConfig(!showProposalConfig);
                                }}
                                className={`w-full font-bold py-3 px-4 rounded-lg transition-all duration-75 text-xs flex items-center justify-center gap-2 shadow-md uppercase tracking-wider ${
                                    showProposalConfig 
                                    ? "bg-gradient-to-b from-yellow-500 to-yellow-600 text-yellow-950 border-b-4 border-yellow-700 active:border-b-0 active:translate-y-[4px] hover:from-yellow-600 hover:to-yellow-700" 
                                    : "bg-gradient-to-b from-yellow-100 to-yellow-300 text-yellow-950 border-b-4 border-yellow-400 active:border-b-0 active:translate-y-[4px] hover:from-yellow-50 hover:to-yellow-200"
                                }`}
                            >
                                <svg className="w-4 h-4 text-yellow-950" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                </svg>
                                {showProposalConfig ? "ĐÓNG KHUNG CẤU HÌNH PROPOSAL" : "LÀM PROPOSAL (ĐỀ XUẤT Ý TƯỞNG)"}
                            </button>
                        </div>

                        {/* KHUNG NHẬP THÔNG TIN DỰ ÁN PROPOSAL (ẨN/HIỆN) */}
                        {showProposalConfig && (
                            <div className="mt-4 bg-zinc-850 border border-zinc-800 rounded-xl p-4 space-y-4 animate-fadeIn">
                                <h3 className="text-xs font-bold text-amber-400 uppercase tracking-widest border-b border-zinc-800 pb-2 flex items-center justify-between">
                                    <span>Cấu hình Proposal dự án</span>
                                    <span className="text-[10px] text-zinc-500 capitalize normal-case font-normal">Tự động kết hợp báo giá</span>
                                </h3>

                                {/* Chọn Tone Màu */}
                                <div>
                                    <label className="block text-[10px] text-zinc-400 mb-1.5 uppercase font-semibold">Tông màu chủ đạo của Proposal</label>
                                    <div className="grid grid-cols-3 gap-2">
                                        <button 
                                            type="button"
                                            onClick={() => setProposalTone('TRANG_DEN')}
                                            className={`py-2 px-1 text-[10px] font-bold rounded border transition-all ${
                                                proposalTone === 'TRANG_DEN' 
                                                ? "bg-white text-slate-950 border-white" 
                                                : "bg-zinc-900 text-zinc-400 border-zinc-800 hover:border-zinc-700"
                                            }`}
                                        >
                                            Trắng - Đen
                                        </button>
                                        <button 
                                            type="button"
                                            onClick={() => setProposalTone('NAU_VANG')}
                                            className={`py-2 px-1 text-[10px] font-bold rounded border transition-all ${
                                                proposalTone === 'NAU_VANG' 
                                                ? "bg-[#4E342E] text-[#FFD700] border-[#FFD700]" 
                                                : "bg-zinc-900 text-zinc-400 border-zinc-800 hover:border-zinc-700"
                                            }`}
                                        >
                                            Nâu - Vàng
                                        </button>
                                        <button 
                                            type="button"
                                            onClick={() => setProposalTone('XANH_TRANG')}
                                            className={`py-2 px-1 text-[10px] font-bold rounded border transition-all ${
                                                proposalTone === 'XANH_TRANG' 
                                                ? "bg-[#1E3A8A] text-white border-blue-400" 
                                                : "bg-zinc-900 text-zinc-400 border-zinc-800 hover:border-zinc-700"
                                            }`}
                                        >
                                            Xanh - Trắng
                                        </button>
                                    </div>
                                </div>

                                {/* Nhập liệu thông tin định hướng kết hợp các đề xuất trợ lý thông minh */}
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-xs text-zinc-300 mb-1 font-bold uppercase tracking-wider">Mục tiêu chiến dịch / dự án</label>
                                        <input 
                                            type="text"
                                            value={propObjective}
                                            onChange={(e) => setPropObjective(e.target.value)}
                                            onFocus={() => setOpenSuggestions(prev => ({ ...prev, objective: true }))}
                                            onBlur={() => setTimeout(() => setOpenSuggestions(prev => ({ ...prev, objective: false })), 200)}
                                            className="w-full bg-black border border-zinc-800 rounded px-2.5 py-1.5 text-xs text-white focus:outline-none focus:border-zinc-400 leading-normal"
                                            placeholder="Ví dụ: Đẩy mạnh viral sản phẩm mới, tăng trưởng traffic..."
                                        />
                                        {renderSuggestionBox('objective', generatedSuggestions.objectives, propObjective, setPropObjective)}
                                    </div>

                                    <div>
                                        <label className="block text-xs text-zinc-300 mb-1 font-bold uppercase tracking-wider">Đối tượng người xem mục tiêu</label>
                                        <input 
                                            type="text"
                                            value={propTarget}
                                            onChange={(e) => setPropTarget(e.target.value)}
                                            onFocus={() => setOpenSuggestions(prev => ({ ...prev, target: true }))}
                                            onBlur={() => setTimeout(() => setOpenSuggestions(prev => ({ ...prev, target: false })), 200)}
                                            className="w-full bg-black border border-zinc-800 rounded px-2.5 py-1.5 text-xs text-white focus:outline-none focus:border-zinc-400 leading-normal"
                                            placeholder="Ví dụ: Giới trẻ 18-25, các chủ doanh nghiệp vừa và nhỏ..."
                                        />
                                        {renderSuggestionBox('target', generatedSuggestions.targets, propTarget, setPropTarget)}
                                    </div>

                                    <div>
                                        <label className="block text-xs text-zinc-300 mb-1 font-bold uppercase tracking-wider">Thông điệp cốt lõi truyền tải</label>
                                        <input 
                                            type="text"
                                            value={propMessage}
                                            onChange={(e) => setPropMessage(e.target.value)}
                                            onFocus={() => setOpenSuggestions(prev => ({ ...prev, message: true }))}
                                            onBlur={() => setTimeout(() => setOpenSuggestions(prev => ({ ...prev, message: false })), 200)}
                                            className="w-full bg-black border border-zinc-800 rounded px-2.5 py-1.5 text-xs text-white focus:outline-none focus:border-zinc-400 leading-normal"
                                            placeholder="Ví dụ: Khác biệt tinh tế, giải pháp tối ưu cho doanh nghiệp..."
                                        />
                                        {renderSuggestionBox('message', generatedSuggestions.messages, propMessage, setPropMessage)}
                                    </div>

                                    <div>
                                        <label className="block text-xs text-zinc-300 mb-1 font-bold uppercase tracking-wider">Định hướng sản xuất & Visual ý tưởng (Tùy chỉnh)</label>
                                        <textarea 
                                            value={propDirection}
                                            onChange={(e) => setPropDirection(e.target.value)}
                                            onFocus={() => setOpenSuggestions(prev => ({ ...prev, direction: true }))}
                                            onBlur={() => setTimeout(() => setOpenSuggestions(prev => ({ ...prev, direction: false })), 200)}
                                            rows="3"
                                            className="w-full bg-black border border-zinc-800 rounded px-2.5 py-1.5 text-xs text-white focus:outline-none focus:border-zinc-400 leading-relaxed"
                                            placeholder="Tự nhập định hướng sản xuất tại đây..."
                                        ></textarea>
                                        {renderSuggestionBox('direction', generatedSuggestions.directions, propDirection, setPropDirection)}
                                    </div>

                                    <div>
                                        <label className="block text-xs text-zinc-300 mb-1 font-bold uppercase tracking-wider">Các điều khoản chung đề xuất</label>
                                        <textarea 
                                            value={propTerms}
                                            onChange={(e) => {
                                                setPropTerms(e.target.value);
                                                setIsTermsEdited(true);
                                            }}
                                            rows="4"
                                            className="w-full bg-black border border-zinc-800 rounded px-2.5 py-1.5 text-xs text-white focus:outline-none focus:border-zinc-400 leading-relaxed"
                                        ></textarea>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Cấu hình chiết khấu, thuế, ghi chú, ẩm hiện tổng tiền */}
                        <div className="mt-6 bg-zinc-800 p-4 rounded-xl border border-zinc-800 space-y-3">
                            <h4 className="text-xs font-semibold text-zinc-300 uppercase tracking-wider border-b border-zinc-700 pb-2">Cấu hình chiết khấu & VAT (Toàn hóa đơn)</h4>
                            <div className="flex items-center justify-between py-2 border-b border-zinc-900 pb-2">
                                <div>
                                    <span className="block text-xs font-medium text-white">Hiển thị Tổng Thanh Toán</span>
                                    <span className="text-[10px] text-zinc-400">Ẩn hoặc hiện bảng thống kê tổng tiền ở bản xuất PDF/PNG</span>
                                </div>
                                <input type="checkbox" checked={showTotal} onChange={(e) => setShowTotal(e.target.checked)} className="w-4 h-4 text-zinc-950 bg-zinc-900 border border-zinc-700 rounded focus:ring-zinc-400 cursor-pointer" />
                            </div>

                            <div className="grid grid-cols-2 gap-3">
                                <div>
                                    <label className="block text-[10px] text-zinc-400 mb-1">Giảm giá (%)</label>
                                    <input type="number" min="0" max="100" value={discountPercent} onChange={(e) => setDiscountPercent(Math.min(100, Math.max(0, parseInt(e.target.value) || 0)))} className="w-full bg-black border border-zinc-800 rounded px-2.5 py-1.5 text-xs text-white" />
                                </div>
                                <div>
                                    <label className="block text-[10px] text-zinc-400 mb-1">Thuế VAT (%)</label>
                                    <select value={vatPercent} onChange={(e) => setVatPercent(parseInt(e.target.value))} className="w-full bg-black border border-zinc-800 rounded px-2 py-1.5 text-xs text-white">
                                        <option value="0">Không có (0%)</option>
                                        <option value="8">VAT 8%</option>
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label className="block text-[10px] text-zinc-400 mb-1">Ghi chú chân trang báo giá</label>
                                <textarea value={note} onChange={(e) => setNote(e.target.value)} rows="2" className="w-full bg-black border border-zinc-800 rounded px-2.5 py-1 text-xs text-white focus:outline-none focus:border-zinc-400" placeholder="Nội dung điều khoản, bàn giao..."></textarea>
                            </div>
                        </div>

                    </div>

                    {/* RIGHT PANEL: LIVE DOCUMENT VIEW */}
                    <div className="w-full md:w-[55%] bg-black p-4 md:p-8 flex flex-col items-center overflow-y-auto max-h-[calc(100vh-80px)] md:max-h-screen pb-36">
                        
                        {/* BỘ CHUYỂN ĐỔI CHẾ ĐỘ XEM TRÊN MOCKUP (no-print) */}
                        <div className="flex justify-center gap-3 mb-4 no-print w-full max-w-[800px]">
                            <button 
                                onClick={() => setPreviewMode('QUOTE')}
                                className={`flex-1 py-2 rounded-lg text-xs font-bold uppercase transition-all border-b-2 ${
                                    previewMode === 'QUOTE' 
                                    ? "bg-zinc-100 text-slate-950 border-zinc-400 shadow" 
                                    : "bg-zinc-800 text-zinc-400 border-zinc-950 hover:text-white"
                                }`}
                            >
                                Xem Bản Báo Giá
                            </button>
                            <button 
                                onClick={() => setPreviewMode('PROPOSAL')}
                                className={`flex-1 py-2 rounded-lg text-xs font-bold uppercase transition-all border-b-2 ${
                                    previewMode === 'PROPOSAL' 
                                    ? "bg-zinc-100 text-slate-950 border-zinc-400 shadow" 
                                    : "bg-zinc-800 text-zinc-400 border-zinc-950 hover:text-white"
                                }`}
                            >
                                Xem Bản Proposal Ý Tưởng
                            </button>
                        </div>

                        {/* A4 Paper Mockup */}
                        <div 
                            id="quote-paper-pdf" 
                            className={`print-area w-full max-w-[800px] shadow-2xl rounded-sm p-6 md:p-10 min-h-[1100px] border transition-all duration-200 select-none ${
                                previewMode === 'QUOTE' 
                                ? "bg-white text-slate-900 border-slate-200" 
                                : `${toneStyles[proposalTone].bg} ${toneStyles[proposalTone].textMain} ${toneStyles[proposalTone].border}`
                            }`}
                        >
                            {/* GIAO DIỆN 1: BẢN BÁO GIÁ TRUYỀN THỐNG */}
                            {previewMode === 'QUOTE' ? (
                                <div className="animate-fadeIn">
                                    {/* Header of Invoice */}
                                    <div className="flex flex-col sm:flex-row justify-between items-start border-b-2 border-slate-800 pb-5 mb-6 gap-4">
                                        <div>
                                            <div className="flex items-center gap-2 mb-1">
                                                <span className="bg-slate-900 text-white font-bold p-1 rounded-sm text-xs tracking-widest font-montserrat">UP</span>
                                                <h2 className="text-xl font-black font-montserrat tracking-tight text-slate-900 uppercase">{providerName}</h2>
                                            </div>
                                            <p className="text-xs text-slate-500 font-semibold mb-1">Dịch vụ quay dựng video quảng cáo, xây kênh & sự kiện chuyên nghiệp</p>
                                        </div>
                                        <div className="sm:text-right flex flex-col sm:items-end">
                                            <h3 className="text-2xl font-black text-slate-950 tracking-wide font-montserrat">BẢNG BÁO GIÁ</h3>
                                            <p className="text-xs text-slate-500">Mã phiếu: <strong>{quoteId}</strong></p>
                                            <p className="text-xs text-slate-500">Ngày lập: {quoteDate}</p>
                                        </div>
                                    </div>

                                    {/* Information of client */}
                                    <div className="bg-slate-50 rounded-lg p-4 mb-6 border border-slate-100 grid grid-cols-1 sm:grid-cols-2 gap-4 text-xs">
                                        <div className="space-y-3">
                                            <div>
                                                <strong className="text-slate-500 block text-[10px] uppercase tracking-wider mb-0.5">TÊN ĐƠN VỊ / ĐỐI TÁC / KHÁCH HÀNG</strong>
                                                <p className="text-slate-900 font-semibold min-h-[1.25rem]">{clientName || ""}</p>
                                            </div>
                                            <div>
                                                <strong className="text-slate-500 block text-[10px] uppercase tracking-wider mb-0.5">NGƯỜI ĐẠI DIỆN</strong>
                                                <p className="text-slate-800 font-medium min-h-[1.25rem]">{clientContact || ""}</p>
                                            </div>
                                        </div>
                                        <div className="space-y-3">
                                            <div>
                                                <strong className="text-slate-500 block text-[10px] uppercase tracking-wider mb-0.5">TÊN DỰ ÁN</strong>
                                                <p className="text-indigo-700 font-bold min-h-[1.25rem]">{projectName || ""}</p>
                                            </div>
                                            <div>
                                                <strong className="text-slate-500 block text-[10px] uppercase tracking-wider mb-0.5">NỘI DUNG DỊCH VỤ</strong>
                                                <p className="text-slate-600">Quay phim & Hậu kỳ video chuyên nghiệp thương hiệu.</p>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Table Content */}
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-xs">
                                            <thead>
                                                <tr className="bg-slate-900 text-white font-montserrat uppercase tracking-wider text-[10px]">
                                                    <th className="py-2.5 px-3 rounded-l">STT</th>
                                                    <th className="py-2.5 px-3">Hạng Mục Công Việc</th>
                                                    <th className="py-2.5 px-3 text-center">SL</th>
                                                    <th className="py-2.5 px-3 text-right">Đơn Giá</th>
                                                    <th className="py-2.5 px-3 text-right rounded-r">Thành Tiền</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {finalQuoteItems.length === 0 ? (
                                                    <tr>
                                                        <td colSpan="5" className="py-12 text-center text-slate-400 italic">
                                                            Chưa có dịch vụ nào được cấu hình chính thức. 
                                                            <br />
                                                            <span className="text-[11px] text-slate-500 not-italic">Vui lòng thiết lập cấu hình ở bảng bên trái rồi chọn "Thêm vào báo giá" để hiển thị dịch vụ trên tờ báo giá.</span>
                                                        </td>
                                                    </tr>
                                                ) : (
                                                    finalQuoteItems.map((item, idx) => (
                                                        <tr 
                                                            key={item.id} 
                                                            onClick={() => {
                                                                if (invoiceItems.length > 0) {
                                                                    setActiveMenuId(activeMenuId === item.id ? null : item.id);
                                                                }
                                                            }}
                                                            className={"border-b border-slate-100 hover:bg-slate-50 transition " + (invoiceItems.length > 0 ? "cursor-pointer" : "")}
                                                        >
                                                            <td className="py-3.5 px-3 font-semibold text-slate-400 w-8">{idx + 1}</td>
                                                            <td className="py-3.5 px-3">
                                                                <div className="font-semibold text-slate-900">{item.name}</div>
                                                                {item.desc && <div className="text-[10px] text-slate-500 leading-tight mt-0.5">{item.desc}</div>}
                                                            </td>
                                                            <td className="py-3.5 px-3 text-center font-medium text-slate-800">{item.qty}</td>
                                                            <td className="py-3.5 px-3 text-right font-medium text-slate-800">
                                                                {item.unitPrice > 0 ? formatVND(item.unitPrice) : "-"}
                                                            </td>
                                                            <td className="py-3.5 px-3 text-right font-bold text-slate-950 relative">
                                                                {formatVND(item.subtotal)}
                                                                
                                                                {/* Menu ẩn hành động thông minh (no-print) */}
                                                                {invoiceItems.length > 0 && activeMenuId === item.id && (
                                                                    <div 
                                                                        className="absolute top-1/2 -translate-y-1/2 bg-slate-900 text-white border border-slate-700 rounded-lg shadow-xl py-1.5 px-3 z-50 flex items-center gap-2 no-print animate-fadeIn" 
                                                                        style={{ right: '100%', marginRight: '8px' }}
                                                                    >
                                                                        <span className="text-[10px] font-semibold text-slate-300 whitespace-nowrap">Tùy chọn:</span>
                                                                        <button 
                                                                            onClick={(e) => {
                                                                                e.stopPropagation();
                                                                                handleRemoveItem(item.id);
                                                                            }}
                                                                            className="bg-red-600 hover:bg-red-700 text-white font-bold py-1 px-2.5 rounded text-[10px] uppercase transition-all duration-75 whitespace-nowrap"
                                                                        >
                                                                            Xóa
                                                                        </button>
                                                                        <button 
                                                                            onClick={(e) => {
                                                                                e.stopPropagation();
                                                                                setActiveMenuId(null);
                                                                            }}
                                                                            className="bg-slate-700 hover:bg-slate-600 text-slate-200 font-medium py-1 px-2 rounded text-[10px] transition-all duration-75 whitespace-nowrap"
                                                                        >
                                                                            Đóng
                                                                        </button>
                                                                    </div>
                                                                )}
                                                            </td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>

                                    {/* Calculation Summary Block */}
                                    {showTotal && (
                                        <div className="mt-8 flex justify-end">
                                            <div className="w-full sm:w-1/2 space-y-2 border-t border-slate-200 pt-4 text-xs">
                                                <div className="flex justify-between text-slate-600">
                                                    <span>Tổng giá trị dịch vụ:</span>
                                                    <span className="font-semibold">{formatVND(subtotal)}</span>
                                                </div>
                                                {discountPercent > 0 && (
                                                    <div className="flex justify-between text-emerald-600 font-medium">
                                                        <span>Chiết khấu ({discountPercent}%):</span>
                                                        <span>-{formatVND(discountAmount)}</span>
                                                    </div>
                                                )}
                                                {vatPercent > 0 && (
                                                    <div className="flex justify-between text-slate-600">
                                                        <span>Thuế VAT ({vatPercent}%):</span>
                                                        <span>{formatVND(vatAmount)}</span>
                                                    </div>
                                                )}
                                                <div className="flex justify-between border-t border-slate-300 pt-2 text-sm font-bold text-slate-950">
                                                    <span>TỔNG THANH TOÁN:</span>
                                                    <span className="text-slate-900 text-base">{formatVND(grandTotal)}</span>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* Terms */}
                                    <div className="mt-10 border-t border-slate-100 pt-6">
                                        <div className="mb-2">
                                            <h4 className="text-xs font-bold text-slate-800 uppercase tracking-wide mb-1">ĐIỀU KHOẢN CHUNG & GHI CHÚ</h4>
                                            <p className="text-[10px] text-slate-500 italic leading-relaxed">{note || "Không có ghi chú thêm."}</p>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                /* GIAO DIỆN 2: BẢN PROPOSAL Ý TƯỞNG & ĐỊNH HƯỚNG SẢN XUẤT TÍCH HỢP */
                                <div className="animate-fadeIn space-y-6">
                                    {/* Header Proposal */}
                                    <div className={`flex flex-col sm:flex-row justify-between items-start border-b-2 ${toneStyles[proposalTone].border} pb-4 gap-4`}>
                                        <div>
                                            <div className="flex items-center gap-2 mb-1">
                                                <span className={`${toneStyles[proposalTone].accentBg} ${toneStyles[proposalTone].accentText} font-bold px-1.5 py-0.5 rounded-sm text-xs tracking-widest font-montserrat`}>UP</span>
                                                <h2 className={`text-lg font-black font-montserrat tracking-tight uppercase ${toneStyles[proposalTone].textMain}`}>{providerName}</h2>
                                            </div>
                                            <p className="text-[10px] font-medium uppercase tracking-wider opacity-80">BẢN ĐỀ XUẤT PHƯƠNG ÁN SẢN XUẤT & BÁO GIÁ</p>
                                        </div>
                                        <div className="sm:text-right flex flex-col sm:items-end">
                                            <span className={`text-[9px] font-bold px-2.5 py-0.5 rounded-full ${toneStyles[proposalTone].badgeBg} ${toneStyles[proposalTone].badgeText} mb-1 uppercase tracking-widest`}>
                                                PROPOSAL
                                            </span>
                                            <p className="text-[10px] opacity-75">Mã tài liệu: <strong>{quoteId}</strong></p>
                                            <p className="text-[10px] opacity-75">Ngày gửi: {quoteDate}</p>
                                        </div>
                                    </div>

                                    {/* Brief Client */}
                                    <div className={`grid grid-cols-1 sm:grid-cols-2 gap-4 text-xs mt-4 p-3.5 rounded-lg border ${toneStyles[proposalTone].border} ${toneStyles[proposalTone].secBg}`}>
                                        <div>
                                            <span className="block text-[9px] font-bold uppercase opacity-60 tracking-wider mb-0.5">ĐỐI TÁC TIẾP NHẬN</span>
                                            <p className="font-bold">{clientName || ""}</p>
                                            <p className="opacity-75">{clientContact || ""}</p>
                                        </div>
                                        <div>
                                            <span className="block text-[9px] font-bold uppercase opacity-60 tracking-wider mb-0.5">DỰ ÁN SẢN XUẤT</span>
                                            <p className="font-bold text-indigo-600" style={{ color: proposalTone === 'NAU_VANG' ? '#8D6E63' : undefined }}>
                                                {projectName || ""}
                                            </p>
                                            <p className="opacity-75">Định dạng: Video ngắn truyền thông thương mại</p>
                                        </div>
                                    </div>

                                    {/* PHẦN 1: ĐỊNH HƯỚNG SẢN XUẤT */}
                                    <div className="mt-5 space-y-2">
                                        <h4 className={`text-xs font-bold uppercase tracking-widest border-b pb-1 flex items-center gap-1.5 ${toneStyles[proposalTone].textMain} ${toneStyles[proposalTone].border}`}>
                                            <span>I. Định hướng sản xuất & Visual</span>
                                        </h4>
                                        
                                        {/* Mục tiêu & Đối tượng */}
                                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 text-[11px] mb-2">
                                            <div className={`p-2.5 rounded border ${toneStyles[proposalTone].border} ${toneStyles[proposalTone].secBg}`}>
                                                <span className="block text-[9px] font-bold uppercase opacity-65 mb-0.5">MỤC TIÊU CHIẾN DỊCH</span>
                                                <p className="leading-tight font-medium">{propObjective || "Gia tăng nhận diện thương hiệu sản phẩm và kích hoạt truyền thông phủ sóng."}</p>
                                            </div>
                                            <div className={`p-2.5 rounded border ${toneStyles[proposalTone].border} ${toneStyles[proposalTone].secBg}`}>
                                                <span className="block text-[9px] font-bold uppercase opacity-65 mb-0.5">KHÁCH HÀNG MỤC TIÊU</span>
                                                <p className="leading-tight font-medium">{propTarget || "Phân khúc khách hàng mục tiêu và nhóm người xem tiềm năng của thương hiệu."}</p>
                                            </div>
                                            <div className={`p-2.5 rounded border ${toneStyles[proposalTone].border} ${toneStyles[proposalTone].secBg}`}>
                                                <span className="block text-[9px] font-bold uppercase opacity-65 mb-0.5">THÔNG ĐIỆP CỐT LÕI</span>
                                                <p className="leading-tight font-medium">{propMessage || "Sự uy tín, đẳng cấp vượt trội và trải nghiệm hoàn mỹ của dịch vụ."}</p>
                                            </div>
                                        </div>

                                        {/* Chi tiết Ý tưởng hình ảnh */}
                                        <div className={`p-3 rounded border ${toneStyles[proposalTone].border} text-xs leading-relaxed`}>
                                            <span className="block text-[9px] font-bold uppercase opacity-65 mb-1">Ý TƯỞNG CHỦ ĐẠO & GÓC QUAY</span>
                                            <p className="opacity-95 italic font-medium">{computedDirection}</p>
                                        </div>
                                    </div>

                                    {/* PHẦN 2: BẢNG BÁO GIÁ CHI TIẾT DỊCH VỤ GÓI */}
                                    <div className="mt-5 space-y-2">
                                        <h4 className={`text-xs font-bold uppercase tracking-widest border-b pb-1 ${toneStyles[proposalTone].textMain} ${toneStyles[proposalTone].border}`}>
                                            II. Dự toán & Báo giá chi tiết gói
                                        </h4>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left text-xs">
                                                <thead>
                                                    <tr className={`${toneStyles[proposalTone].accentBg} ${toneStyles[proposalTone].accentText} font-semibold uppercase tracking-wider text-[9px]`}>
                                                        <th className="py-2 px-3 rounded-l">STT</th>
                                                        <th className="py-2 px-3">Hạng Mục</th>
                                                        <th className="py-2 px-3 text-center">SL</th>
                                                        <th className="py-2 px-3 text-right">Đơn Giá</th>
                                                        <th className="py-2 px-3 text-right rounded-r">Thành Tiền</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {finalQuoteItems.length === 0 ? (
                                                        <tr>
                                                            <td colSpan="5" className="py-6 text-center italic text-slate-400">
                                                                Chưa có dịch vụ nào trong báo giá.
                                                            </td>
                                                        </tr>
                                                    ) : (
                                                        finalQuoteItems.map((item, idx) => (
                                                            <tr key={item.id} className={`border-b ${toneStyles[proposalTone].border}`}>
                                                                <td className="py-2 px-3 font-semibold opacity-60 w-8">{idx + 1}</td>
                                                                <td className="py-2 px-3">
                                                                    <div className="font-semibold">{item.name}</div>
                                                                    {item.desc && <p className="text-[9px] opacity-70 leading-tight mt-0.5">{item.desc}</p>}
                                                                </td>
                                                                <td className="py-2 px-3 text-center font-medium">{item.qty}</td>
                                                                <td className="py-2 px-3 text-right opacity-85">
                                                                    {item.unitPrice > 0 ? formatVND(item.unitPrice) : "-"}
                                                                </td>
                                                                <td className="py-2 px-3 text-right font-bold">
                                                                    {formatVND(item.subtotal)}
                                                                </td>
                                                            </tr>
                                                        ))
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>

                                        {/* Toàn bộ bảng tính chiết khấu & VAT */}
                                        {showTotal && (
                                            <div className="flex justify-end text-[11px] pt-2">
                                                <div className="w-full sm:w-1/2 space-y-1">
                                                    <div className="flex justify-between opacity-80">
                                                        <span>Giá trị gói thô:</span>
                                                        <span className="font-medium">{formatVND(subtotal)}</span>
                                                    </div>
                                                    {discountPercent > 0 && (
                                                        <div className="flex justify-between text-emerald-600 font-bold">
                                                            <span>Chiết khấu ({discountPercent}%):</span>
                                                            <span>-{formatVND(discountAmount)}</span>
                                                        </div>
                                                    )}
                                                    {vatPercent > 0 && (
                                                        <div className="flex justify-between opacity-80">
                                                            <span>Thuế suất VAT ({vatPercent}%):</span>
                                                            <span className="font-medium">{formatVND(vatAmount)}</span>
                                                        </div>
                                                    )}
                                                    <div className={`flex justify-between border-t pt-1.5 font-black text-sm ${toneStyles[proposalTone].border}`}>
                                                        <span>TỔNG DỰ TOÁN CHI PHÍ:</span>
                                                        <span className="text-base">{formatVND(grandTotal)}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    {/* PHẦN 3: QUY TRÌNH VÀ TIMELINE THỰC HIỆN */}
                                    <div className="mt-5 space-y-2.5">
                                        <h4 className={`text-xs font-bold uppercase tracking-widest border-b pb-1 ${toneStyles[proposalTone].textMain} ${toneStyles[proposalTone].border}`}>
                                            III. Quy trình & Timeline triển khai
                                        </h4>
                                        {renderTimeline(toneStyles[proposalTone])}
                                    </div>

                                    {/* PHẦN 4: ĐIỀU KHOẢN CHUNG */}
                                    <div className={`mt-8 border-t pt-5 ${toneStyles[proposalTone].border}`}>
                                        <h4 className="text-[10px] font-black uppercase tracking-widest mb-1.5">IV. Điều khoản hợp tác chung</h4>
                                        <div className="text-[10px] opacity-90 whitespace-pre-line leading-relaxed italic">
                                            {propTerms || "Chưa thiết lập các điều khoản."}
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>

                    {/* STICKY BOTTOM CONTROL DOCK */}
                    <div className="fixed bottom-0 left-0 right-0 bg-neutral-950/95 backdrop-blur-md border-t border-zinc-800 py-4 px-6 shadow-2xl z-50 no-print flex flex-col md:flex-row items-center justify-between gap-4">
                        
                        <div className="flex items-center gap-2 text-xs text-zinc-400">
                            <span className="inline-flex items-center justify-center bg-zinc-800 text-zinc-300 w-5 h-5 rounded-full font-bold border border-zinc-700">i</span>
                            <span>Hệ thống hỗ trợ xuất báo giá dưới dạng tệp ảnh PNG hoặc văn bản PDF sắc nét.</span>
                        </div>

                        <div className="flex flex-col sm:flex-row items-center justify-between sm:justify-end gap-6 w-full md:w-auto border-t border-zinc-800 md:border-t-0 pt-3 md:pt-0">
                            <div className="text-left md:text-right">
                                <span className="block text-[10px] text-zinc-400 uppercase tracking-widest font-semibold">
                                    TỔNG TRỊ GIÁ {!showTotal && "(ĐANG ẨN TRÊN PHIẾU)"}
                                </span>
                                <span className="text-xl md:text-2xl font-black text-zinc-100 tracking-tight font-montserrat">{formatVND(grandTotal)}</span>
                            </div>

                            <div className="flex flex-wrap items-center gap-3 w-full md:w-auto justify-end mt-2 sm:mt-0">
                                <button onClick={handleExportPNG} disabled={isGeneratingPNG || isGeneratingPDF} className={getExportBtnClass(isGeneratingPNG, false)}>
                                    {isGeneratingPNG ? "ĐANG TẠO FILE ẢNH..." : `XUẤT ${previewMode === 'QUOTE' ? 'BÁO GIÁ' : 'PROPOSAL'} PNG`}
                                </button>
                                <button onClick={handlePrint} disabled={isGeneratingPDF || isGeneratingPNG} className={getExportBtnClass(isGeneratingPDF, true)}>
                                    {isGeneratingPDF ? "ĐANG KHỞI TẠO FILE PDF..." : `XUẤT ${previewMode === 'QUOTE' ? 'BÁO GIÁ' : 'PROPOSAL'} PDF`}
                                </button>
                            </div>
                        </div>

                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
