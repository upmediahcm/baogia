                                                <input type="number" min="0" value={dlKichBanQty} onChange={(e) => setDlKichBanQty(parseInt(e.target.value) || 0)} className="w-12 bg-black border border-zinc-800 text-center rounded text-xs text-white p-1" />
                                                <button onClick={() => setDlKichBanQty(dlKichBanQty + 1)} className="bg-gradient-to-b from-zinc-600 to-zinc-700 text-white border-b-2 border-zinc-800 w-6 h-6 rounded flex items-center justify-center text-xs font-bold">+</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* DỊCH VỤ TÙY CHỈNH PHÁT SINH */}
                            <div className="bg-zinc-850 p-4 rounded-xl border border-zinc-800 space-y-3 mt-4 animate-fadeIn text-xs">
                                <div className="flex items-center justify-between border-b border-zinc-700 pb-2">
                                    <label className="block text-xs font-bold uppercase tracking-wider text-zinc-200">
                                        Dịch vụ bổ sung ngoài danh mục
                                    </label>
                                    <button 
                                        type="button"
                                        onClick={() => generateDescriptionWithAI(dlCustomName)}
                                        disabled={isGeneratingDesc || !dlCustomName.trim()}
                                        className="text-[10px] bg-amber-500/20 text-amber-300 border border-amber-500/30 hover:bg-amber-500/30 transition px-2 py-0.5 rounded font-bold"
                                    >
                                        {isGeneratingDesc ? "Đang viết..." : "✨ AI Viết Mô Tả"}
                                    </button>
                                </div>
                                <div className="space-y-2 text-xs">
                                    <div>
                                        <label className="block text-[10px] text-zinc-400 mb-1">Tên dịch vụ tùy chỉnh</label>
                                        <input 
                                            type="text" 
                                            value={dlCustomName} 
                                            onChange={(e) => {
                                                const val = e.target.value;
                                                setDlCustomName(val);
                                                if (val.trim() === "") {
                                                    setDlCustomDesc("Dịch vụ phát sinh ngoài hệ thống cấu hình theo yêu cầu thực tế của đối tác.");
                                                } else {
                                                    setDlCustomDesc(`Cung cấp dịch vụ ${val.trim()} chuyên nghiệp bám sát theo yêu cầu thực tế của đối tác.`);
                                                }
                                            }}
                                            className="w-full bg-black border border-zinc-855 rounded px-2.5 py-1.5 text-white focus:outline-none focus:border-zinc-500 text-xs" 
                                            placeholder="Ví dụ: Thiết kế bộ nhận diện thương hiệu phát sinh..."
                                        />
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                        <div>
                                            <label className="block text-[10px] text-zinc-400 mb-1">Giá dịch vụ (VND)</label>
                                            <input 
                                                type="number" 
                                                value={dlCustomPrice || ""} 
                                                onChange={(e) => setDlCustomPrice(parseInt(e.target.value) || 0)}
                                                className="w-full bg-black border border-zinc-855 rounded px-2.5 py-1.5 text-white focus:outline-none focus:border-zinc-500 text-xs font-mono" 
                                                placeholder="Nhập giá trị..."
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] text-zinc-400 mb-1">Mô tả chi tiết</label>
                                            <textarea 
                                                value={dlCustomDesc} 
                                                onChange={(e) => setDlCustomDesc(e.target.value)}
                                                rows="1"
                                                className="w-full bg-black border border-zinc-855 rounded px-2.5 py-1.5 text-white focus:outline-none focus:border-zinc-500 text-xs" 
                                            />
                                        </div>
                                    </div>
                                    {aiError && <p className="text-[10px] text-red-400 mt-1">{aiError}</p>}
                                </div>
                            </div>

                        </div>

                        {/* HOẠT ĐỘNG CHÍNH */}
                        <div className="mt-8 pt-6 border-t border-zinc-800 flex flex-col sm:flex-row gap-3">
                            <button onClick={handleAddToQuote} className="flex-1 bg-gradient-to-b from-zinc-100 to-zinc-300 text-zinc-950 border-b-4 border-zinc-500 active:border-b-0 active:translate-y-[4px] hover:brightness-110 text-xs font-bold py-3.5 px-4 rounded-lg transition-all duration-75 flex items-center justify-center gap-2 shadow-md shadow-black/40 uppercase tracking-wider animate-gentle-pulse">THÊM VÀO BÁO GIÁ PHÍA DƯỚI</button>
                            {invoiceItems.length > 0 && (
                                <button onClick={handleClearQuote} className="bg-gradient-to-b from-zinc-700 to-zinc-800 text-zinc-200 border-b-4 border-zinc-900 active:border-b-0 active:translate-y-[4px] hover:brightness-110 text-xs font-bold py-3.5 px-4 rounded-lg transition-all duration-75 flex items-center justify-center gap-2 shadow-md shadow-black/40 uppercase tracking-wider">XÓA TẤT CẢ</button>
                            )}
                        </div>

                        {/* NÚT LÀM PROPOSAL */}
                        <div className="mt-4">
                            <button 
                                onClick={() => setShowProposalConfig(!showProposalConfig)}
                                className={`w-full font-bold py-3 px-4 rounded-lg transition-all duration-75 text-xs flex items-center justify-center gap-2 shadow-md uppercase tracking-wider ${
                                    showProposalConfig 
                                    ? "bg-gradient-to-b from-yellow-500 to-yellow-600 text-yellow-950 border-b-4 border-yellow-700 active-translate-y-[4px]" 
                                    : "bg-gradient-to-b from-yellow-100 to-yellow-300 text-yellow-950 border-b-4 border-yellow-400 active-translate-y-[4px]"
                                }`}
                            >
                                <svg className="w-4 h-4 text-yellow-950" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                </svg>
                                {showProposalConfig ? "ĐÓNG KHUNG CẤU HÌNH PROPOSAL" : "LÀM PROPOSAL (ĐỀ XUẤT Ý TƯỞNG)"}
                            </button>
                        </div>

                        {/* NÚT LÀM HỢP ĐỒNG */}
                        <div className="mt-3">
                            <button 
                                onClick={handleBuildContract}
                                className="w-full font-bold py-3.5 px-4 rounded-lg transition-all duration-75 text-xs flex items-center justify-center gap-2 shadow-md uppercase tracking-wider bg-gradient-to-b from-blue-700 to-blue-900 text-white border-b-4 border-blue-950 active-translate-y-[4px]"
                            >
                                <svg className="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 21V5a2 2 0 00-2-2H5a2 2 0 00-2 2v16l3.5-2 3.5 2 3.5-2 3.5 2zM4 6h16M4 10h16m-16 4h12" />
                                </svg>
                                {showContractConfig ? "ĐÓNG KHUNG SOẠN THẢO HỢP ĐỒNG" : "LÀM HỢP ĐỒNG KINH TẾ (BÊN A & B)"}
                            </button>
                        </div>

                        {/* KHUNG NHẬP HỢP ĐỒNG */}
                        {showContractConfig && (
                            <div className="mt-4 bg-zinc-850 border border-blue-900/40 rounded-xl p-4 space-y-4 animate-fadeIn">
                                <h3 className="text-xs font-bold text-blue-400 uppercase tracking-widest border-b border-zinc-800 pb-2 flex items-center justify-between">
                                    <span>Cấu hình Hợp đồng dịch vụ</span>
                                </h3>
                                <div>
                                    <label className="block text-[10px] text-zinc-400 mb-1.5 uppercase font-semibold">Hình thức khách hàng Bên B</label>
                                    <div className="grid grid-cols-2 gap-2">
                                        <button type="button" onClick={() => setClientType('DOANH_NGHIEP')} className={`py-1.5 px-1 text-[10px] font-bold rounded border transition-all ${clientType === 'DOANH_NGHIEP' ? "bg-blue-600 text-white border-blue-500" : "bg-zinc-900 text-zinc-400 border-zinc-800"}`}>Khách Doanh Nghiệp</button>
                                        <button type="button" onClick={() => setClientType('CA_NHAN')} className={`py-1.5 px-1 text-[10px] font-bold rounded border transition-all ${clientType === 'CA_NHAN' ? "bg-blue-600 text-white border-blue-500" : "bg-zinc-900 text-zinc-400 border-zinc-800"}`}>Khách Cá Nhân</button>
                                    </div>
                                </div>
                                <div className="space-y-3 bg-zinc-900 p-3 rounded-lg border border-zinc-800 text-xs">
                                    {clientType === 'DOANH_NGHIEP' ? (
                                        <React.Fragment>
                                            <div>
                                                <label className="block text-[9px] text-zinc-400 mb-1">Tên công ty / Đơn vị đại diện Bên B</label>
                                                <input type="text" value={partyBCompany} onChange={(e) => setPartyBCompany(e.target.value)} className="w-full bg-black border border-zinc-800 rounded px-2 py-1.5 text-xs text-white" />
                                            </div>
                                            <div>
                                                <label className="block text-[9px] text-zinc-400 mb-1">Địa chỉ trụ sở Bên B</label>
                                                <input type="text" value={partyBAddress} onChange={(e) => setPartyBAddress(e.target.value)} className="w-full bg-black border border-zinc-800 rounded px-2 py-1.5 text-xs text-white" />
                                            </div>
                                            <div className="grid grid-cols-2 gap-2">
                                                <div>
                                                    <label className="block text-[9px] text-zinc-400 mb-1">Mã số thuế</label>
                                                    <input type="text" value={partyBTaxCode} onChange={(e) => setPartyBTaxCode(e.target.value)} className="w-full bg-black border border-zinc-850 rounded px-2 py-1.5 text-xs text-white" />
                                                </div>
                                                <div>
                                                    <label className="block text-[9px] text-zinc-400 mb-1">Số điện thoại</label>
                                                    <input type="text" value={partyBPhone} onChange={(e) => setPartyBPhone(e.target.value)} className="w-full bg-black border border-zinc-850 rounded px-2 py-1.5 text-xs text-white" />
                                                </div>
                                            </div>
                                            {/* BỔ SUNG CÁC TRƯỜNG PHÁP LÝ CHO DOANH NGHIỆP BÊN B */}
                                            <div className="grid grid-cols-2 gap-2">
                                                <div>
                                                    <label className="block text-[9px] text-zinc-400 mb-1">Người đại diện liên hệ</label>
                                                    <input type="text" value={partyBRep} onChange={(e) => setPartyBRep(e.target.value)} className="w-full bg-black border border-zinc-850 rounded px-2 py-1.5 text-xs text-white" placeholder="Họ và tên..." />
                                                </div>
                                                <div>
                                                    <label className="block text-[9px] text-zinc-400 mb-1">Chức vụ đại diện</label>
                                                    <input type="text" value={partyBPosition} onChange={(e) => setPartyBPosition(e.target.value)} className="w-full bg-black border border-zinc-850 rounded px-2 py-1.5 text-xs text-white" placeholder="Giám đốc, Đại diện..." />
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-[9px] text-zinc-400 mb-1">Số CCCD / CMND của người đại diện</label>
                                                <input type="text" value={partyBRepCCCD} onChange={(e) => setPartyBRepCCCD(e.target.value)} className="w-full bg-black border border-zinc-850 rounded px-2 py-1.5 text-xs text-white" placeholder="Nhập số CCCD..." />
                                            </div>
                                            <div>
                                                <label className="block text-[9px] text-zinc-400 mb-1">Tài khoản ngân hàng giao dịch Bên B</label>
                                                <input type="text" value={partyBBank} onChange={(e) => setPartyBBank(e.target.value)} className="w-full bg-black border border-zinc-850 rounded px-2 py-1.5 text-xs text-white" placeholder="Tên ngân hàng, số tài khoản..." />
                                            </div>
                                        </React.Fragment>
                                    ) : (
                                        <React.Fragment>
                                            <div>
                                                <label className="block text-[9px] text-zinc-400 mb-1">Họ và tên khách hàng</label>
                                                <input type="text" value={partyBCompany} onChange={(e) => setPartyBCompany(e.target.value)} className="w-full bg-black border border-zinc-800 rounded px-2 py-1.5 text-xs text-white" />
                                            </div>
                                            <div>
                                                <label className="block text-[9px] text-zinc-400 mb-1">Địa chỉ thường trú</label>
                                                <input type="text" value={partyBAddress} onChange={(e) => setPartyBAddress(e.target.value)} className="w-full bg-black border border-zinc-800 rounded px-2 py-1.5 text-xs text-white" />
                                            </div>
                                            <div className="grid grid-cols-2 gap-2">
                                                <div>
                                                    <label className="block text-[9px] text-zinc-400 mb-1">Số CCCD / CMND</label>
                                                    <input type="text" value={partyBTaxCode} onChange={(e) => setPartyBTaxCode(e.target.value)} className="w-full bg-black border border-zinc-850 rounded px-2 py-1.5 text-xs text-white" />
                                                </div>
                                                <div>
                                                    <label className="block text-[9px] text-zinc-400 mb-1">Số điện thoại</label>
                                                    <input type="text" value={partyBPhone} onChange={(e) => setPartyBPhone(e.target.value)} className="w-full bg-black border border-zinc-855 rounded px-2 py-1.5 text-xs text-white" />
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-[9px] text-zinc-400 mb-1">Tài khoản ngân hàng giao dịch Bên B</label>
                                                <input type="text" value={partyBBank} onChange={(e) => setPartyBBank(e.target.value)} className="w-full bg-black border border-zinc-850 rounded px-2 py-1.5 text-xs text-white" placeholder="Tên ngân hàng, số tài khoản..." />
                                            </div>
                                        </React.Fragment>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* KHUNG CẤU HÌNH PROPOSAL */}
                        {showProposalConfig && (
                            <div className="mt-4 bg-zinc-850 border border-zinc-800 rounded-xl p-4 space-y-4 animate-fadeIn">
                                <h3 className="text-xs font-bold text-amber-400 uppercase tracking-widest border-b border-zinc-800 pb-2 flex items-center justify-between">
                                    <span>Cấu hình Proposal dự án</span>
                                </h3>

                                {/* TRỢ LÝ AI PROPOSAL CHUYÊN SÂU */}
                                <div className="bg-zinc-900 p-3.5 rounded-xl border border-amber-500/30 space-y-3">
                                    <span className="block text-[10px] font-bold text-amber-400 uppercase tracking-widest">
                                        ✨ Trợ lý AI thiết lập Proposal tối ưu
                                    </span>
                                    <label className="block text-[10px] text-zinc-400 leading-normal font-semibold">
                                        Nhập yêu cầu của khách hàng để có proposal chính xác nhất.
                                    </label>
                                    <textarea 
                                        value={proposalAIInput}
                                        onChange={(e) => setProposalAIInput(e.target.value)}
                                        rows="3"
                                        placeholder="Ví dụ: Khách hàng muốn TVC mỹ phẩm thiên nhiên sang trọng, bối cảnh rừng thông Đà Lạt, đối tượng nữ từ 25-35..."
                                        className="w-full bg-black border border-zinc-800 rounded p-2 text-xs text-white focus:outline-none focus:border-amber-500"
                                    />
                                    <button 
                                        type="button"
                                        onClick={handleGenerateProposalWithAI}
                                        disabled={isGeneratingProposalAI || !proposalAIInput.trim()}
                                        className="w-full bg-gradient-to-r from-amber-500 to-yellow-500 hover:brightness-110 disabled:opacity-40 text-zinc-950 font-bold py-2 rounded text-xs transition flex items-center justify-center gap-2"
                                    >
                                        {isGeneratingProposalAI ? (
                                            <span className="w-4 h-4 border-2 border-zinc-950 border-t-transparent rounded-full animate-spin"></span>
                                        ) : (
                                            "BẮT ĐẦU PHÂN TÍCH VÀ SOẠN PROPOSAL ✨"
                                        )}
                                    </button>
                                </div>

                                {/* Chọn Tone Màu */}
                                <div>
                                    <label className="block text-[10px] text-zinc-400 mb-1.5 uppercase font-semibold">Tông màu Proposal</label>
                                    <div className="grid grid-cols-3 gap-2">
                                        <button type="button" onClick={() => setProposalTone('TRANG_DEN')} className={`py-2 px-1 text-[10px] font-bold rounded border transition-all ${proposalTone === 'TRANG_DEN' ? "bg-white text-slate-950 border-slate-400" : "bg-zinc-900 text-zinc-400 border-zinc-800"}`}>Trắng - Đen</button>
                                        <button type="button" onClick={() => setProposalTone('NAU_VANG')} className={`py-2 px-1 text-[10px] font-bold rounded border transition-all ${proposalTone === 'NAU_VANG' ? "bg-[#4E342E] text-[#FFD700] border-amber-600" : "bg-zinc-900 text-zinc-400 border-zinc-800"}`}>Nâu - Vàng</button>
                                        <button type="button" onClick={() => setProposalTone('XANH_TRANG')} className={`py-2 px-1 text-[10px] font-bold rounded border transition-all ${proposalTone === 'XANH_TRANG' ? "bg-[#1E3A8A] text-white border-blue-500" : "bg-zinc-900 text-zinc-400"}`}>Xanh - Trắng</button>
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-xs text-zinc-300 mb-1 font-bold uppercase tracking-wider">Mục tiêu chiến dịch / dự án</label>
                                        <input 
                                            type="text"
                                            value={propObjective}
                                            onChange={(e) => setPropObjective(e.target.value)}
                                            onFocus={() => setOpenSuggestions(prev => ({ ...prev, objective: true }))}
                                            onBlur={() => setTimeout(() => setOpenSuggestions(prev => ({ ...prev, objective: false })), 200)}
                                            className="w-full bg-black border border-zinc-800 rounded px-2.5 py-1.5 text-xs text-white"
                                        />
                                        {renderSuggestionBox('objective', generatedSuggestions.objectives, propObjective, setPropObjective)}
                                    </div>

                                    <div>
                                        <label className="block text-xs text-zinc-300 mb-1 font-bold uppercase tracking-wider">Đối tượng người xem</label>
                                        <input 
                                            type="text"
                                            value={propTarget}
                                            onChange={(e) => setPropTarget(e.target.value)}
                                            onFocus={() => setOpenSuggestions(prev => ({ ...prev, target: true }))}
                                            onBlur={() => setTimeout(() => setOpenSuggestions(prev => ({ ...prev, target: false })), 200)}
                                            className="w-full bg-black border border-zinc-800 rounded px-2.5 py-1.5 text-xs text-white"
                                        />
                                        {renderSuggestionBox('target', generatedSuggestions.targets, propTarget, setPropTarget)}
                                    </div>

                                    <div>
                                        <label className="block text-xs text-zinc-300 mb-1 font-bold uppercase tracking-wider">Thông điệp truyền thông</label>
                                        <input 
                                            type="text"
                                            value={propMessage}
                                            onChange={(e) => setPropMessage(e.target.value)}
                                            onFocus={() => setOpenSuggestions(prev => ({ ...prev, message: true }))}
                                            onBlur={() => setTimeout(() => setOpenSuggestions(prev => ({ ...prev, message: false })), 200)}
                                            className="w-full bg-black border border-zinc-800 rounded px-2.5 py-1.5 text-xs text-white"
                                        />
                                        {renderSuggestionBox('message', generatedSuggestions.messages, propMessage, setPropMessage)}
                                    </div>

                                    <div>
                                        <label className="block text-xs text-zinc-300 mb-1 font-bold uppercase tracking-wider">Định hướng nghệ thuật & Visual</label>
                                        <textarea 
                                            value={propDirection}
                                            onChange={(e) => setPropDirection(e.target.value)}
                                            onFocus={() => setOpenSuggestions(prev => ({ ...prev, direction: true }))}
                                            onBlur={() => setTimeout(() => setOpenSuggestions(prev => ({ ...prev, direction: false })), 200)}
                                            rows="3"
                                            className="w-full bg-black border border-zinc-800 rounded px-2.5 py-1.5 text-xs text-white leading-relaxed"
                                        />
                                        {renderSuggestionBox('direction', generatedSuggestions.directions, propDirection, setPropDirection)}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* CẤU HÌNH PHỤ TRỢ */}
                        <div className="mt-6 bg-zinc-800 p-4 rounded-xl border border-zinc-800 space-y-3">
                            <h4 className="text-xs font-semibold text-zinc-300 uppercase tracking-wider border-b border-zinc-700 pb-2">Cấu hình chiết khấu & VAT</h4>
                            <div className="flex items-center justify-between py-2 border-b border-zinc-900 pb-2">
                                <div>
                                    <span className="block text-xs font-medium text-white">Hiển thị Tổng Thanh Toán</span>
                                </div>
                                <input type="checkbox" checked={showTotal} onChange={(e) => setShowTotal(e.target.checked)} className="w-4 h-4 cursor-pointer" />
                            </div>
                            <div className="grid grid-cols-2 gap-3">
                                <div>
                                    <label className="block text-[10px] text-zinc-400 mb-1">Giảm giá (%)</label>
                                    <input type="number" min="0" max="100" value={discountPercent} onChange={(e) => setDiscountPercent(Math.min(100, Math.max(0, parseInt(e.target.value) || 0)))} className="w-full bg-black border border-zinc-800 rounded px-2.5 py-1.5 text-xs text-white" />
                                </div>
                                <div>
                                    <label className="block text-[10px] text-zinc-400 mb-1">Thuế VAT (%)</label>
                                    <select value={vatPercent} onChange={(e) => setVatPercent(parseInt(e.target.value))} className="w-full bg-black border border-zinc-800 rounded px-2 py-1.5 text-xs text-white">
                                        <option value="0">Không có (0%)</option>
                                        <option value="8">VAT 8%</option>
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label className="block text-[10px] text-zinc-400 mb-1">Ghi chú chân trang</label>
                                <textarea value={note} onChange={(e) => setNote(e.target.value)} rows="2" className="w-full bg-black border border-zinc-855 rounded px-2.5 py-1 text-xs text-white" />
                            </div>
                        </div>

                    </div>

                    {/* RIGHT PANEL: LIVE DOCUMENT VIEW */}
                    <div className="w-full md:w-[55%] bg-black p-4 md:p-8 flex flex-col items-center overflow-y-auto max-h-[calc(100vh-80px)] md:max-h-screen pb-36">
                        
                        <div className="flex justify-center gap-2 mb-4 no-print w-full max-w-[800px]">
                            <button onClick={() => setPreviewMode('QUOTE')} className={`flex-1 py-2 rounded-lg text-xs font-bold uppercase border-b-2 ${previewMode === 'QUOTE' ? "bg-zinc-100 text-slate-950 border-white" : "bg-zinc-800 text-zinc-400 border-zinc-800"}`}>Báo Giá</button>

                                                                <td className="text-right text-black">{item.unitPrice > 0 ? formatVND(item.unitPrice) : "-"}</td>
                                                                <td className="text-right font-bold text-black">{formatVND(item.subtotal)}</td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>

                                            {/* ĐIỀU 2 */}
                                            <div className="space-y-1 text-black avoid-break">
                                                <h5 className="font-bold text-xs uppercase text-black">ĐIỀU 2: TIÊU CHUẨN SẢN XUẤT PHIM VÀ KIỂM DUYỆT (PPM)</h5>
                                                <p className="pl-1 text-xs leading-relaxed">
                                                    1. <strong>Phê duyệt kịch bản phân cảnh:</strong> Bên B tiến hành ký duyệt văn bản kịch bản phân cảnh chi tiết trước ngày bấm máy tối thiểu 03 (ba) ngày làm việc làm căn cứ thực hiện.<br />
                                                    2. <strong>Buổi họp tiền kỳ PPM (Pre-Production Meeting):</strong> Trước ngày quay chính thức, hai bên cùng họp PPM thống nhất về diễn viên, makeup layout, trang phục và thiết lập bối cảnh. Ngay khi PPM được ký thông qua, Bên B cam kết không thay đổi cốt kịch bản hoặc diễn viên tại hiện trường set quay. Mọi sự thay đổi tại set quay làm phát sinh chi phí thiết bị, bối cảnh sẽ do Bên B chịu trách nhiệm chi trả bổ sung 100% dựa trên thực tế phát sinh.
                                                </p>
                                            </div>

                                            {/* ĐIỀU 3 */}
                                            <div className="space-y-1 text-black avoid-break">
                                                <h5 className="font-bold text-xs uppercase text-black">ĐIỀU 3: CHẤT LƯỢNG KỸ THUẬT VÀ HIỆU CHỈNH BIÊN TẬP</h5>
                                                <p className="pl-1 text-xs leading-relaxed">
                                                    1. <strong>Tiêu chuẩn video:</strong> Video final bàn giao đạt độ phân giải Ultra HD 4K, chuẩn màu REC709 hoặc sRGB chuyên dụng, tần số quét mượt mà đúng cam kết kỹ thuật.<br />
                                                    2. <strong>Quy định chỉnh sửa:</strong> Bên B có quyền sửa đổi tối đa <strong>02 (hai) lần</strong> trên bản dựng video demo thô (về text title, nhịp dựng, hiệu ứng âm thanh). Các yêu cầu sửa đổi ngoài kịch bản đã ký duyệt hoặc phát sinh sau lần hiệu chỉnh thứ hai sẽ chịu thêm phụ phí tương đương 20% đến 50% giá trị hạng mục đó.
                                                </p>
                                            </div>

                                            {/* ĐIỀU 4 */}
                                            <div className="space-y-1 text-black avoid-break">
                                                <h5 className="font-bold text-xs uppercase text-black">ĐIỀU 4: TIẾN ĐỘ THỰC HIỆN VÀ GIAO NHẬN THÀNH PHẨM</h5>
                                                <p className="pl-1 text-xs leading-relaxed">
                                                    1. <strong>Thời gian gửi video demo:</strong> Bên A nhận trách nhiệm trả video demo thô chậm nhất là <strong>03 (ba) ngày</strong> sau khi quay xong bối cảnh.<br />
                                                    2. <strong>Thời gian gửi video final:</strong> Bên A nhận trách nhiệm gửi bản video final hoàn chỉnh chậm nhất là sau <strong>02 (hai) ngày</strong> kể từ ngày chốt demo và nhận feedback duyệt chính thức từ Bên B.<br />
                                                    3. <strong>Sự chậm trễ từ Bên B:</strong> Trường hợp Bên B chậm duyệt kịch bản, bối cảnh, casting hoặc feedback chậm hơn 02 ngày làm việc, tiến độ bàn giao của Bên A sẽ tự động gia hạn cộng thêm tương ứng theo đúng mốc thời gian Bên B phản hồi thực tế.
                                                </p>
                                            </div>

                                            {/* ĐIỀU 5 */}
                                            <div className="space-y-1 text-black avoid-break">
                                                <h5 className="font-bold text-xs uppercase text-black">ĐIỀU 5: CHI PHÍ DỊCH VỤ VÀ PHƯƠNG THỨC GIẢI NGÂN</h5>
                                                <p className="pl-1 text-xs leading-relaxed">
                                                    1. <strong>Tổng giá trị hợp đồng:</strong> Chi phí trọn gói dịch vụ là: <strong>{formatVND(grandTotal)}</strong> (Mức phí đã bao gồm các khoản thuế suất VAT đăng ký và chiết khấu ưu đãi nếu có).<br />
                                                    2. <strong>Tiến độ thanh toán 3 đợt:</strong> Bên B chuyển khoản thanh toán cho Bên A chia làm 03 (ba) đợt cụ thể như sau:<br />
                                                    • <strong>Đợt 1 (Tạm ứng 50% đặt cọc):</strong> Bên B chuyển khoản tạm ứng đặt cọc dịch vụ là: <strong>{formatVND(grandTotal * 0.5)}</strong> cho Bên A ngay sau khi hai bên tiến hành ký kết hợp đồng này.<br />
                                                    • <strong>Đợt 2 (Thanh toán 30%):</strong> Bên B thanh toán tiếp số tiền là: <strong>{formatVND(grandTotal * 0.3)}</strong> cho Bên A sau khi Bên A gửi bản video demo thứ nhất.<br />
                                                    • <strong>Đợt 3 (Thanh toán 20% còn lại):</strong> Bên B thanh toán nốt số tiền còn lại là: <strong>{formatVND(grandTotal * 0.2)}</strong> cho Bên A sau khi Bên A bàn giao và nghiệm thu xong video thành phẩm đạt chuẩn thỏa thuận ban đầu.
                                                </p>
                                            </div>

                                            {/* ĐIỀU 6 */}
                                            <div className="space-y-1 text-black avoid-break">
                                                <h5 className="font-bold text-xs uppercase text-black">ĐIỀU 6: QUYỀN SỞ HỮU TRÍ TUỆ VÀ SỬ DỤNG THÀNH PHẨM</h5>
                                                <p className="pl-1 text-xs leading-relaxed">
                                                    1. <strong>Bản quyền:</strong> Bên A cam kết sử dụng hệ thống nhạc nền bản quyền thương mại và font chữ được cấp phép. Bên B được cấp quyền phát sóng rộng rãi sản phẩm trên các nền tảng mạng xã hội và truyền thông.<br />
                                                    2. <strong>Quyền sở hữu source thô (Raw File):</strong> Toàn bộ source video quay thô chưa biên tập thuộc quyền sở hữu tài sản kỹ thuật của Bên A. Bên B chỉ chính thức được chuyển giao bản quyền sử dụng video thành phẩm sau khi hoàn thành 100% nghĩa vụ thanh toán chi phí hợp đồng.
                                                </p>
                                            </div>

                                            {/* ĐIỀU 7 */}
                                            <div className="space-y-1 text-black avoid-break font-bold">
                                                <h5 className="font-bold text-xs uppercase text-black font-extrabold">ĐIỀU 7: QUY ĐỊNH PHẠT VI PHẠM VÀ BỒI THƯỜNG HỢP ĐỒNG</h5>
                                                <p className="pl-1 text-xs leading-relaxed font-normal">
                                                    1. Trách nhiệm giao video và phạt trễ hạn từ Bên A: Bên A có trách nhiệm trả đúng hẹn video cho Bên B theo đúng quy định. Trường hợp Bên A giao trễ video (được tính theo mốc thời gian bàn giao video demo thứ nhất quy định tại Điều 4), Bên A phải chịu mức phạt vi phạm bằng 20% tổng giá trị hợp đồng cho Bên B. Mọi vấn đề chậm trễ do Bên B chậm duyệt kịch bản, bối cảnh, diễn viên hoặc phản hồi feedback chậm sẽ hoàn toàn không bị tính trong điều khoản phạt này.<br />
                                                    2. Bồi thường do không hoàn thành sản phẩm từ Bên A: Trong trường hợp Bên A không hoàn thành được sản phẩm cuối cùng theo đúng thỏa thuận ban đầu do lỗi chủ quan xuất phát từ phía Bên A, Bên A có trách nhiệm bồi thường và hoàn trả lại 100% tổng giá trị hợp đồng này cho Bên B.<br />
                                                    3. Chế tài chậm thanh toán từ Bên B: Trường hợp Bên B thanh toán chậm bất kỳ đợt nào so với mốc thời gian quy định tại Điều 5, Bên B phải chịu phạt chậm trả bằng 0.5% giá trị đợt thanh toán đó cho mỗi ngày chậm trả.<br />
                                                    4. Đơn phương hủy bỏ hợp đồng: Nếu Bên B đơn phương hủy bỏ hợp đồng mà không có lỗi trực tiếp phát sinh từ Bên A, Bên B sẽ bị tịch thu toàn bộ khoản tiền đặt cọc đợt 1, đồng thời bồi thường thêm 20% tổng giá trị hợp đồng để bù đắp các chi phí nhân sự và bối cảnh tác nghiệp Bên A đã chuẩn bị trước đó.
                                                </p>
                                            </div>

                                            {/* ĐIỀU 8 */}
                                            <div className="space-y-1 text-black avoid-break">
                                                <h5 className="font-bold text-xs uppercase text-black">ĐIỀU 8: ĐIỀU KHOẢN CHUNG VÀ GIẢI QUYẾT TRANH CHẤP</h5>
                                                <p className="pl-1 text-xs leading-relaxed">
                                                    1. <strong>Bảo mật:</strong> Hai bên cam kết bảo mật tuyệt đối thông tin thương mại, kịch bản, dữ liệu dự án của đối tác, không tiết lộ cho bên thứ ba khi chưa có sự cho phép bằng văn bản.<br />
                                                    2. <strong>Giải quyết tranh chấp:</strong> Mọi tranh chấp phát sinh sẽ được giải quyết trước tiên thông qua thương lượng hòa giải. Trường hợp thương lượng không đạt kết quả trong vòng 30 ngày, vụ việc sẽ được đưa ra giải quyết tại Tòa án nhân dân có thẩm quyền tại Thành phố Hồ Chí Minh để xử lý theo pháp luật Việt Nam.
                                                </p>
                                            </div>

                                            <div className="mt-12 grid grid-cols-2 text-center font-bold pt-6 border-t border-slate-200 text-black avoid-break">
                                                <div className="space-y-16 text-black">
                                                    <p className="uppercase text-xs text-black">ĐẠI DIỆN BÊN A (UP MEDIA)</p>
                                                    <p className="text-slate-400 font-normal italic text-[10px]">(Ký, ghi rõ họ tên và đóng dấu)</p>
                                                </div>
                                                <div className="space-y-16 text-black">
                                                    <p className="uppercase text-xs text-black">ĐẠI DIỆN BÊN B</p>
                                                    <p className="text-slate-400 font-normal italic text-[10px]">(Ký, ghi rõ họ tên và đóng dấu)</p>
                                                </div>
                                            </div>
                                        </React.Fragment>
                                    )}
                                </div>
                            )}

                        </div>
                    </div>

                    {/* STICKY BOTTOM CONTROL DOCK */}
                    <div className="fixed bottom-0 left-0 right-0 bg-neutral-950/95 backdrop-blur-md border-t border-zinc-800 py-4 px-6 shadow-2xl z-50 no-print flex flex-col md:flex-row items-center justify-between gap-4">
                        <div className="flex items-center gap-2 text-xs text-zinc-400">
                            <span className="inline-flex items-center justify-center bg-zinc-800 text-zinc-300 w-5 h-5 rounded-full font-bold border border-zinc-700 font-mono">i</span>
                            <span>Hỗ trợ xuất tệp ảnh PNG hoặc văn bản PDF sắc nét.</span>
                        </div>
                        <div className="flex flex-col sm:flex-row items-center justify-between sm:justify-end gap-6 w-full md:w-auto border-t border-zinc-800 md:border-t-0 pt-3 md:pt-0">
                            <div className="text-left md:text-right">
                                <span className="block text-[10px] text-zinc-400 uppercase tracking-widest font-semibold">TỔNG TRỊ GIÁ</span>
                                <span className="text-xl md:text-2xl font-black text-zinc-100 tracking-tight font-montserrat">{formatVND(grandTotal)}</span>
                            </div>
                            <div className="flex flex-wrap items-center gap-3 w-full md:w-auto justify-end mt-2 sm:mt-0">
                                {previewMode === 'CONTRACT' ? (
                                    <React.Fragment>
                                        <button onClick={handleExportDOCX} className={getExportBtnClass(false, false)}>XUẤT HỢP ĐỒNG DOCX</button>
                                        <button onClick={handlePrint} disabled={isGeneratingPDF} className={getExportBtnClass(isGeneratingPDF, true)}>{isGeneratingPDF ? "ĐANG IN PDF..." : "XUẤT HỢP ĐỒNG PDF"}</button>
                                    </React.Fragment>
                                ) : (
                                    <React.Fragment>
                                        <button onClick={handleExportPNG} disabled={isGeneratingPNG || isGeneratingPDF} className={getExportBtnClass(isGeneratingPNG, false)}>{isGeneratingPNG ? "ĐANG TẠO FILE..." : `XUẤT ${previewMode === 'QUOTE' ? 'BÁO GIÁ' : 'PROPOSAL'} PNG`}</button>
                                        <button onClick={handlePrint} disabled={isGeneratingPDF || isGeneratingPNG} className={getExportBtnClass(isGeneratingPDF, true)}>{isGeneratingPDF ? "ĐANG IN PDF..." : `XUẤT ${previewMode === 'QUOTE' ? 'BÁO GIÁ' : 'PROPOSAL'} PDF`}</button>
                                    </React.Fragment>
                                )}
                            </div>
                        </div>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
